","source":"https://rvbusiness.com/how-new-leadership-is-rebuilding-trust-at-lance-camper/"},{"fact":"Lance's recall footprint is small and minor. Example: NHTSA campaign 22V201000 (March 28, 2022) covered just 18 model year 2022 travel trailers for a data cable routed against the water heater burner box, a fire risk, fixed free by rerouting the cable.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=22V201000"},{"fact":"Lance's own construction page confirms the core material claims: Azdel composite in place of luan wood, an aluminum framed superstructure, and LanceLock interlocking aluminum extrusions joining the exterior panels.","source":"https://www.lancecamper.com/design-construction/"},{"fact":"Lance's warranty is one year limited from the date of purchase, including structural coverage. The roof membrane (RMA XTRM PLY) carries a separate 15 year warranty. Third party components like appliances, heaters, refrigerators, doors, and windows are explicitly excluded and carry their own manufacturer warranties.","source":"https://www.lancecamper.com/warranty/"},{"fact":"Aggregated owner complaints across BBB, forums, and owner groups cluster on water intrusion at front windows, roof seams, and slides often within the first year, slide motor and seal faults, staple pops and crooked trim, and multi month warranty service delays. These are pattern complaints, not isolated cases.","source":"https://rvreports.ai/report/lance-camper-rv-exposed-leaks-slide-issues-weight-surprises-warranty-delays/"},{"fact":"The same complaint pattern can be checked directly against primary sources: Better Business Bureau records for Lance Camper.","source":"https://www.bbb.org/search?find_text=Lance+Camper"},{"fact":"Owner threads on Reddit's RV communities show the same recurring complaint themes for Lance units, searchable directly.","source":"https://www.reddit.com/r/RVLiving/search/?q=Lance+Camper+Problems"}],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["travel-trailer","truck-camper"]},{"slug":"oliver-travel-trailers","name":"Oliver Travel Trailers","verdict":"buy","headline":"Backed by a 5 year limited structural warranty on the fiberglass shell and aluminum chassis, one of the longest in the industry.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://olivertraveltrailers.com/travel-trailers/warranty/"}],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}}],"segments":["travel-trailer","molded-fiberglass"]},{"slug":"airstream","name":"Airstream","verdict":"buy","headline":"Airstream’s aluminum travel trailers earn the reputation, but not for the reason people repeat. The old story about the back end sagging off the frame is a 1960s and 1970s problem and does not apply to anything you would buy new. The real issue is front end separation: on 2018 to 2022 models 25 feet and longer with a front bed, rivets behind the front molding can shear loose. Airstream started bracing the front end in production around late 2022, and it covers the repair under warranty for 3 years, but it never issued a recall for it. Buy the trailers, and check the front molding rivets on any 2018 to 2022 you look at. Be careful with the Basecamp, which has pulled recalls for the door window glass letting go (1,992 units) and the roof air conditioner working loose (1,509 units). Skip the Atlas motorhome: for a line that builds only a couple hundred units a year, it has racked up four separate fire risk wiring recalls, and one owner had structural cracking five days after delivery.","note":"The famous rear-end separation story is dated folklore. It is a 1960s and 1970s problem, concentrated in mid-70s rear-bath models 27 feet and up, caused when federally mandated grey tanks added rear weight to frames never strengthened for it. It is irrelevant to anything you would buy new. The real modern issue is FRONT end separation, which our videos never mentioned and almost nobody covers.","confidence":"medium-high","unestablished":"FES incidence rate is unknown (no recall, no manufacturer disclosure, forum-reported only). We can prove it is real and current, we cannot say what percent of trailers get it. Whether the 2023 bracket fix actually solved it is too recent to know. No rigorous resale dataset exists.","splits":[{"scope":"Aluminum travel trailers under 25 feet (Bambi, Caravel, small Flying Cloud)","verdict":"buy","why":"The core product, and the front end separation pattern does not concentrate here."},{"scope":"Aluminum travel trailers 25 feet and up with a front bed, 2018 to 2022","verdict":"caution","why":"Front end separation window. Inspect the rivets behind the front molding before you buy."},{"scope":"Aluminum travel trailers, 2023 and newer","verdict":"buy","why":"Airstream added corner bracket reinforcement to production around late 2022 and early 2023."},{"scope":"Basecamp (all years)","verdict":"caution","why":"The recall record is disproportionate to its volume. It is the problem child, not the flagship."},{"scope":"Interstate and Rangeline (Sprinter Class B)","verdict":"caution","why":"The motorhomes generate the lemon litigation. The towables do not."},{"scope":"Atlas (Sprinter Class B+)","verdict":"avoid","why":"Four separate fire risk electrical defects on a line building only a couple hundred units a year."}],"proof":[{"fact":"24 recall campaigns across model years 2018-2026, every one filed under \"Airstream, Inc.\" and never co-listed with a Thor sibling brand. Airstream builds only at Jackson Center, Ohio, in its own plant."},{"fact":"NHTSA 22V932000 (December 15, 2022, 1,992 units) covers 2017-2022 Basecamp 16 and 2021-2022 Basecamp 20. The adhesive bond between the glass and the metal frame of the entry door window can fail and the glass separates."},{"fact":"NHTSA 21V195000 (March 19, 2021, 1,509 units) covers 2017-2020 Basecamp: roof air conditioner mounting bolts may loosen or break, allowing the unit to detach from the roof. NHTSA 23V860000 (December 19, 2023, 1,587 units) covers Basecamp 20X spare tire carrier metal fatigue, tire detaches."},{"fact":"Four separate fire-risk electrical defects on the Class B motorhomes, and they are Airstream-built, not Mercedes: 19V734000 (Atlas, 151 units, breaker terminal miswired), 21V344000 (Interstate Nineteen, 256 units, buss bar miswired), 23V327000 (Atlas, 41 units, 16-gauge wire under-protected by a 20-amp fuse), 24V314000 (Atlas, 8 units, generator installed with no heat shield)."},{"fact":"Kim v. Airstream (California Court of Appeal, 2nd District, July 2025). Documented lemon claims include a 2023 Atlas with structural fiberglass cracking within five days of delivery and repeated failed repairs, and a 136,000 dollar 2023 Rangeline with 10 service visits, roof leaks and mold."},{"fact":"Front end separation is corroborated by multiple independent airforums threads plus a third-party shop selling an engineered FES repair as a product line. A business does not build a service around a problem that does not exist."}],"citations":[{"source":{"videoId":"shDHmM9vF0k","title":"The Only 3 RV Brands Getting BETTER Every Year While Everyone Else Falls Apart","url":"https://youtu.be/shDHmM9vF0k"}},{"source":{"videoId":"ttTN7u9illM","title":"The Only 5 Travel Trailer Brands That WON'T Fail You In 2026 (Everyone Else Got Worse)","url":"https://youtu.be/ttTN7u9illM"}},{"source":{"videoId":"4y3oZUhKtBg","title":"5 RV Brands That Were Bulletproof in 2015—Now Falling Apart After One Trip","url":"https://youtu.be/4y3oZUhKtBg"}}],"segments":["travel-trailer"]},{"slug":"casita","name":"Casita","verdict":"buy","headline":"Building lightweight travel trailers out of Rice, Texas since 1983 using molded fiberglass ,  no wood studs to rot, no luan panels to delaminate, no seams to leak, built as one continuous fiberglass shell. New retail runs $25,000-$35,000; they almost never show up at auction because owners keep them forever, but when one does (estate sale, lifestyle change) hammer prices land between $12,000-$18,000. Audit checklist: check the fiberglass for impact cracks, inspect axle and bearings, test the appliances.","note":"A base Casita costs a fraction of a comparable Airstream Bambi. New Casitas start in the low twenty thousands, while the smallest 2026 Bambi lists at about seventy thousand dollars.","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://rvbrokers.com/brands/casita/ ; https://www.rvguide.com/specs/airstream/travel-trailer/2026/bambi/20fb.html"}],"citations":[{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["travel-trailer","molded-fiberglass"]},{"slug":"northwood-manufacturing","name":"Northwood Manufacturing","verdict":"buy","headline":"Built in La Grande, Oregon, manufactures the Arctic Fox and Nash lines and builds its own frames in-house ,  custom heavy-duty steel chassis with heavy-gauge aluminum wall tubing, heated holding tanks in a fully enclosed insulated underbelly, real porcelain toilets, and residential cabinetry with real wood fronts. Arctic Fox owners routinely report 15-20 years of use with no structural issues. New Arctic Fox retails $50,000-$70,000; units almost never hit auction, but when they do (estate sale, fleet retirement) hammer prices land between $20,000-$30,000. Sister brand Outdoors RV shares the same factory and frames. Audit checklist: inspect frame welds, check underbelly insulation and heated tank system, run the furnace in both LP and electric modes.","note":"Independent Oregon builder of the Arctic Fox and Nash lines, never absorbed by the big RV conglomerates. It uses welded aluminum framing, laminated fiberglass composite walls, and a heated enclosed underbelly for true four season use, and it has had far fewer recalls than the big volume brands.","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.getawaycouple.com/northwood-manufacturing/"}],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["travel-trailer"]},{"slug":"escape-trailer-industries","name":"Escape Trailer Industries","verdict":"buy","headline":"Molded fiberglass shell built as one continuous piece top and bottom, bonded together, with no seams, no stapled aluminum siding and no luan backing to soak up moisture; owners report 15-20 years of use with zero delamination. Factory-direct out of Chilliwack, BC, cutting out dealer markup, with the flagship 30-ft Escape 5.0 running $60-70K.","note":"Escape builds a one-piece molded fiberglass shell on Dexter torsion axles, with base prices under $50,000 sold factory direct. Its flagship Escape 5.0 fifth wheel is about 21 feet long and runs in the $50,000 to $70,000 range once you add options.","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://azdelonboard.com/rv-brands-using-azdel/ ; https://escapetrailer.com/21ft-5-trailer/"}],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}}],"segments":["travel-trailer","molded-fiberglass"]},{"slug":"newmar","name":"Newmar","verdict":"buy","headline":"Newmar is still one of the safest names in Class A diesel motorhomes, and the basics check out: real Spartan or Freightliner chassis, a 450 hp Cummins, and a factory that has built coaches in the same Indiana town since 1968. But do not buy on the name alone. Coaches built from 2020 through 2022 had a pile of federal recalls and the loudest owner complaints, so inspect those years hard, and know that the 5 year structural warranty only covers the first owner and does not transfer when you buy used.","note":"The channel contradicted itself because both stories are true, just for different years. Winnebago really did buy Newmar in 2019, and the 2020 to 2022 builds really did have a recall cluster (steering fasteners, fuel lines, seat pedestals) plus loud owner complaints about slides, windows, and slow warranty service. The recall rate dropped from 2023 on, though a handful of smaller campaigns continued (seat belts, seat pedestals, a 2024 steering gear recall on Spartan chassis, instrument cluster software, baggage door skins). So the split is by build year, not by brand.","confidence":"medium","unestablished":"Could not verify the \"4.3 out of 5 across nearly 400 reviews\" owner rating (the review site blocked access). Could not verify that every coach is signed by the worker who built it, that units pass 300 plus inspection points, or the Mennonite principles framing; none of that appears on Newmar's own history or product pages. Also no baseline exists to say whether Newmar's post-2019 problem rate is worse than peer luxury brands; owner complaints are real but not countable.","splits":[{"scope":"Pre-2019 legacy builds (used market)","verdict":"buy","why":"Built before the acquisition and before the COVID rush. Watch for fogged windows and slide wear, and remember the structural warranty died with the first owner."},{"scope":"2020 to 2022 model years","verdict":"caution","why":"The recall cluster lands here: steering gear and critical fastener recalls (21V088, 22V166), hydraulic steering pump (21V822), Cummins L9 fuel line recalls (21V604, 21V642), and seat pedestal recalls. This is also when owner complaints about slides, paint, and service waits peaked."},{"scope":"2023 and newer","verdict":"buy","why":"Recall volume dropped meaningfully after 2022, but it did not go to zero. Campaigns since 2023 include seat belt anchorages (23V469), seat pedestals (24V019), a 2024 steering gear recall on Spartan chassis coaches (24V052), instrument cluster software (24V275), a cooktop circuit board (24V301), and baggage door skins coming loose (25V431). The steering recall (24V052) is the one still serious item, so confirm that recall work is done during your pre-purchase inspection."},{"scope":"Warranty and service expectations, any year","verdict":"caution","why":"Only a 1 year limited warranty plus a 5 year structural warranty that is non-transferable. Owners report months-long repair waits and Newmar pointing at vendors instead of owning fixes."}],"proof":[{"fact":"Winnebago Industries announced it would buy Newmar on September 16, 2019 for about $344 million ($270 million cash plus 2 million shares), with Newmar staying in Nappanee, Indiana and Matthew Miller staying on as president.","source":"https://www.globenewswire.com/news-release/2019/09/16/1915855/0/en/Winnebago-Industries-to-Acquire-Premium-RV-Manufacturer-Newmar.html"},{"fact":"Newmar's current warranty is a 1 year unlimited mile limited warranty plus a 5 year structural warranty that applies only to the original purchaser and is non-transferable.","source":"https://www.newmarcorp.com/owners/warranty-information"},{"fact":"NHTSA data shows a dense recall cluster on 2020 to 2022 Newmar diesel pushers, including steering gear mounting (21V088), steering critical fasteners (22V166), hydraulic steering pump machining defect (21V822), Cummins L9 fuel line recalls (21V604, 21V642), and seat pedestal recalls (22V234, 24V019). Recall cadence slowed but did not stop after 2022: post-2022 campaigns include seat belt anchorages (23V469), seat pedestals (24V019), a steering gear internal foreign material recall on Spartan-chassis coaches with possible loss of power steering (24V052, February 2024), instrument cluster software on 2024 to 2025 Bay Star (24V275), a Suburban cooktop LED circuit board on 2022 Bay Star (24V301), and baggage door skins on 2016 to 2024 King Aire plus 2023 to 2024 Essex and London Aire (25V431, June 2025). The 24V052 recall means steering recalls were not fully confined to 2020 to 2022.","source":"https://api.nhtsa.gov/recalls/recallsByVehicle?make=newmar&model=dutch%20star&modelYear=2022"},{"fact":"Campaign-level NHTSA record for the hydraulic steering pump machining defect recall (21V822) affecting King Aire, Essex, and London Aire coaches.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=21V822000"},{"fact":"Campaign-level NHTSA record for the baggage door skin recall (25V431), covering 2016 to 2024 King Aire plus 2023 to 2024 Essex and London Aire, 541 units total, reported June 27, 2025.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=25V431000"},{"fact":"In a 2024-era owner thread, Newmar owners of 2019 and newer coaches report fogged windows, paint and woodwork failures, slide misalignment, KIB and Silverleaf electronics failures, months-long parts waits, and Newmar blaming vendors; no owner in the thread defends current quality, and one longtime repeat buyer switched to an Entegra Cornerstone.","source":"https://rvforums.com/threads/newmar-not-taking-accountability-passing-the-blame-on-quality-to-vendors.17617/"},{"fact":"Newmar introduced the first motorhome with power slide-outs in 1991, per Family RVing Magazine's 50 year company history, which also notes average employee tenure over 12 years at the Nappanee plant.","source":"https://magazine.frva.com/2017/08/01/newmar-corporation-50-years-of-innovation/"},{"fact":"The Newmar Dutch Star rides on the Spartan K2 450 chassis with a Cummins L9 making 450 hp and 1,250 lb-ft of torque, confirming the channel's powertrain claim.","source":"https://spartanrvchassis.com/chassis/k2-450-chassis/newmar-dutch-star-40-and-43-2/"},{"fact":"Newmar's own 2026 King Aire page lists the standard lithium battery system at 640 amp hours, not roughly 1,000.","source":"https://www.newmarcorp.com/models/king-aire/2026-king-aire"}],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}},{"source":{"videoId":"CVtWg2wgbUA","title":"6 More RV Brands That Were Trusted In 2018 — And Are Now Unrecognizable","url":"https://youtu.be/CVtWg2wgbUA"}},{"source":{"videoId":"QApMLFeGB_U","title":"6 RV Brands That Were JUNK In 1998 — And Are Now Premium (The Reverse Quality Collapse)","url":"https://youtu.be/QApMLFeGB_U"}}],"segments":["class-a"]},{"slug":"outdoors-rv","name":"Outdoors RV","verdict":"buy","headline":"Fully welded aluminum framing (La Grande, Oregon) with oversized fresh/waste tanks and real wall insulation for genuine four-season use, versus premium trailers with a 'heated tank sticker' that is cosmetic on a three-season box. Owners report no serious structural failures running these rigs hard across mountain country for years. (Video intro line says 'Outdoorsy'; the body consistently says 'Outdoors RV', the real La Grande, OR brand.)","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["travel-trailer"]},{"slug":"scamp","name":"Scamp","verdict":"buy","headline":"Molded fiberglass since 1972 out of Backus, Minnesota; two-piece clam shell bonded at one central seam, no wood framing in the walls; 1970s-era units are still on the road, and 40-year-old Scamps (original price under $2,000) now sell for $5,000-7,000.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}},{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["molded-fiberglass"]},{"slug":"bigfoot","name":"Bigfoot","verdict":"buy","headline":"Building fiberglass trailers and truck campers in British Columbia since 1978. Walls are two thick fiberglass tubs joined at the center belt line with sealant, no aluminum ribs or wood studs, and the top series is rated to about minus 10 degrees F with a heated enclosed underbelly. One owner sold a 5 season old unit for exactly what they paid, with the buyer driving 1,000 miles to pick it up sight unseen.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://bigfootrv.com/"}],"citations":[{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}},{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["molded-fiberglass"]},{"slug":"cortez-campers","name":"Cortez Campers","verdict":"buy","headline":"Newest brand on the list, built by US Lighting Group; zero wood anywhere inside, cabinets, storage, doors, and drawers are molded fiberglass with acrylic doors and stainless hardware, using a monocoque biaxial fiberglass design that shaves nearly 1,000 lbs off the Cortez 17 versus a traditionally framed trailer of the same length. Honest caveat stated on-camera: it lacks the 30-year track record of Scamp or Casita.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}}],"segments":["molded-fiberglass"]},{"slug":"grech-rv","name":"Grech RV","verdict":"buy","headline":"UL 1973 certified lithium-ion battery platform (an independent safety certification most RV battery systems skip), 3-year/36,000-mile craftsmanship warranty plus Mercedes-Benz coverage to 100,000 miles, and up to 14 hours of air conditioning on battery power alone versus 2-3 hours on most production Class B vans.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"storyteller-overland","name":"Storyteller Overland","verdict":"buy","headline":"Volta lithium battery bank with boost mode and dual alternator charging gives owners near-endless off-grid power; tight panel gaps and hardware that's bolted, not glued. Caveat: some owners on the Sprinter platform report friction between the Mercedes chassis warranty and Storyteller's conversion warranty on certain electrical issues.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"airstream-interstate","name":"Airstream Interstate","verdict":"buy","headline":"Holds roughly 70% resale value after 5 years versus the industry average 20-30% first-year loss; aluminum shell construction resists rust and deterioration for decades. Trade-off: the advanced systems require more owner familiarity and aren't plug-and-play for RV first-timers.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"pleasure-way","name":"Pleasure-Way","verdict":"buy","headline":"400 man-hours / 6 weeks to hand-fit each unit to its individual chassis versus the 2.5-day industry average; uses Glasurit automotive paint (the same finish used on Rolls-Royce and Bentley); 600 amp-hours of Eco-Ion lithium iron phosphate batteries standard. Cited owner example: a 2007 unit at 139,000 miles still starts right up with solid cabinetry.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"advanced-rv","name":"Advanced RV","verdict":"buy","headline":"Fully custom, commissioned builds (no fixed floor plans) starting around $550,000 with roughly 16 kWh of stored battery energy and computer-controlled air ride suspension; 3-year warranty on the conversion, and the same team that builds the van continues servicing it at year 5, 8, and 12.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"goodyear-endurance","name":"Goodyear Endurance","verdict":"buy","headline":"Goodyear's replacement line for the Marathon, engineered specifically to fix the failure modes with a heat-resistant compound and a far higher speed rating - positioned in the video as the corrected, trustworthy successor tire.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"entegra-coach","name":"Entegra Coach","verdict":"buy","headline":"4.1 out of 5 overall and 4.6 out of 5 specifically on its diesel pushers (Cornerstone, Anthem, Aspire, Reatta) - one of the highest owner ratings in the Class A segment. Caution: starting in 2026 production of the successor diesel coaches is moving from the original Indiana factory to the Tiffin factory in Red Bay, Alabama, so the newest model-year units carry a question mark until the new line proves itself.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}}],"segments":["class-a"]},{"slug":"foretravel","name":"Foretravel","verdict":"buy","headline":"current flagship the Realm pairs a Spartan K4 chassis with a 605 horsepower Cummins engine","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://rv.spartanmotors.com/chassis/k4-605-chassis/foretravel-realm-fs6/"}],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}}],"segments":["class-a"]},{"slug":"newell-coach","name":"Newell Coach","verdict":"buy","headline":"Roughly 50 years building coaches, only about 30 built per year, each on its own custom-engineered body and chassis rather than a converted bus; runs a customer hotline staffed 24 hours a day, 365 days a year; current flagship Newell P50 is 45 feet long with four slide-outs.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}}],"segments":["class-a"]},{"slug":"brinkley-rv","name":"Brinkley RV","verdict":"buy","headline":"Didn't exist until 2022; first trailers hit the road in 2023, built by industry veterans. Designs frames in SolidWorks engineering software specifying metal gauge and coating, then tests two to five units every month on test tracks, including loading a trailer rated for 23,500 lb with 27,000 lb, with no frame failures so far. Deliberately slows its assembly line to about 16 units a day versus the 28-30/day the founders' former plants pushed with the same crew size. Uses Azdel composite on both inner and outer wall substrate (no wood in the sidewall to rot), a painted aluminum skin, brass plumbing elbows with an individual shutoff valve at every fixture, and one-piece molded showers; rolled out nine new models across four series for 2026. Caveat: the brand is new and a handful of minor cosmetic fiberglass cracks have shown up, so verify the current unit.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"shDHmM9vF0k","title":"The Only 3 RV Brands Getting BETTER Every Year While Everyone Else Falls Apart","url":"https://youtu.be/shDHmM9vF0k"}}],"segments":["travel-trailer"]},{"slug":"northwood-arctic-fox","name":"Northwood Arctic Fox","verdict":"buy","headline":"Sits on a Northwood-built, fully welded, thick-wall aluminum frame built in-house rather than the cheapest outsourced frame with a wood box stapled on top; building the Arctic Fox since 1991 with heated tanks, heavy insulation and solid cabinetry for real four-season use.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"iMrSSlvJkno","title":"5 RV Brands That Break Down In 2 Years And 3 That Actually Last","url":"https://youtu.be/iMrSSlvJkno"}}],"segments":["mixed"]},{"slug":"rockwood-and-flagstaff","name":"Rockwood and Flagstaff","verdict":"buy","headline":"Built by Forest River, but run by a team that went a different direction from the rest of that portfolio: laminated construction with Azdel composite in the walls, properly sealed, out-reviewing their own budget Forest River stablemates by a wide margin -- proof the fix is a choice rather than a cost problem, since it uses the same corporate parent and suppliers as the failing lines.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"h3G2uMC4aLc","title":"5 RV Brands That Finally Fixed Their WORST Problems (And 3 That Still Haven't)","url":"https://youtu.be/h3G2uMC4aLc"}}],"segments":["mixed"]},{"slug":"nucamp-rv","name":"nuCamp RV","verdict":"buy","headline":"Built in small batches by a family owned Ohio company, a tiny fraction of the volume that giants like Thor push out every day.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.crainscleveland.com/article/20180119/news/149211/big-growth-comes-little-trailers-nucamp-rv"}],"citations":[{"source":{"videoId":"o9KXlF26Vwg","title":"6 CHEAP RV Brands EVERYONE IGNORES — But They Outlast $80K Premium Units (Side-By-Side Proof)","url":"https://youtu.be/o9KXlF26Vwg"}}],"segments":["mixed"]},{"slug":"northwood-and-arctic-fox","name":"Northwood and Arctic Fox","verdict":"buy","headline":"Aluminum frame with composite sidewalls instead of wood and insulation built for real winter conditions. Because composite walls and aluminum framing don't rot, full-timers and boondockers who run these for years avoid accumulating a delamination bill and keep the trailers a decade or more.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"knIjzi8-h3I","title":"The Only 4 RV Brands With Maintenance Costs That Don't Explode After Year 5","url":"https://youtu.be/knIjzi8-h3I"}}],"segments":["travel-trailer"]},{"slug":"four-wheel-campers","name":"Four Wheel Campers","verdict":"buy","headline":"The Hawk (pop-up) weighs roughly 1,200-1,300 lb dry, built with welded aluminum framing, block foam insulation, and a manual gas-strut pop-up with no motors or electronics to fail. Built in Woodland, California, and every camper is individually weighed on a scale before it leaves the factory, with the actual weight documented in the pickup paperwork.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"JEs1SYskK1E","title":"The Only 4 Truck Campers That WON'T Destroy Your Truck (The \"Safe Hauler\" List)","url":"https://youtu.be/JEs1SYskK1E"}}],"segments":["truck-camper"]},{"slug":"northstar","name":"Northstar","verdict":"buy","headline":"The Liberty is Northstar's shortest/lightest model at 1,775 lb dry, purpose-built for half-ton trucks with 5-6 ft beds. Composite-and-aluminum construction with a fiberglass exterior resists delamination and UV degradation; low production volume means individual per-unit quality control, and the company publishes honest wet weights rather than stripped marketing weights.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"JEs1SYskK1E","title":"The Only 4 Truck Campers That WON'T Destroy Your Truck (The \"Safe Hauler\" List)","url":"https://youtu.be/JEs1SYskK1E"}}],"segments":["truck-camper"]},{"slug":"alaskan-campers","name":"Alaskan Campers","verdict":"buy","headline":"The 630 uses a telescopic hard shell design in aluminum and fiberglass that Alaskan has hand built for over 65 years, since the first telescopic campers launched in 1958. Today they are built in Winlock, Washington. Build quality is durable enough that units from the 1970s and 80s are still in active use, not as restoration pieces.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.alaskancampers.com/history/"}],"citations":[{"source":{"videoId":"JEs1SYskK1E","title":"The Only 4 Truck Campers That WON'T Destroy Your Truck (The \"Safe Hauler\" List)","url":"https://youtu.be/JEs1SYskK1E"}}],"segments":["truck-camper"]},{"slug":"nash","name":"Nash","verdict":"buy","headline":"Northwood Manufacturing's affordable sibling line to the premium Arctic Fox, built in the same Oregon factory on a welded heavy-gauge boxed aluminum framework, steel chassis, one-piece composite walls, and high-density foam block insulation. A verified owner who also owns an Airstream ran them head-to-head and found the Northwood stayed cooler and quieter.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["mixed"]},{"slug":"fogatti","name":"Fogatti","verdict":"buy","headline":"The InstaShower tankless line puts out 55,000 BTU and up to 2.9 gallons per minute with a remote controller, plus flameout, antifreeze, overheat, and overpressure protection. It is a newer brand still building its long-term track record, but it dragged tankless pricing down into reach for normal buyers.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://fogattiliving.com/products/fogatti-rv-tankless-water-heater"}],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"furrion","name":"Furrion","verdict":"buy","headline":"One of the first three tankless brands manufacturers reach for at the factory. Its tankless unit puts out 60,000 BTU (top of the category) at 2.4 GPM flow. The specific reason it makes this list is that Furrion engineers specifically against RV road vibration, not just raw heating output.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"girard","name":"Girard","verdict":"buy","headline":"Early Girard tankless units were finicky: temperature swings, and the burner would drop out if water flow got too low or park pressure fluctuated. The brand is on this list because it fixed those issues over time ,  customer service improved in recent reports, and the current unit delivers 42,000 BTU, runs on 12V, is built for winter use, sips roughly half the propane of a 6-gallon tank, drops into a standard cutout, carries a 2-year warranty, and uses a microprocessor to hold temperature steady.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"precisiontemp","name":"PrecisionTemp","verdict":"buy","headline":"The RV550 puts out 55,000 BTU and uses PrecisionTemp's VariFlame control system, which holds the water temperature steady no matter how the flow changes.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://precisiontemp.com/products/rv-550/"}],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"truma","name":"Truma","verdict":"buy","headline":"A German company whose AquaGo unit is called out as the #1 pick. It uses a hybrid design ,  a small temperature-stabilizing mixing vessel holding output near 120°F like a tank heater, while still heating on demand. A microprocessor scales the burner from 20,000 to 60,000 BTU and fires at flows as low as 0.4 GPM, plus a built-in decalcification system to fight hard-water buildup. The unit runs north of $1,300 and requires a certified installer, but owners report burning less propane than expected and would not go back to a tank.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]}],"modules":[]}</script>
<script>
(function(){
var D = JSON.parse(document.getElementById('pdata').textContent);
var KEY = 'rvg_' + D.tier;
function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; } }
function save(s){ try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e){} }
var S = load();
S.reviewed = S.reviewed || {}; S.shortlist = S.shortlist || {}; S.checks = S.checks || {};
var app = document.getElementById('app');
var esc = function(s){ return String(s==null?'':s).replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; }); };

// ---- which segments does this copy cover ----
// The five buyer-facing rig segments sold on the site. Multi-segment makers are
// tagged "mixed" in the data and belong in EVERY segment view.
var PICK = ['travel-trailer','fifth-wheel','class-a','class-b','molded-fiberglass'];
function grantedSegs(){
  if (!D.oneSegment) return Object.keys(D.segments);
  return S.seg ? [S.seg, 'mixed'] : [];
}
function brandsFor(segs){
  var slugs = {};
  segs.forEach(function(s){ (D.bySegment[s]||[]).forEach(function(x){ slugs[x]=1; }); });
  return D.brands.filter(function(b){ return slugs[b.slug]; });
}

// ---- progress = reviewed brands + checklist items done ----
function progress(){
  var bs = brandsFor(grantedSegs());
  var rev = bs.filter(function(b){ return S.reviewed[b.slug]; }).length;
  var ckTotal = 0, ckDone = 0;
  D.modules.forEach(function(m){ m.sections.forEach(function(sec, si){ (sec.checklist||[]).forEach(function(_, ii){
    ckTotal++; if (S.checks[m.key+'.'+si+'.'+ii]) ckDone++; }); }); });
  var total = bs.length + ckTotal, done = rev + ckDone;
  return { done: done, total: total, rev: rev, brands: bs.length };
}
function paintProgress(){
  var p = progress();
  var pct = p.total ? Math.round(100 * p.done / p.total) : 0;
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('pnum').textContent = pct + '%';
}

// ---- views ----
var VIEW = 'guide';
function tabs(){
  var t = [ ['guide', 'The verdicts'], ['shortlist', 'My shortlist'] ];
  D.modules.forEach(function(m){ t.push(['m_'+m.key, m.title.replace('The ','')]); });
  return '<div class="tabs">' + t.map(function(x){
    return '<button class="tab' + (VIEW===x[0]?' on':'') + '" data-v="' + x[0] + '">' + esc(x[1]) + '</button>';
  }).join('') + '</div>';
}

function milestone(){
  var p = progress();
  if (!p.brands) return '';
  if (p.rev === p.brands) return '<div class="milestone"><span class="mi">\u2713</span>You have reviewed every brand in your guide. You know this market better than the salesman now.</div>';
  if (p.rev >= 10) return '<div class="milestone"><span class="mi">' + p.rev + '</span>' + p.rev + ' brands reviewed. Keep going, ' + (p.brands - p.rev) + ' left in your segments.</div>';
  if (p.rev >= 3) return '<div class="milestone"><span class="mi">' + p.rev + '</span>Good start: ' + p.rev + ' brands down. Mark each brand reviewed as you read it, the bar up top tracks your homework.</div>';
  return '';
}

var Q = '', F = 'all';
function guideView(){
  var segs = grantedSegs();
  var html = '';
  if (D.oneSegment && !S.seg) {
    html += '<div class="hello"><p class="kick">Step 1 of 1</p><h1>Which rig are you shopping for?</h1>' +
      '<p>Your guide covers one segment, every brand in it. Pick yours. This sets your copy; choose carefully.</p><div class="segpick">' +
      PICK.map(function(k){ return '<button class="segbtn" data-seg="' + k + '">' + esc(D.segments[k] || k) + '</button>'; }).join('') +
      '</div></div>';
    return html;
  }
  html += '<div class="hello"><p class="kick">How to use this guide</p>' +
    '<h1>Every brand, one verdict, and the receipt.</h1>' +
    '<p>Read your segment before you set foot on a lot. Tap <b>Mark reviewed</b> on each brand as you go, and add the ones worth your money to <b>My shortlist</b>. The shortlist prints clean, take it with you.</p></div>';
  html += milestone();
  html += '<div class="controls"><input class="search" id="q" placeholder="Search a brand name" value="' + esc(Q) + '">' +
    ['all','buy','caution','avoid'].map(function(f){
      return '<button class="fchip f-' + f + (F===f?' on':'') + '" data-f="' + f + '">' + f.toUpperCase() + '</button>';
    }).join('') + '</div>';
  var list = brandsFor(segs).filter(function(b){
    if (F !== 'all' && b.verdict !== F) return false;
    if (Q && b.name.toLowerCase().indexOf(Q.toLowerCase()) < 0) return false;
    return true;
  });
  if (!list.length) html += '<p class="empty">No brands match. Clear the search or filter.</p>';
  list.forEach(function(b){ html += brandCard(b); });
  html += '<p style="margin-top:20px"><button class="printbtn" onclick="window.print()">Print this view</button></p>';
  return html;
}

function brandCard(b){
  var h = '<div class="brand v-' + b.verdict + '" id="b-' + b.slug + '">';
  h += '<div class="bhead"><p class="bname">' + esc(b.name) + '</p><span class="tag ' + b.verdict + '">' + b.verdict + '</span></div>';
  h += '<p class="bhl">' + esc(b.headline) + '</p>';
  if (b.note) h += '<div class="bnote"><b>The nuance:</b> ' + esc(b.note) + '</div>';
  if (b.splits.length) h += '<ul class="splits">' + b.splits.map(function(s){
    return '<li><span class="tag ' + s.verdict + '">' + s.verdict + '</span><span><b>' + esc(s.scope) + '.</b> ' + esc(s.why) + '</span></li>';
  }).join('') + '</ul>';
  if (b.proof.length) h += '<p class="receipts"><b>Receipts:</b> ' + b.proof.map(function(p){
    return esc(p.fact) + (p.source ? ' (<a href="' + esc(p.source) + '" target="_blank" rel="noopener">source</a>)' : '');
  }).join(' \u00b7 ') + '</p>';
  else if (b.citations.length) h += '<p class="receipts"><b>From our published investigations:</b> ' + b.citations.map(function(c){
    return '<a href="https://www.youtube.com/watch?v=' + esc(c.source) + '" target="_blank" rel="noopener">watch</a>';
  }).join(' \u00b7 ') + '</p>';
  if (b.unestablished) h += '<p class="unest">What we could not confirm: ' + esc(b.unestablished) + '</p>';
  var rev = S.reviewed[b.slug], sl = S.shortlist[b.slug];
  h += '<div class="bacts">' +
    '<button class="babtn' + (rev?' done':'') + '" data-rev="' + b.slug + '">' + (rev ? '\u2713 Reviewed' : 'Mark reviewed') + '</button>' +
    '<button class="babtn' + (sl?' listed':'') + '" data-sl="' + b.slug + '">' + (sl ? '\u2605 On my shortlist' : '+ My shortlist') + '</button>' +
    '</div></div>';
  return h;
}

function shortlistView(){
  var picks = D.brands.filter(function(b){ return S.shortlist[b.slug]; });
  var h = '<div class="shortlist-box"><p class="kick" style="font-family:var(--anton);font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--mark);margin:0 0 6px">My shortlist</p>';
  h += '<h1>The brands worth your money.</h1>';
  if (!picks.length) h += '<p class="empty">Nothing here yet. Go to The verdicts and tap "+ My shortlist" on the brands you would actually buy. Then print this page and take it to the lot.</p>';
  else h += '<p>' + picks.length + ' brand' + (picks.length>1?'s':'') + ' made your cut. Print this page, it is your lot-day cheat sheet.</p>';
  h += '</div>';
  picks.forEach(function(b){ h += brandCard(b); });
  if (picks.length) h += '<p><button class="printbtn" onclick="window.print()">Print my shortlist</button></p>';
  return h;
}

function ring(pct){
  var r = 26, c = 2 * Math.PI * r;
  return '<svg width="64" height="64" viewBox="0 0 64 64">' +
    '<circle cx="32" cy="32" r="' + r + '" fill="none" stroke="#263844" stroke-width="7"/>' +
    '<circle cx="32" cy="32" r="' + r + '" fill="none" stroke="#F5913B" stroke-width="7" stroke-linecap="round" ' +
    'stroke-dasharray="' + c + '" stroke-dashoffset="' + (c * (1 - pct/100)) + '" transform="rotate(-90 32 32)"/>' +
    '<text x="32" y="37" text-anchor="middle" fill="#F0F3F5" font-family="Barlow,Arial" font-weight="800" font-size="15">' + pct + '%</text></svg>';
}

function moduleView(key){
  var m = D.modules.filter(function(x){ return x.key === key; })[0];
  if (!m) return '';
  var total = 0, done = 0;
  m.sections.forEach(function(sec, si){ (sec.checklist||[]).forEach(function(_, ii){ total++; if (S.checks[m.key+'.'+si+'.'+ii]) done++; }); });
  var h = '<div class="hello"><h1>' + esc(m.title) + '</h1><p>' + esc(m.intro) + '</p>';
  if (total) h += '<div class="ring">' + ring(total ? Math.round(100*done/total) : 0) + '<span class="rl"><b>' + done + ' of ' + total + '</b> checks done. Work through every box before you sign anything.</span></div>';
  h += '</div>';
  m.sections.forEach(function(sec, si){
    h += '<div class="modsec"><h2 style="margin-top:0">' + esc(sec.heading) + '</h2>';
    h += sec.body.split('\n\n').map(function(p){
      if (/^WALK AWAY:/i.test(p)) return '<div class="walkaway"><b>WALK AWAY:</b> ' + esc(p.replace(/^WALK AWAY:\s*/i,'')) + '</div>';
      return '<p>' + esc(p) + '</p>';
    }).join('');
    if ((sec.checklist||[]).length) h += '<ul class="ck">' + sec.checklist.map(function(item, ii){
      var k = m.key + '.' + si + '.' + ii;
      return '<li class="' + (S.checks[k]?'on':'') + '" data-ck="' + k + '"><span class="box">\u2713</span><span>' + esc(item) + '</span></li>';
    }).join('') + '</ul>';
    if ((sec.sources||[]).length) h += '<p class="srcs">Sources: ' + sec.sources.map(function(s){
      return '<a href="' + esc(s) + '" target="_blank" rel="noopener">' + esc(s.replace(/^https?:\/\/(www\.)?/,'').split('/')[0]) + '</a>';
    }).join(' \u00b7 ') + '</p>';
    h += '</div>';
  });
  h += '<p><button class="printbtn" onclick="window.print()">Print this module</button></p>';
  return h;
}

function render(){
  var h = tabs();
  if (VIEW === 'guide') h += guideView();
  else if (VIEW === 'shortlist') h += shortlistView();
  else h += moduleView(VIEW.slice(2));
  app.innerHTML = h;
  paintProgress();
  var q = document.getElementById('q');
  if (q) q.addEventListener('input', function(){ Q = q.value;
    var keep = q.selectionStart; render(); var q2 = document.getElementById('q'); q2.focus(); q2.setSelectionRange(keep, keep); });
}

app.addEventListener('click', function(e){
  var t = e.target.closest('[data-v],[data-f],[data-rev],[data-sl],[data-seg],[data-ck]');
  if (!t) return;
  if (t.dataset.v) { VIEW = t.dataset.v; window.scrollTo(0,0); render(); }
  else if (t.dataset.f) { F = t.dataset.f; render(); }
  else if (t.dataset.seg) { S.seg = t.dataset.seg; save(S); render(); }
  else if (t.dataset.rev) { S.reviewed[t.dataset.rev] = !S.reviewed[t.dataset.rev]; save(S); render(); }
  else if (t.dataset.sl) { S.shortlist[t.dataset.sl] = !S.shortlist[t.dataset.sl]; save(S); render(); }
  else if (t.dataset.ck) { S.checks[t.dataset.ck] = !S.checks[t.dataset.ck]; save(S); render(); }
});

render();
})();
</script>
</body></html>
