and it covers the repair under warranty for 3 years, but it never issued a recall for it. Buy the trailers, and check the front molding rivets on any 2018 to 2022 you look at. Be careful with the Basecamp, which has pulled recalls for the door window glass letting go (1,992 units) and the roof air conditioner working loose (1,509 units). Skip the Atlas motorhome: for a line that builds only a couple hundred units a year, it has racked up four separate fire risk wiring recalls, and one owner had structural cracking five days after delivery.","note":"The famous rear-end separation story is dated folklore. It is a 1960s and 1970s problem, concentrated in mid-70s rear-bath models 27 feet and up, caused when federally mandated grey tanks added rear weight to frames never strengthened for it. It is irrelevant to anything you would buy new. The real modern issue is FRONT end separation, which our videos never mentioned and almost nobody covers.","confidence":"medium-high","unestablished":"FES incidence rate is unknown (no recall, no manufacturer disclosure, forum-reported only). We can prove it is real and current, we cannot say what percent of trailers get it. Whether the 2023 bracket fix actually solved it is too recent to know. No rigorous resale dataset exists.","splits":[{"scope":"Aluminum travel trailers under 25 feet (Bambi, Caravel, small Flying Cloud)","verdict":"buy","why":"The core product, and the front end separation pattern does not concentrate here."},{"scope":"Aluminum travel trailers 25 feet and up with a front bed, 2018 to 2022","verdict":"caution","why":"Front end separation window. Inspect the rivets behind the front molding before you buy."},{"scope":"Aluminum travel trailers, 2023 and newer","verdict":"buy","why":"Airstream added corner bracket reinforcement to production around late 2022 and early 2023."},{"scope":"Basecamp (all years)","verdict":"caution","why":"The recall record is disproportionate to its volume. It is the problem child, not the flagship."},{"scope":"Interstate and Rangeline (Sprinter Class B)","verdict":"caution","why":"The motorhomes generate the lemon litigation. The towables do not."},{"scope":"Atlas (Sprinter Class B+)","verdict":"avoid","why":"Four separate fire risk electrical defects on a line building only a couple hundred units a year."}],"proof":[{"fact":"24 recall campaigns across model years 2018-2026, every one filed under \"Airstream, Inc.\" and never co-listed with a Thor sibling brand. Airstream builds only at Jackson Center, Ohio, in its own plant."},{"fact":"NHTSA 22V932000 (December 15, 2022, 1,992 units) covers 2017-2022 Basecamp 16 and 2021-2022 Basecamp 20. The adhesive bond between the glass and the metal frame of the entry door window can fail and the glass separates."},{"fact":"NHTSA 21V195000 (March 19, 2021, 1,509 units) covers 2017-2020 Basecamp: roof air conditioner mounting bolts may loosen or break, allowing the unit to detach from the roof. NHTSA 23V860000 (December 19, 2023, 1,587 units) covers Basecamp 20X spare tire carrier metal fatigue, tire detaches."},{"fact":"Four separate fire-risk electrical defects on the Class B motorhomes, and they are Airstream-built, not Mercedes: 19V734000 (Atlas, 151 units, breaker terminal miswired), 21V344000 (Interstate Nineteen, 256 units, buss bar miswired), 23V327000 (Atlas, 41 units, 16-gauge wire under-protected by a 20-amp fuse), 24V314000 (Atlas, 8 units, generator installed with no heat shield)."},{"fact":"Kim v. Airstream (California Court of Appeal, 2nd District, July 2025). Documented lemon claims include a 2023 Atlas with structural fiberglass cracking within five days of delivery and repeated failed repairs, and a 136,000 dollar 2023 Rangeline with 10 service visits, roof leaks and mold."},{"fact":"Front end separation is corroborated by multiple independent airforums threads plus a third-party shop selling an engineered FES repair as a product line. A business does not build a service around a problem that does not exist."}],"citations":[{"source":{"videoId":"shDHmM9vF0k","title":"The Only 3 RV Brands Getting BETTER Every Year While Everyone Else Falls Apart","url":"https://youtu.be/shDHmM9vF0k"}},{"source":{"videoId":"ttTN7u9illM","title":"The Only 5 Travel Trailer Brands That WON'T Fail You In 2026 (Everyone Else Got Worse)","url":"https://youtu.be/ttTN7u9illM"}},{"source":{"videoId":"4y3oZUhKtBg","title":"5 RV Brands That Were Bulletproof in 2015—Now Falling Apart After One Trip","url":"https://youtu.be/4y3oZUhKtBg"}}],"segments":["travel-trailer"]},{"slug":"casita","name":"Casita","verdict":"buy","headline":"Building lightweight travel trailers out of Rice, Texas since 1983 using molded fiberglass ,  no wood studs to rot, no luan panels to delaminate, no seams to leak, built as one continuous fiberglass shell. New retail runs $25,000-$35,000; they almost never show up at auction because owners keep them forever, but when one does (estate sale, lifestyle change) hammer prices land between $12,000-$18,000. Audit checklist: check the fiberglass for impact cracks, inspect axle and bearings, test the appliances.","note":"A base Casita costs a fraction of a comparable Airstream Bambi. New Casitas start in the low twenty thousands, while the smallest 2026 Bambi lists at about seventy thousand dollars.","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://rvbrokers.com/brands/casita/ ; https://www.rvguide.com/specs/airstream/travel-trailer/2026/bambi/20fb.html"}],"citations":[{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["travel-trailer","molded-fiberglass"]},{"slug":"northwood-manufacturing","name":"Northwood Manufacturing","verdict":"buy","headline":"Built in La Grande, Oregon, manufactures the Arctic Fox and Nash lines and builds its own frames in-house ,  custom heavy-duty steel chassis with heavy-gauge aluminum wall tubing, heated holding tanks in a fully enclosed insulated underbelly, real porcelain toilets, and residential cabinetry with real wood fronts. Arctic Fox owners routinely report 15-20 years of use with no structural issues. New Arctic Fox retails $50,000-$70,000; units almost never hit auction, but when they do (estate sale, fleet retirement) hammer prices land between $20,000-$30,000. Sister brand Outdoors RV shares the same factory and frames. Audit checklist: inspect frame welds, check underbelly insulation and heated tank system, run the furnace in both LP and electric modes.","note":"Independent Oregon builder of the Arctic Fox and Nash lines, never absorbed by the big RV conglomerates. It uses welded aluminum framing, laminated fiberglass composite walls, and a heated enclosed underbelly for true four season use, and it has had far fewer recalls than the big volume brands.","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.getawaycouple.com/northwood-manufacturing/"}],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["travel-trailer"]},{"slug":"escape-trailer-industries","name":"Escape Trailer Industries","verdict":"buy","headline":"Molded fiberglass shell built as one continuous piece top and bottom, bonded together, with no seams, no stapled aluminum siding and no luan backing to soak up moisture; owners report 15-20 years of use with zero delamination. Factory-direct out of Chilliwack, BC, cutting out dealer markup, with the flagship 30-ft Escape 5.0 running $60-70K.","note":"Escape builds a one-piece molded fiberglass shell on Dexter torsion axles, with base prices under $50,000 sold factory direct. Its flagship Escape 5.0 fifth wheel is about 21 feet long and runs in the $50,000 to $70,000 range once you add options.","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://azdelonboard.com/rv-brands-using-azdel/ ; https://escapetrailer.com/21ft-5-trailer/"}],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}}],"segments":["travel-trailer","molded-fiberglass"]},{"slug":"newmar","name":"Newmar","verdict":"buy","headline":"Newmar is still one of the safest names in Class A diesel motorhomes, and the basics check out: real Spartan or Freightliner chassis, a 450 hp Cummins, and a factory that has built coaches in the same Indiana town since 1968. But do not buy on the name alone. Coaches built from 2020 through 2022 had a pile of federal recalls and the loudest owner complaints, so inspect those years hard, and know that the 5 year structural warranty only covers the first owner and does not transfer when you buy used.","note":"The channel contradicted itself because both stories are true, just for different years. Winnebago really did buy Newmar in 2019, and the 2020 to 2022 builds really did have a recall cluster (steering fasteners, fuel lines, seat pedestals) plus loud owner complaints about slides, windows, and slow warranty service. The recall rate dropped from 2023 on, though a handful of smaller campaigns continued (seat belts, seat pedestals, a 2024 steering gear recall on Spartan chassis, instrument cluster software, baggage door skins). So the split is by build year, not by brand.","confidence":"medium","unestablished":"Could not verify the \"4.3 out of 5 across nearly 400 reviews\" owner rating (the review site blocked access). Could not verify that every coach is signed by the worker who built it, that units pass 300 plus inspection points, or the Mennonite principles framing; none of that appears on Newmar's own history or product pages. Also no baseline exists to say whether Newmar's post-2019 problem rate is worse than peer luxury brands; owner complaints are real but not countable.","splits":[{"scope":"Pre-2019 legacy builds (used market)","verdict":"buy","why":"Built before the acquisition and before the COVID rush. Watch for fogged windows and slide wear, and remember the structural warranty died with the first owner."},{"scope":"2020 to 2022 model years","verdict":"caution","why":"The recall cluster lands here: steering gear and critical fastener recalls (21V088, 22V166), hydraulic steering pump (21V822), Cummins L9 fuel line recalls (21V604, 21V642), and seat pedestal recalls. This is also when owner complaints about slides, paint, and service waits peaked."},{"scope":"2023 and newer","verdict":"buy","why":"Recall volume dropped meaningfully after 2022, but it did not go to zero. Campaigns since 2023 include seat belt anchorages (23V469), seat pedestals (24V019), a 2024 steering gear recall on Spartan chassis coaches (24V052), instrument cluster software (24V275), a cooktop circuit board (24V301), and baggage door skins coming loose (25V431). The steering recall (24V052) is the one still serious item, so confirm that recall work is done during your pre-purchase inspection."},{"scope":"Warranty and service expectations, any year","verdict":"caution","why":"Only a 1 year limited warranty plus a 5 year structural warranty that is non-transferable. Owners report months-long repair waits and Newmar pointing at vendors instead of owning fixes."}],"proof":[{"fact":"Winnebago Industries announced it would buy Newmar on September 16, 2019 for about $344 million ($270 million cash plus 2 million shares), with Newmar staying in Nappanee, Indiana and Matthew Miller staying on as president.","source":"https://www.globenewswire.com/news-release/2019/09/16/1915855/0/en/Winnebago-Industries-to-Acquire-Premium-RV-Manufacturer-Newmar.html"},{"fact":"Newmar's current warranty is a 1 year unlimited mile limited warranty plus a 5 year structural warranty that applies only to the original purchaser and is non-transferable.","source":"https://www.newmarcorp.com/owners/warranty-information"},{"fact":"NHTSA data shows a dense recall cluster on 2020 to 2022 Newmar diesel pushers, including steering gear mounting (21V088), steering critical fasteners (22V166), hydraulic steering pump machining defect (21V822), Cummins L9 fuel line recalls (21V604, 21V642), and seat pedestal recalls (22V234, 24V019). Recall cadence slowed but did not stop after 2022: post-2022 campaigns include seat belt anchorages (23V469), seat pedestals (24V019), a steering gear internal foreign material recall on Spartan-chassis coaches with possible loss of power steering (24V052, February 2024), instrument cluster software on 2024 to 2025 Bay Star (24V275), a Suburban cooktop LED circuit board on 2022 Bay Star (24V301), and baggage door skins on 2016 to 2024 King Aire plus 2023 to 2024 Essex and London Aire (25V431, June 2025). The 24V052 recall means steering recalls were not fully confined to 2020 to 2022.","source":"https://api.nhtsa.gov/recalls/recallsByVehicle?make=newmar&model=dutch%20star&modelYear=2022"},{"fact":"Campaign-level NHTSA record for the hydraulic steering pump machining defect recall (21V822) affecting King Aire, Essex, and London Aire coaches.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=21V822000"},{"fact":"Campaign-level NHTSA record for the baggage door skin recall (25V431), covering 2016 to 2024 King Aire plus 2023 to 2024 Essex and London Aire, 541 units total, reported June 27, 2025.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=25V431000"},{"fact":"In a 2024-era owner thread, Newmar owners of 2019 and newer coaches report fogged windows, paint and woodwork failures, slide misalignment, KIB and Silverleaf electronics failures, months-long parts waits, and Newmar blaming vendors; no owner in the thread defends current quality, and one longtime repeat buyer switched to an Entegra Cornerstone.","source":"https://rvforums.com/threads/newmar-not-taking-accountability-passing-the-blame-on-quality-to-vendors.17617/"},{"fact":"Newmar introduced the first motorhome with power slide-outs in 1991, per Family RVing Magazine's 50 year company history, which also notes average employee tenure over 12 years at the Nappanee plant.","source":"https://magazine.frva.com/2017/08/01/newmar-corporation-50-years-of-innovation/"},{"fact":"The Newmar Dutch Star rides on the Spartan K2 450 chassis with a Cummins L9 making 450 hp and 1,250 lb-ft of torque, confirming the channel's powertrain claim.","source":"https://spartanrvchassis.com/chassis/k2-450-chassis/newmar-dutch-star-40-and-43-2/"},{"fact":"Newmar's own 2026 King Aire page lists the standard lithium battery system at 640 amp hours, not roughly 1,000.","source":"https://www.newmarcorp.com/models/king-aire/2026-king-aire"}],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}},{"source":{"videoId":"CVtWg2wgbUA","title":"6 More RV Brands That Were Trusted In 2018 — And Are Now Unrecognizable","url":"https://youtu.be/CVtWg2wgbUA"}},{"source":{"videoId":"QApMLFeGB_U","title":"6 RV Brands That Were JUNK In 1998 — And Are Now Premium (The Reverse Quality Collapse)","url":"https://youtu.be/QApMLFeGB_U"}}],"segments":["class-a"]},{"slug":"outdoors-rv","name":"Outdoors RV","verdict":"buy","headline":"Fully welded aluminum framing (La Grande, Oregon) with oversized fresh/waste tanks and real wall insulation for genuine four-season use, versus premium trailers with a 'heated tank sticker' that is cosmetic on a three-season box. Owners report no serious structural failures running these rigs hard across mountain country for years. (Video intro line says 'Outdoorsy'; the body consistently says 'Outdoors RV', the real La Grande, OR brand.)","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"caAp2_lOWRY","title":"The Only 5 RV Manufacturers That Actually Improved Quality Since 2020 (Everyone Else Got Worse)","url":"https://youtu.be/caAp2_lOWRY"}},{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["travel-trailer"]},{"slug":"scamp","name":"Scamp","verdict":"buy","headline":"Molded fiberglass since 1972 out of Backus, Minnesota; two-piece clam shell bonded at one central seam, no wood framing in the walls; 1970s-era units are still on the road, and 40-year-old Scamps (original price under $2,000) now sell for $5,000-7,000.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}},{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["molded-fiberglass"]},{"slug":"bigfoot","name":"Bigfoot","verdict":"buy","headline":"Building fiberglass trailers and truck campers in British Columbia since 1978. Walls are two thick fiberglass tubs joined at the center belt line with sealant, no aluminum ribs or wood studs, and the top series is rated to about minus 10 degrees F with a heated enclosed underbelly. One owner sold a 5 season old unit for exactly what they paid, with the buyer driving 1,000 miles to pick it up sight unseen.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://bigfootrv.com/"}],"citations":[{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}},{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["molded-fiberglass"]},{"slug":"cortez-campers","name":"Cortez Campers","verdict":"buy","headline":"Newest brand on the list, built by US Lighting Group; zero wood anywhere inside, cabinets, storage, doors, and drawers are molded fiberglass with acrylic doors and stainless hardware, using a monocoque biaxial fiberglass design that shaves nearly 1,000 lbs off the Cortez 17 versus a traditionally framed trailer of the same length. Honest caveat stated on-camera: it lacks the 30-year track record of Scamp or Casita.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6Vs2G-FGiyw","title":"The Only 6 Molded-Fiberglass Travel Trailers That Never Rot (The \"Lifetime\" List)","url":"https://youtu.be/6Vs2G-FGiyw"}}],"segments":["molded-fiberglass"]},{"slug":"grech-rv","name":"Grech RV","verdict":"buy","headline":"UL 1973 certified lithium-ion battery platform (an independent safety certification most RV battery systems skip), 3-year/36,000-mile craftsmanship warranty plus Mercedes-Benz coverage to 100,000 miles, and up to 14 hours of air conditioning on battery power alone versus 2-3 hours on most production Class B vans.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"storyteller-overland","name":"Storyteller Overland","verdict":"buy","headline":"Volta lithium battery bank with boost mode and dual alternator charging gives owners near-endless off-grid power; tight panel gaps and hardware that's bolted, not glued. Caveat: some owners on the Sprinter platform report friction between the Mercedes chassis warranty and Storyteller's conversion warranty on certain electrical issues.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"airstream-interstate","name":"Airstream Interstate","verdict":"buy","headline":"Holds roughly 70% resale value after 5 years versus the industry average 20-30% first-year loss; aluminum shell construction resists rust and deterioration for decades. Trade-off: the advanced systems require more owner familiarity and aren't plug-and-play for RV first-timers.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"pleasure-way","name":"Pleasure-Way","verdict":"buy","headline":"400 man-hours / 6 weeks to hand-fit each unit to its individual chassis versus the 2.5-day industry average; uses Glasurit automotive paint (the same finish used on Rolls-Royce and Bentley); 600 amp-hours of Eco-Ion lithium iron phosphate batteries standard. Cited owner example: a 2007 unit at 139,000 miles still starts right up with solid cabinetry.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"advanced-rv","name":"Advanced RV","verdict":"buy","headline":"Fully custom, commissioned builds (no fixed floor plans) starting around $550,000 with roughly 16 kWh of stored battery energy and computer-controlled air ride suspension; 3-year warranty on the conversion, and the same team that builds the van continues servicing it at year 5, 8, and 12.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"X8dhpwXNJ1c","title":"The Only 5 Class B Van Brands That WON'T Fall Apart (The 'Buy It For Life' List)","url":"https://youtu.be/X8dhpwXNJ1c"}}],"segments":["class-b"]},{"slug":"goodyear-endurance","name":"Goodyear Endurance","verdict":"buy","headline":"Goodyear's replacement line for the Marathon, engineered specifically to fix the failure modes with a heat-resistant compound and a far higher speed rating - positioned in the video as the corrected, trustworthy successor tire.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"entegra-coach","name":"Entegra Coach","verdict":"buy","headline":"4.1 out of 5 overall and 4.6 out of 5 specifically on its diesel pushers (Cornerstone, Anthem, Aspire, Reatta) - one of the highest owner ratings in the Class A segment. Caution: starting in 2026 production of the successor diesel coaches is moving from the original Indiana factory to the Tiffin factory in Red Bay, Alabama, so the newest model-year units carry a question mark until the new line proves itself.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}}],"segments":["class-a"]},{"slug":"foretravel","name":"Foretravel","verdict":"buy","headline":"current flagship the Realm pairs a Spartan K4 chassis with a 605 horsepower Cummins engine","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://rv.spartanmotors.com/chassis/k4-605-chassis/foretravel-realm-fs6/"}],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}}],"segments":["class-a"]},{"slug":"newell-coach","name":"Newell Coach","verdict":"buy","headline":"Roughly 50 years building coaches, only about 30 built per year, each on its own custom-engineered body and chassis rather than a converted bus; runs a customer hotline staffed 24 hours a day, 365 days a year; current flagship Newell P50 is 45 feet long with four slide-outs.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}}],"segments":["class-a"]},{"slug":"brinkley-rv","name":"Brinkley RV","verdict":"buy","headline":"Didn't exist until 2022; first trailers hit the road in 2023, built by industry veterans. Designs frames in SolidWorks engineering software specifying metal gauge and coating, then tests two to five units every month on test tracks, including loading a trailer rated for 23,500 lb with 27,000 lb, with no frame failures so far. Deliberately slows its assembly line to about 16 units a day versus the 28-30/day the founders' former plants pushed with the same crew size. Uses Azdel composite on both inner and outer wall substrate (no wood in the sidewall to rot), a painted aluminum skin, brass plumbing elbows with an individual shutoff valve at every fixture, and one-piece molded showers; rolled out nine new models across four series for 2026. Caveat: the brand is new and a handful of minor cosmetic fiberglass cracks have shown up, so verify the current unit.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"shDHmM9vF0k","title":"The Only 3 RV Brands Getting BETTER Every Year While Everyone Else Falls Apart","url":"https://youtu.be/shDHmM9vF0k"}}],"segments":["travel-trailer"]},{"slug":"northwood-arctic-fox","name":"Northwood Arctic Fox","verdict":"buy","headline":"Sits on a Northwood-built, fully welded, thick-wall aluminum frame built in-house rather than the cheapest outsourced frame with a wood box stapled on top; building the Arctic Fox since 1991 with heated tanks, heavy insulation and solid cabinetry for real four-season use.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"iMrSSlvJkno","title":"5 RV Brands That Break Down In 2 Years And 3 That Actually Last","url":"https://youtu.be/iMrSSlvJkno"}}],"segments":["mixed"]},{"slug":"rockwood-and-flagstaff","name":"Rockwood and Flagstaff","verdict":"buy","headline":"Built by Forest River, but run by a team that went a different direction from the rest of that portfolio: laminated construction with Azdel composite in the walls, properly sealed, out-reviewing their own budget Forest River stablemates by a wide margin -- proof the fix is a choice rather than a cost problem, since it uses the same corporate parent and suppliers as the failing lines.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"h3G2uMC4aLc","title":"5 RV Brands That Finally Fixed Their WORST Problems (And 3 That Still Haven't)","url":"https://youtu.be/h3G2uMC4aLc"}}],"segments":["mixed"]},{"slug":"nucamp-rv","name":"nuCamp RV","verdict":"buy","headline":"Built in small batches by a family owned Ohio company, a tiny fraction of the volume that giants like Thor push out every day.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.crainscleveland.com/article/20180119/news/149211/big-growth-comes-little-trailers-nucamp-rv"}],"citations":[{"source":{"videoId":"o9KXlF26Vwg","title":"6 CHEAP RV Brands EVERYONE IGNORES — But They Outlast $80K Premium Units (Side-By-Side Proof)","url":"https://youtu.be/o9KXlF26Vwg"}}],"segments":["mixed"]},{"slug":"northwood-and-arctic-fox","name":"Northwood and Arctic Fox","verdict":"buy","headline":"Aluminum frame with composite sidewalls instead of wood and insulation built for real winter conditions. Because composite walls and aluminum framing don't rot, full-timers and boondockers who run these for years avoid accumulating a delamination bill and keep the trailers a decade or more.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"knIjzi8-h3I","title":"The Only 4 RV Brands With Maintenance Costs That Don't Explode After Year 5","url":"https://youtu.be/knIjzi8-h3I"}}],"segments":["travel-trailer"]},{"slug":"four-wheel-campers","name":"Four Wheel Campers","verdict":"buy","headline":"The Hawk (pop-up) weighs roughly 1,200-1,300 lb dry, built with welded aluminum framing, block foam insulation, and a manual gas-strut pop-up with no motors or electronics to fail. Built in Woodland, California, and every camper is individually weighed on a scale before it leaves the factory, with the actual weight documented in the pickup paperwork.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"JEs1SYskK1E","title":"The Only 4 Truck Campers That WON'T Destroy Your Truck (The \"Safe Hauler\" List)","url":"https://youtu.be/JEs1SYskK1E"}}],"segments":["truck-camper"]},{"slug":"northstar","name":"Northstar","verdict":"buy","headline":"The Liberty is Northstar's shortest/lightest model at 1,775 lb dry, purpose-built for half-ton trucks with 5-6 ft beds. Composite-and-aluminum construction with a fiberglass exterior resists delamination and UV degradation; low production volume means individual per-unit quality control, and the company publishes honest wet weights rather than stripped marketing weights.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"JEs1SYskK1E","title":"The Only 4 Truck Campers That WON'T Destroy Your Truck (The \"Safe Hauler\" List)","url":"https://youtu.be/JEs1SYskK1E"}}],"segments":["truck-camper"]},{"slug":"alaskan-campers","name":"Alaskan Campers","verdict":"buy","headline":"The 630 uses a telescopic hard shell design in aluminum and fiberglass that Alaskan has hand built for over 65 years, since the first telescopic campers launched in 1958. Today they are built in Winlock, Washington. Build quality is durable enough that units from the 1970s and 80s are still in active use, not as restoration pieces.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.alaskancampers.com/history/"}],"citations":[{"source":{"videoId":"JEs1SYskK1E","title":"The Only 4 Truck Campers That WON'T Destroy Your Truck (The \"Safe Hauler\" List)","url":"https://youtu.be/JEs1SYskK1E"}}],"segments":["truck-camper"]},{"slug":"nash","name":"Nash","verdict":"buy","headline":"Northwood Manufacturing's affordable sibling line to the premium Arctic Fox, built in the same Oregon factory on a welded heavy-gauge boxed aluminum framework, steel chassis, one-piece composite walls, and high-density foam block insulation. A verified owner who also owns an Airstream ran them head-to-head and found the Northwood stayed cooler and quieter.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["mixed"]},{"slug":"fogatti","name":"Fogatti","verdict":"buy","headline":"The InstaShower tankless line puts out 55,000 BTU and up to 2.9 gallons per minute with a remote controller, plus flameout, antifreeze, overheat, and overpressure protection. It is a newer brand still building its long-term track record, but it dragged tankless pricing down into reach for normal buyers.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://fogattiliving.com/products/fogatti-rv-tankless-water-heater"}],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"furrion","name":"Furrion","verdict":"buy","headline":"One of the first three tankless brands manufacturers reach for at the factory. Its tankless unit puts out 60,000 BTU (top of the category) at 2.4 GPM flow. The specific reason it makes this list is that Furrion engineers specifically against RV road vibration, not just raw heating output.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"girard","name":"Girard","verdict":"buy","headline":"Early Girard tankless units were finicky: temperature swings, and the burner would drop out if water flow got too low or park pressure fluctuated. The brand is on this list because it fixed those issues over time ,  customer service improved in recent reports, and the current unit delivers 42,000 BTU, runs on 12V, is built for winter use, sips roughly half the propane of a 6-gallon tank, drops into a standard cutout, carries a 2-year warranty, and uses a microprocessor to hold temperature steady.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"precisiontemp","name":"PrecisionTemp","verdict":"buy","headline":"The RV550 puts out 55,000 BTU and uses PrecisionTemp's VariFlame control system, which holds the water temperature steady no matter how the flow changes.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://precisiontemp.com/products/rv-550/"}],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]},{"slug":"truma","name":"Truma","verdict":"buy","headline":"A German company whose AquaGo unit is called out as the #1 pick. It uses a hybrid design ,  a small temperature-stabilizing mixing vessel holding output near 120°F like a tank heater, while still heating on demand. A microprocessor scales the burner from 20,000 to 60,000 BTU and fires at flows as low as 0.4 GPM, plus a built-in decalcification system to fight hard-water buildup. The unit runs north of $1,300 and requires a certified installer, but owners report burning less propane than expected and would not go back to a tank.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"6PfvdaSsrRU","title":"The Only 5 RV Water Heater Brands That Actually Improved Since 2019 (Everyone Else Got Cheaper)","url":"https://youtu.be/6PfvdaSsrRU"}}],"segments":["water-heaters"]}],"modules":[{"key":"markup","title":"The Dealer Markup Playbook","intro":"You are about to spend $40,000 to $150,000 with a dealer whose whole business is built on you not knowing three numbers: what the RV cost them, what it costs them to let it sit, and how much of the paperwork at the end is pure profit. This module gives you those numbers, with sources, so you can stand on the lot and negotiate like someone who has seen the other side of the desk. Fair warning on the numbers: RV pricing has no Kelley Blue Book and no published invoice like cars have. Where a number varies, we give you the honest range and tell you what moves it.","sections":[{"heading":"The sticker is a work of fiction. Here is what the RV actually costs the dealer.","body":"There is no law that says an RV's MSRP has to relate to anything real. Manufacturers set it, and many set it high on purpose so the dealer can show you a big discount. One longtime industry writer at RV Across America pulled dealer cost sheets and found that on campers with the same $40,000 MSRP, the dealer's actual cost ranged from about $21,000 to $29,000 depending on brand and model. Read that again. Two trailers with the same sticker, and one has $8,000 more air in it than the other. He also warns that the brands with the most inflated stickers are often the ones built with the cheapest materials, so a huge discount is sometimes a red flag, not a win.\n\nThe common industry math works like this: if a dealer buys a unit at invoice for $100,000 and the retail markup is 40 percent, the sticker reads $140,000. A 30 percent discount off that sticker is $98,000, which is actually below invoice. That example comes from Trek With Us, a buyer-side site that documented real show pricing. So when a salesman shows you '25 percent off, today only,' he may still be sitting on thousands in margin, plus manufacturer incentives you will never see.\n\nWhat this means in practice: on towables (travel trailers and fifth wheels), a negotiated price of 25 to 30 percent off MSRP is the normal outcome for an informed buyer on a current-year unit, not a heroic one. On motorhomes the paper markup is usually thinner in percentage terms but bigger in dollars. The Trek With Us author documented paying $91,500 for a Winnebago with a $116,000 MSRP (about 21 percent off) after the 'show special' was $99,000, and found a $294,000 Tuscany listed publicly at $220,000, which is 25 percent off, while the show price for the same unit was $235,000.\n\nOne honest caveat: markup on paper is not what dealers keep. Camping World, the biggest RV dealer in the country, reported a new vehicle gross margin of 13.2 percent for 2025 in its public earnings. That is the average margin after all the discounting is done. It tells you two things. First, dealers really do sell far below sticker all day long, so never feel bad pushing. Second, on a heavily discounted aged unit, you may genuinely be near their floor, and the fight moves to the fees and the finance office, which is exactly where they plan to make it back.","checklist":[],"sources":["https://rvacrossamerica.net/best-discount-on-a-rv-camper-buyer-tips/","https://www.trekwithus.com/the-truth-about-rv-show-special-pricing/","https://rvbusiness.com/camping-world-releases-q4-earnings-report/"]},{"heading":"Floor plan interest: the clock that runs against the dealer, not you","body":"Dealers do not pay cash for the RVs on their lot. They borrow the money, unit by unit, on what is called a floor plan loan. Every day an RV sits unsold, the dealer pays interest on it. Bish's RV, a large multi-state dealer, published its own numbers: a $50,000 RV costs the dealership roughly $9.50 to $11.50 per day in interest, which is about $300 to $350 a month, at typical rates of 7 to 8.5 percent. A $100,000 unit costs roughly double that.\n\nHere is the pressure point. Most dealers consider a unit 'aged' once it has sat 90 to 120 days. Past that, the interest has eaten a chunk of the profit and management wants it gone. And if a unit sits close to two years, the lender can force the dealer to pay off the entire loan balance on it whether it sold or not. Bish's reports discounts of $3,000 to $13,000 off travel trailers that have sat 120 days or more, and $10,000 or more off higher-end fifth wheels and motorhomes, with the deepest cuts at model year changeover. These are brand new, never-titled units. Nothing is wrong with them except the calendar.\n\nYou cannot see the dealer's loan paperwork, but you can date the unit. The federal certification label (required under 49 CFR, the same NHTSA-administered labeling scheme as cars) is on the exterior, usually the front left side, and shows the month and year of manufacture. Tires have a DOT date code. If the RV was built 14 months ago and it is still on the lot, that dealer has paid something like $4,000 to $5,000 in interest on a $50,000 unit just to keep it parked, and the two-year payoff cliff is coming into view. That unit is where your best deal lives.","checklist":["Before visiting, search the dealer's website and RVTrader for units listed 'new' with last year's model year. Those are your targets.","On the lot, find the federal certification label (front left exterior sidewall on most towables) and note the build month and year.","Check tire DOT date codes. Tires more than a year older than today confirm lot time.","Look for lot wear: faded decals on one side, water staining, dirt lines, a dead battery, soft spots in caulk. Each one is a discount lever and an inspection flag.","Do the interest math out loud with the salesman: 'This unit has been costing you about $10 a day for 400 days. That is $4,000 you have already spent on it.'","Ask directly: 'Which units on this lot does your sales manager most need gone this month?' Salesmen will often just tell you, because aged units usually carry a bonus (a spiff) for moving them.","Never pay aged-unit price for aged-unit problems. Cut price for lot time, but still inspect harder, since seals and batteries age even when parked."],"sources":["https://www.bishs.com/blog/aged-rvs/"]},{"heading":"When in the model year to buy","body":"The RV model year turns over in the summer. Next-year models start arriving on lots as early as June. That means a unit that arrived in April can be 'non-current' by August without ever being sold, and every non-current unit is an aged-inventory problem the dealer must solve before winter, when foot traffic dies and floor plan interest keeps ticking.\n\nSo the calendar gives you two windows. The first is late September through November: the selling season is over, current-year stock is now last-year stock, and dealers are staring at a winter of interest payments. The second is late January through February, when dealers want cash and clean lots before spring, and RV shows create quote competition you can use. The worst time to buy is April through July, when lots are full of fresh inventory and buyers with tax refunds. The one exception inside the bad season: the last few days of any month, when a sales manager is short of quota, can shake loose a deal that did not exist on the 15th.\n\nModel year math matters more than most buyers think. A leftover 2025 bought in October 2026 is 'a year old' on paper the day you sign, and you will feel that at trade-in time. So the discount has to be real. The rule of thumb from the seasonal pricing guides is roughly an extra 5 to 10 percent off for a prior-year leftover on top of a normally negotiated price. If the dealer wants to sell you last year's model at this year's discount, walk.","checklist":["Best months to sign: October, November, late January, February.","Any month works better in its last three days than its first three.","At an RV show, treat the 'show special' as the opening anchor, never the floor. Trek With Us documented show specials that were $7,500 to $15,000 above what the same units sold for off-lot.","Buying a leftover prior-year unit: demand an extra 5 to 10 percent beyond a normal current-year discount, because you eat that depreciation at resale.","If you must buy in spring, hunt the aged units (previous section) instead of fresh stock. The calendar discount lives in the build date, not the month you shop."],"sources":["https://www.bishs.com/blog/when-to-buy-an-rv/","https://www.trekwithus.com/the-truth-about-rv-show-special-pricing/","https://www.bishs.com/blog/aged-rvs/"]},{"heading":"The fee sheet, decoded line by line","body":"After you shake hands on a price, a second price appears on paper. This is not an accident. Fees are where dealers rebuild margin they gave up in negotiation, and some of them are the same charge wearing different names. A buyer-side fee guide at RV Reports breaks down the ranges, and they match what forum buyers report. The single rule that beats all of it: negotiate only the out-the-door (OTD) price, in writing, itemized, before you sign anything. If the OTD number is right, you do not care what they call the lines. If they will not put OTD in writing, they are planning to move it.","checklist":["Documentation / processing / admin fee: typically $100 to $900 depending on state. Some states cap it. It is dealer profit, not a government charge, and it is negotiable like anything else. If they 'can't' lower it, tell them to take the same amount off the unit price instead. That always works when they want the sale.","Dealer prep / PDI (pre-delivery inspection): $0 to $1,500 or more. Preparing the unit for sale is the dealer's cost of doing business, and freight from the factory is usually already inside MSRP. Refuse it, or demand the PDI checklist with technician hours documented and a full walkthrough with systems live (water in the tanks, propane on, every appliance running) before you accept a dime of it.","Freight / destination charged separately: check whether destination is already built into the MSRP sheet. If it is, a separate freight line is double-charging. Refuse.","Market adjustment / supply-demand fee: $1,000 to $10,000 and up in hot markets. Pure air. Refuse outright and walk if it stays.","Battery, propane, 'starter kit': highly negotiable. Ask for itemized parts cost or ask them to throw it in. A $99 hose-and-chock kit priced at $600 tells you how the rest of the sheet was written.","Watch for the name-change game: if your state caps doc fees, the same money may reappear as 'electronic filing,' 'registration assistance,' or a second prep line. Same service, new label. Strike the duplicates.","Title, registration, and sales tax: the government portion is real and non-negotiable. Ask them to separate the state's actual charge from their 'processing' of it.","Get the final itemized OTD quote signed by a manager, then compare it against at least two other dealers' signed OTD quotes on the same or equivalent unit, even dealers hundreds of miles away. Shipping a trailer 600 miles is often cheaper than a hometown dealer's ego."],"sources":["https://rvreports.ai/rv-dealer-fees-explained-beat-junk-charges-and-secure-a-true-out-the-door-price/"]},{"heading":"The F&I office: the second sale you did not agree to","body":"After the handshake you get walked to the finance and insurance (F&I) office. Understand what that room is: it is a profit center, and at many dealerships it makes more on your deal than the sales floor did. Everything pitched in that room is optional. Everything. The pitch works because you are tired, you can already see yourself camping, and the products get quoted as 'only $30 more a month' instead of their real price. Multiply everything by the number of payments before you answer.\n\nExtended service contracts are the big one. Dealer prices commonly run from the low thousands to $20,000 for big motorhome plans, per America's RV Warranty's own published cost guide. That same guide, and every direct seller, makes the same point: the identical class of coverage bought directly from a warranty broker costs less than the dealer's version, and if you roll the dealer's contract into your loan you also pay interest on it for 15 or 20 years. We could not open a primary source proving the exact wholesale spread, but warranty industry pages consistently describe dealer contracts selling at two to four times what the dealer paid. You do not need the exact number. You need the rule: never buy coverage in the F&I chair. You can buy an extended service contract weeks or months later, from a broker, after quotes.\n\nThe chemical add-ons are simpler: fabric protection, paint sealant, and undercoating are products that cost the dealer tens of dollars in materials and minutes of labor, sold for $500 to $2,000 each, often pre-bundled into a 'protection package' printed on the buyer's order like it is mandatory. Dealer-applied 'paint sealant' is wax with a warranty card. If you want real protection, a $15 bottle of quality sealant or a detail shop visit does the same job. On a towable, 'undercoating' protects a frame that came from the factory already coated.","checklist":["Before the F&I room: get pre-approved at your own credit union or bank. Walk in with a rate. Now the dealer must beat it, not set it.","Ask the F&I manager if the interest rate quoted includes dealer markup on the rate ('reserve'). Tell them you have outside financing at X percent. Watch the rate drop.","Refuse: fabric protection, paint sealant or 'ceramic package' applied by the dealer, undercoating on a towable, VIN etch, nitrogen in tires, and any pre-printed 'protection package.' Every one is optional. If it is 'already applied,' say: 'Then it was applied for free, because I did not order it.' That line works. They will remove the charge before they unwind a sale.","Refuse to sign any buyer's order with add-ons you did not explicitly request. Make them reprint it. Read the reprint.","GAP coverage: only relevant if you finance with little money down on a fast-depreciating unit. If you need it, price it through your own insurer or credit union first, not the F&I desk.","Extended service contract: never buy it same-day. Get the dealer's quote in writing, then quote the same coverage through a direct broker. Decide at home. RVs can be covered after purchase.","Roadside assistance: buy it yourself (Good Sam, Coach-Net, AAA RV) for a fraction of the F&I bundle price.","If anything is quoted 'per month,' ask for the total cash price and the price impact over the full loan. Write it down in front of them.","Total time rule: if you have been in the F&I office more than 45 minutes, they are working you. Stand up, say you need lunch, and watch the numbers improve."],"sources":["https://americasrvwarranty.com/how-much-does-an-rv-warranty-cost","https://rvreports.ai/rv-dealer-fees-explained-beat-junk-charges-and-secure-a-true-out-the-door-price/"]},{"heading":"A worked negotiation, start to finish, with real-world numbers","body":"Here is the whole playbook run once, on a realistic deal. The percentages come from the sources in the earlier sections; the specific unit is an example.\n\nThe unit: a mid-profile fifth wheel, last model year, MSRP $69,995, on the lot with a build date 13 months back. Using the documented markup range (dealer cost between roughly 62 and 75 percent of MSRP on towables, per the RV Across America cost-sheet examples), the dealer's invoice on this unit is plausibly $44,000 to $52,000. It has also cost them roughly $13 to $15 a day in floor plan interest for 13 months, call it $5,000 to $5,500 already spent, with the two-year payoff cliff 11 months out.\n\nStep 1, homework: you find two comparable units at other dealers listed online at $48,900 and $50,500. So the real market is around 30 percent off sticker before you say a word.\n\nStep 2, the open: the dealer's asking price is $57,900 ('$12,000 off MSRP!'). You say: 'I have written quotes near $49,000 on this floor plan. Your unit was built 13 months ago, so it has cost you about five grand in interest sitting here. I will sign today at $45,500 out the door plus tax and actual state fees only.' You anchor below the market comps because the age of this specific unit justifies it.\n\nStep 3, the dance: they counter $52,500 plus fees. You hold: the aged build date, your written comps, and your willingness to drive to the other dealer. They come back at $49,900 plus $1,499 in doc and prep. You convert everything to OTD: 'Make the unit price whatever you want. My number is $47,500 before tax and state charges, all dealer fees included.' Settle at $47,900 OTD before tax. That is about 32 percent off MSRP on an aged unit, squarely inside the documented range for this situation ($3,000 to $13,000 beyond normal discount on 120-day-plus towables, per Bish's).\n\nStep 4, F&I: you arrive pre-approved at your credit union at 7.9 percent. The F&I office offers 9.4 percent, then 'finds' 7.7 when you show your approval. They pitch a $4,485 protection package (fabric $795, paint sealant $1,295, undercoat $895, tire and wheel $1,500) and a $6,900 seven-year service contract. You refuse the package in full and take the service contract quote home, where a direct broker later quotes comparable coverage for thousands less; that spread is why every direct seller tells you not to buy it in the chair.\n\nStep 5, delivery: you do not sign final papers until the full PDI walkthrough happens with water in the tanks, propane flowing, and every system run in front of you, and every defect is written on the due bill with a completion date. A signature is the only leverage you will ever have on warranty work at that dealer. Spend it last.\n\nOutcome: sticker said $69,995. An average buyer pays around $57,900 plus $1,500 fees plus a $4,485 package plus a marked-up loan. You paid $47,900 OTD with your own financing. Same trailer. The difference, roughly $16,000 before finance interest, is what this document just paid for itself with, about 160 times over.","checklist":[],"sources":["https://rvacrossamerica.net/best-discount-on-a-rv-camper-buyer-tips/","https://www.bishs.com/blog/aged-rvs/","https://www.trekwithus.com/the-truth-about-rv-show-special-pricing/","https://americasrvwarranty.com/how-much-does-an-rv-warranty-cost"]},{"heading":"The one-page lot card: what to do, in order","body":"Print this section. It is the whole module compressed into the sequence you will actually use. Everything here is backed by the sources in the sections above.","checklist":["Pick the floor plan and brand at home. Verify build quality first; a big discount on a badly built trailer is a bad deal at any price (inflated MSRPs are common and sometimes signal cheap construction).","Pull 3 or more online listings for the same or equivalent unit, including dealers far away. Save screenshots with prices.","Get pre-approved financing from your credit union before you ever visit a lot.","Shop October, November, or late January if you can; end of any month if you cannot.","On the lot, date every candidate unit by its federal certification label and tire DOT codes. Prioritize anything 120 days or older.","Never discuss monthly payment. Negotiate out-the-door price only: unit plus every dealer fee, before tax and actual government charges.","Anchor at roughly 30 to 35 percent off MSRP on a towable, deeper if the unit is aged; expect to settle around 25 to 30 percent off on current stock.","Strike doc-fee duplicates, refuse prep charges without a documented PDI, refuse freight if destination is in MSRP, refuse any market adjustment.","In F&I: refuse fabric protection, paint sealant, undercoating, VIN etch, nitrogen, and bundled packages. Take warranty and GAP quotes home; buy direct later if at all.","Do not sign final delivery papers until the live-systems walkthrough is complete and every defect is written on the due bill with a date.","Be genuinely ready to walk. Every number in this module exists because some buyer stood up and reached for the door."],"sources":["https://rvacrossamerica.net/best-discount-on-a-rv-camper-buyer-tips/","https://www.bishs.com/blog/aged-rvs/","https://rvreports.ai/rv-dealer-fees-explained-beat-junk-charges-and-secure-a-true-out-the-door-price/","https://www.trekwithus.com/the-truth-about-rv-show-special-pricing/","https://rvbusiness.com/camping-world-releases-q4-earnings-report/"]}]},{"key":"auction","title":"The Auction and Repo Loophole","intro":"Repossessed and auction RVs are the one corner of this market where a patient buyer can pay half of what the dealer down the street is asking. They are also the one corner where a careless buyer can lose $30,000 in an afternoon with no warranty, no recourse, and no one to call. This module gives you both halves: where these units really sell, what the discount actually is (not the fantasy number), how to register and bid, how to inspect a unit in 20 minutes on a lot, and which paths you should not touch as a first-timer. Every number here comes from a source we opened and checked. Where the honest answer is \"it depends,\" we say what it depends on.","sections":[{"heading":"The honest math: what the discount really is","body":"You will see ads promising RVs at 40 to 60 percent off retail. Here is the truth behind that number.\n\nThe discount is real, but it is a range, not a promise. Repo sellers and auction guides consistently report units selling below retail, and savings 'up to 50 percent' do happen. One buyer on the iRV2 forum (the largest RV owners forum in the country) reported paying 50 percent below low retail for a bank repo in showroom condition with 3,000 miles. Another negotiated a bank-consigned repo listed at $98,900 down to $52,000 out the door. Those deals exist. But the same auction guides admit that some repos sell for MORE than their book value, because bidders get emotional or because the bank is trying to recover a loan balance bigger than the RV is worth.\n\nA realistic planning number: 20 to 50 percent under typical dealer retail for a repo bought directly from a bank or at a public auction, before repairs. The deep end of that range (40 to 60 percent off) shows up mostly on units with problems: cosmetic damage, missing service history, dead batteries and tires from sitting, or a title brand. The discount is not free money. It is payment for risk you are taking off the seller's hands.\n\nWhat moves the number:\n\n1. Condition and story. A one-year-old repo from a borrower who simply stopped paying can be nearly new. A unit that sat in a repo yard for eight months with a roof leak is a project.\n2. The loan balance. Banks want to recover what is owed. On a nearly new unit, what is owed can be close to retail, so the bank holds firmer.\n3. Season. RV demand peaks in spring. Winter auctions in cold states have thinner crowds.\n4. Fees on top. Auction buyer's premiums run 5 to 15 percent of the winning bid, plus doc fees, plus tax. A '$40,000 win' is often a $45,000 purchase before you drive it anywhere.\n5. Repairs. Budget for them every time (see the repair section below). Your true discount is (retail price) minus (bid + fees + repairs). Do that subtraction before you bid, not after.\n\nOne more piece of context: this is a real supply moment. About 1.88 million vehicles were repossessed in the US in 2024 per industry tracker CURepossession, and RV industry watchers report repo volume at RV auctions is up as pandemic-era buyers walk away from underwater loans. More supply means better odds for you, if you shop with discipline.","checklist":[],"sources":["https://crowsurvival.com/repossessed-rvs-for-sale/","https://www.recnationstorage.com/blog/how-to-buy-an-rv-at-auction-step-by-step-guide-for-smart-bidders/","https://www.irv2.com/threads/website-with-bank-repos-rvs.1537289/","https://curepossession.com/how-many-cars-will-be-repossessed-in-2025/","https://johnmarucci.com/2024/05/02/rv-news-insights-from-an-rv-dealer-april-2024/"]},{"heading":"Where repo and auction RVs actually sell","body":"There is no single 'repo lot' in your town with a sign out front. Repossessed RVs move through five channels, and they are not equally friendly to you.\n\n1. Direct from banks and credit unions. When a borrower defaults, the lender ends up owning an RV it does not want. Banks and credit unions are not RV dealers, so they price to move. Many list repos on their own websites or through aggregators like RepoFinder.com, which links out to lender repo pages state by state for free. This is the best channel for a first-timer: you can usually see the unit in person, take your time, bring an inspector, and make an offer like a normal sale. No auction clock. Call the branches of your own bank and local credit unions and ask who handles repossessed collateral. It is an old-fashioned move and it still works.\n\n2. Specialty liquidators and repo remarketers. Companies like National Liquidators (motorhomeauctions.com) sell bank-owned motorhomes on consignment. These sit between a dealer sale and an auction: listed prices, but bank-owned inventory and as-is terms. (Note: when we checked motorhomeauctions.com in July 2026 the site had an expired security certificate, so verify any liquidator is currently active before wiring money.)\n\n3. Public auto and RV auctions. Regional auction houses run public sales that include repos, dealer trade-ins, and consignments. You register, get a bidder number, and bid live or online. Real discounts, real time pressure, limited inspection.\n\n4. Dealer-only wholesale auctions (Manheim and similar). This is where dealers buy trade-ins and many repos. The public cannot bid without a dealer license. If someone offers to 'get you in' to a dealer auction for a fee, understand you are buying blind through a middleman who profits on the spread. iRV2 members discuss Manheim regularly: it is where the trade you saw at a dealership may have come from, with a markup added.\n\n5. Government auctions. GSA Fleet Vehicle Sales (now on GSAFleet.gov) sells over 30,000 retired government vehicles a year to the public, open to anyone 18 or older, free to register. Honest warning: GSA Fleet sells the government's own used sedans, trucks, and vans. It explicitly does not sell repossessed vehicles, and RVs are rare to nonexistent there. Seized-property auctions (US Treasury, US Marshals) occasionally include motorhomes taken in criminal cases, but the supply is a trickle. Treat government auctions as a bonus channel to watch, not a plan.\n\n6. Insurance salvage auctions (Copart, IAA). This is where totaled RVs go: flood units, accident units, and some theft recoveries. Prices are the lowest of any channel and the risk is the highest. Copart sells both clean-title and salvage-title units; membership runs $59 a year for basic (bids capped at $1,000) or $249 for premier. Here is the catch that surprises people: whether you can even bid depends on your state. Roughly 28 states, including California, Florida, New York, and New Jersey, require private buyers to go through a licensed broker for salvage vehicles, and Texas requires a broker even for most clean-title units. About 15 states (Arizona, Oregon, Pennsylvania, North Carolina, and others) let anyone bid on anything. Check your state's rules before you build a plan around salvage auctions. And read the title section below before you touch this channel at all.","checklist":[],"sources":["https://www.repofinder.com/blog/repo-rvs-sale/","https://www.motorhomeauctions.com/","https://www.irv2.com/threads/manheim-auctions.1867367/","https://www.gsa.gov/buy-through-us/products-and-services/transportation-and-logistics-services/fleet-management/vehicle-leasing/sales-of-gsa-fleet-vehicles","https://autoauctions.gsa.gov/","https://copartfeecalculators.com/copart-membership-fees/","https://carproxy.com/regulations","https://blog.autobidmaster.com/2026/06/auto-auction-licensing-requirement/"]},{"heading":"Titles: the difference between a deal and a trap","body":"The title is where auction bargains go wrong. Learn four terms before you bid on anything.\n\nClean title: no reported major damage event. This is what you want. A repo can have a perfectly clean title; repossession itself is not a title brand.\n\nSalvage title: an insurance company declared the RV a total loss because repair costs exceeded its value (each state sets the exact threshold). A salvage unit usually cannot be registered or driven until it is repaired and passes a state inspection. Per the RV title guide at HeyRV, most lenders will not finance a salvage RV at all, insurers often offer only liability coverage after detailed inspection, and you can expect a salvaged vehicle to lose roughly 20 to 40 percent of its value permanently. That loss follows you to resale.\n\nRebuilt title: a former salvage unit that was repaired and passed inspection. Legal to drive, still hard to finance, still discounted forever, and the quality of the rebuild is only as good as the person who did it.\n\nFlood brand: the most dangerous brand on an RV. Water damage corrodes wiring harnesses and control boards and grows mold inside seat foam, carpet pad, and wall cavities. An RV is a plywood-and-luan box on wheels; a flooded RV is far worse than a flooded car, because the whole living structure absorbs water. Our position: never buy a flood-branded RV at any price. Some states issue specific flood salvage brands; some do not, which leads to the next problem.\n\nTitle washing: moving a branded vehicle to a state with looser rules to re-register it with a clean-looking title. It is a federal crime and it still happens; IHS Automotive research cited by iSeeCars estimated about 1 in 325 used vehicles sold in the US has a washed title. The national NMVTIS database exists to stop this, but state brand categories are not uniform, so brands can slip through. This is why you run the VIN yourself instead of trusting the paper in the seller's hand.","checklist":["Get the full VIN before the sale (motorhomes) or the VIN plus manufacturer serial number (towables). Refuse to bid on any unit where the seller will not give you the VIN.","Run the VIN through NICB VINCheck (nicb.org/vincheck), the insurance industry's free lookup for theft and total-loss records.","Buy an NMVTIS-approved title report (vehiclehistory.bja.ojp.gov lists approved providers, typically under $25). NMVTIS is the federal database built to catch title washing across states.","Run a standard history report (Carfax or AutoCheck) on motorized RVs as a second layer. Towables have thinner records; treat a blank history as unknown, not clean.","Match the VIN on the report to the VIN riveted on the RV itself, not just the paperwork. Mismatched or tampered VIN plates end the deal, period.","Check for open liens. A bank repo sold by the bank comes lien-free; a 'repo' sold by a private party may not. Ask for a lien release in writing.","If the title says salvage, rebuilt, or flood: assume no financing, liability-only insurance, and a permanent 20 to 40 percent value haircut. Price your bid accordingly or walk.","If the unit spent time in Louisiana, Florida, Texas, or the Carolinas and the price seems too good: hunt specifically for flood evidence (see inspection section). Hurricane inventory moves north and west after every storm season."],"sources":["https://heyrv.com/blog/salvage-title/","https://www.iseecars.com/articles/what-is-a-salvage-title","https://legalclarity.org/what-makes-a-vehicle-title-not-clean/","https://kinja.com/automotive/rebuilt-title-vs-salvage-title-2026"]},{"heading":"How to register, bid, and pay without getting burned","body":"Every auction house has its own rules, but the skeleton is the same everywhere. The mechanics below come from published auction-buying guides and the auction houses' own terms. The fees and deadlines are where new bidders get hurt, so read those twice.","checklist":["Pick your auction and read its full terms of sale before auction day. Every reputable house publishes them. If you cannot find written terms, that is your answer about the house.","Register in advance. In-person sales want a driver's license and often proof of funds; online platforms want ID, proof of address, and sometimes a refundable deposit before your bids count.","Know the buyer's premium. Auction houses add 5 to 15 percent on top of your winning bid. On a $50,000 bid, that is $2,500 to $7,500 you owe beyond the hammer price.","Add tax, title, doc, and gate fees to your math. Salvage platforms like Copart also charge membership ($59 to $249 a year) plus per-vehicle service fees.","Set your walk-away number before the sale: your target price minus premium, fees, and your repair budget. Write it on paper. Auctions are designed to make you exceed it.","Attend one auction and bid on nothing. Watch how fast it moves, who the regulars are (dealers buying inventory), and what units actually hammer for. This is the cheapest education in the RV business.","Use the preview window. Most houses open the lot hours or a day before the sale, and some allow you to bring a mechanic. Online sales will often provide extra photos, service records, or a video walkaround if you ask. If a seller refuses all of it, skip the unit.","Understand 'as-is, where-is.' Once the hammer falls, the RV and every hidden problem in it are yours. There is no cooling-off period, no lemon law protection, no returns.","Be ready to pay fast. Most auctions require full payment within 24 to 72 hours by wire, certified check, or cash. Miss the deadline and you can lose your deposit and get banned.","Arrange transport before you bid. A dead motorhome or a trailer with rotted tires needs a flatbed or transporter, which can run into the thousands for long hauls. Storage fees start accruing at the yard within days.","Insure it before it moves. Call your insurer with the VIN the same day you win. An uninsured 12,000-pound vehicle on a transporter is your liability."],"sources":["https://www.recnationstorage.com/blog/how-to-buy-an-rv-at-auction-step-by-step-guide-for-smart-bidders/","https://crowsurvival.com/repossessed-rvs-for-sale/","https://copartfeecalculators.com/copart-membership-fees/"]},{"heading":"The real risks, stated plainly","body":"This section exists to protect you, so no sugar. Here is what you are actually exposed to.\n\nNo real walkthrough. The single biggest complaint from experienced buyers on iRV2 is inspection time. Some auctions open the lot only a few hours before bidding. You cannot pressure-test plumbing, run the fridge for the six hours an absorption fridge needs to prove itself, or put the engine under load. You are evaluating a rolling house in minutes. A veteran iRV2 member put a number on it: buying at auction without deep knowledge carries something like a 20 percent failure rate, meaning roughly one in five units turns out to have a problem big enough to sour the deal. That is a forum member's estimate, not a study, but it matches the pattern in buyer stories across the forum.\n\nSight-unseen damage. Repos are surrendered by people in financial distress. Some units were loved and simply lost. Others skipped every service interval, sat with full water lines through a freeze, or were stripped of TVs, batteries, and generators before the tow truck came. You often cannot tell which story you are buying until you own it.\n\nWater intrusion, the RV killer. Every RV roof seam is a maintenance item, and a repo that sat in a yard for a year with cracked sealant may have rot spreading inside its walls right now. Water damage is progressive and mostly invisible from outside. It is the number one way an auction 'bargain' becomes a total loss, and it is why half of the inspection checklist in the next section is about water.\n\nTitle brands and washed titles. Covered above. The auction block moves fast and title problems surface after payment, when your money is gone.\n\nNo warranty, no recourse. As-is means as-is. The bank never lived in the RV and legally discloses almost nothing. You cannot sue your way out of a bad hammer.\n\nDead systems from sitting. Even a clean repo that sat six months will commonly need batteries, tire inspection or replacement (RV tires age out by date code, not tread), fresh fuel, and full resealing. That is not damage; that is the baseline cost of the channel.\n\nIf reading this list makes your stomach tighten, good. The buyers who get hurt are the ones who felt only the discount.","checklist":[],"sources":["https://www.irv2.com/threads/website-with-bank-repos-rvs.1537289/","https://www.irv2.com/forums/f59/purchase-rv-592087.html","https://rvlife.com/rv-water-damage-signs/","https://www.repofinder.com/blog/repo-rvs-sale/"]},{"heading":"The 20-minute lot inspection","body":"You will not get two hours on an auction lot. This checklist is triage: it finds the deal-killers (water, structure, title) in about 20 minutes so you know whether to bid at all. It is built from RV Education 101's water-damage method (Mark Polk, a 30-year RV industry veteran) plus standard pre-purchase checklists. Bring: a bright flashlight, a moisture meter if you own one ($30 to $50), painter's tape to mark spots, your phone for photos, and shoes you can kneel in. Work the order below; water first, because water kills the deal fastest.","checklist":["MINUTE 0 to 2, stand back: from 20 feet, sight down each sidewall for ripples, waves, or bubbles in the fiberglass. That is delamination, water between the outer skin and the luan substrate. Visible delamination on a wall = walk away now and save your remaining 18 minutes.","MINUTE 2 to 5, roof line and seams: check where the roof meets the end caps and sidewalls, and every seam you can see or reach. Cracked, lifted, or separated sealant means water has had a path in. If the auction allows ladder access, press the roof around vents, the A/C, and the antenna; soft equals rot.","MINUTE 5 to 9, interior ceiling and walls: inside, scan the ceiling around every roof penetration (vents, A/C, skylights, plumbing stacks) for stains, discoloration, or sag. Press up; it should be firm. Check the wall around every window, the entry door, and the slide-out openings for wrinkled wallpaper, bubbling, or brown halos.","MINUTE 9 to 11, cabinets and hidden corners: open every overhead cabinet and put your flashlight in the corners where wall meets ceiling; this is where leaks show first, per Polk's method. In a Class C, lift the cab-over bunk mattress and feel the plywood underneath for damp or soft spots.","MINUTE 11 to 13, floors: walk the entire floor with weight on your heels, especially around the entry door, in front of the sink and shower, around the toilet, and along slide-out floors. Spongy or crackling floor equals subfloor rot, a multi-thousand-dollar repair.","MINUTE 13 to 14, nose: sniff hard when you first enter and again in the bathroom and under-sink cabinets. Musty or moldy smell is moisture talking. Heavy air freshener is someone answering for it.","MINUTE 14 to 16, flood tells (critical on salvage lots): look for a waterline or silt in exterior storage bays, rust on seat rails and cabinet hinges, corrosion on fuse panels and wire connectors, water stains at the BOTTOM of walls rather than the top. Bottom-up water means the unit sat in water. Walk away.","MINUTE 16 to 18, systems snapshot: check tire date codes (four-digit DOT stamp; over 5 to 6 years old means budget full replacement), look under a motorhome for fresh oil or coolant drips, open the water heater and furnace exterior doors and look for corrosion and mud dauber nests, glance at battery terminals for corrosion or missing batteries.","MINUTE 18 to 20, paperwork and photos: photograph the VIN plate, the federal weight sticker, tire date codes, and every defect you found. Confirm the VIN matches the auction listing. Note missing items (remotes, generator, spare, jack crank) for your repair math.","HARD RULES: delamination, soft floors or ceilings, bottom-up water stains, mold smell, or a VIN problem = do not bid, at any price. Everything else = subtract the repair cost from your maximum bid.","If the numbers are big (over $60,000) and the auction allows it, hire an NRVIA-certified inspector for a real pre-purchase inspection. Expect $500 to $1,200 for most units (large diesel pushers can run more). Buyers on RVForum who spent it call it money well spent; it is the cheapest insurance in this entire process."],"sources":["https://rv101withmarkpolk.com/2020/03/17/rv-101-how-to-inspect-your-rv-for-water-damage/","https://rvlife.com/rv-water-damage-signs/","https://campersmarts.com/rv-inspection-checklist","https://rvshare.com/blog/how-much-does-an-rv-inspection-cost/","https://www.rvforum.net/threads/nrvia-pre-purchase-inspection-was-money-well-spent.912457/"]},{"heading":"Budgeting for repairs: the second price tag","body":"Every auction RV has two prices: the hammer price and the make-it-right price. Winners budget both before they bid. The framework below keeps you honest. Repair figures vary by region and unit size, so treat the percentages as the planning tool and get local quotes for anything structural. The core principle comes straight from inspection industry data: undiscovered major problems like roof leaks, frame damage, or electrical faults commonly run $5,000 to $20,000 or more, which is exactly why the inspection above exists.","checklist":["Start with true market value, not asking prices: look up the unit on J.D. Power's RV values guide (the former NADA guide, jdpower.com/rvs) and cross-check against sold-style listings on RV Trader for the same year, make, and floor plan. That number is your ceiling before any discount.","Baseline reconditioning on ANY repo that sat: assume batteries, full roof and seam reseal, fluid service, and a deep clean even if it looks fine. Plan 3 to 5 percent of the unit's value as your floor.","Tires: check date codes and price a full set before bidding. Trailer tires and motorhome tires age out regardless of tread; a Class A set can exceed $3,000 on its own.","Appliances you could not test: fridge, water heater, furnace, A/C, and generator were probably not run for you. Hold a reserve of $1,500 to $4,000 against one or two of them failing; an absorption fridge alone can cost $1,500 to $3,000 plus labor.","Anything the flashlight flagged: get real quotes for soft spots, seal failures, or slide issues before auction day if the preview allows, or price them pessimistically. Water-related structural work is the $5,000 to $20,000+ category.","The bid formula: (true market value) minus (buyer's premium and fees) minus (repair budget) minus (your safety margin, at least 10 percent) = maximum bid. If bidding passes it, put your hands in your pockets.","The walk-away test: if total projected cost (bid + fees + transport + repairs) lands within about 10 to 15 percent of what a clean, inspected unit costs from a private seller, the auction unit is not a deal. It is the same price with more risk.","Keep cash liquid after purchase: do not spend your last dollar at the auction. The units that go bad usually reveal it in the first 90 days, and repair shops want payment, not stories.","Do not finance the repairs into fantasy: most lenders will not touch salvage titles at all, and many are cautious on auction units generally. If you need a loan, confirm your lender will fund an auction or repo purchase BEFORE you register to bid; many buyers must pay cash and refinance later."],"sources":["https://rvhelp.com/blog/how-much-does-an-rv-inspection-cost","https://heyrv.com/blog/salvage-title/","https://www.recnationstorage.com/blog/how-to-buy-an-rv-at-auction-step-by-step-guide-for-smart-bidd
