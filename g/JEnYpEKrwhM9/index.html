<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>The Complete RV Brand Reliability Guide</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap');
:root{--bg:#0F1922;--bg2:#1A2833;--card:#15222C;--navy:#0A121A;--ink:#F0F3F5;--ink2:#C2CDD5;--ink3:#8E9EAA;
--rule:#33485A;--hair:#263844;--real:#1E7A4C;--realtx:#4CC084;--skip:#C03A31;--check:#A5700D;
--mark:#F5913B;--markdp:#D9631E;
--anton:"Barlow Condensed","Arial Narrow",sans-serif;--head:"Barlow",-apple-system,"Segoe UI",Arial,sans-serif;
--body:"Source Serif 4",Georgia,serif;--ui:"Barlow",-apple-system,"Segoe UI",Arial,sans-serif}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink2);font-family:var(--body);font-size:18px;line-height:1.6}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 90px}
h1,h2,h3{font-family:var(--head);color:var(--ink);font-weight:800;line-height:1.1;letter-spacing:-.01em}
h1{font-size:32px;margin:10px 0 8px}h2{font-size:24px;margin:34px 0 10px}h3{font-size:19px;margin:20px 0 6px}
b,strong{color:var(--ink)}
a{color:var(--mark)}
.topbar{position:sticky;top:0;z-index:40;background:var(--navy);border-bottom:4px solid var(--markdp);
padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
font-family:var(--ui);font-size:13px;color:var(--ink2)}
.topbar .tt{font-family:var(--anton);font-size:17px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progresswrap{display:flex;align-items:center;gap:8px;flex:none}
.pbar{width:110px;height:8px;background:var(--hair);border-radius:99px;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--mark);border-radius:99px;width:0%;transition:width .3s}
.pnum{font-weight:800;color:var(--mark);font-variant-numeric:tabular-nums;white-space:nowrap}
.tabs{position:sticky;top:44px;z-index:39;display:flex;gap:6px;background:var(--bg);padding:10px 0 8px;overflow-x:auto}
.tab{font-family:var(--ui);font-weight:700;font-size:14.5px;color:var(--ink2);background:var(--card);
border:1px solid var(--rule);border-radius:99px;padding:9px 16px;cursor:pointer;white-space:nowrap;min-height:42px}
.tab.on{background:var(--mark);color:#14212B;border-color:var(--mark)}
.hello{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:20px;margin:18px 0}
.hello .kick{font-family:var(--anton);font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--mark);margin:0 0 6px}
.segpick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 4px}
.segbtn{font-family:var(--ui);font-weight:700;font-size:16px;color:var(--ink);background:var(--bg2);
border:2px solid var(--rule);border-radius:8px;padding:16px 12px;cursor:pointer;text-align:center;min-height:56px}
.segbtn:hover,.segbtn.on{border-color:var(--mark);background:rgba(217,99,30,.12)}
.milestone{display:flex;align-items:center;gap:10px;background:rgba(30,122,76,.12);border:1px solid var(--real);
border-radius:8px;padding:10px 14px;margin:14px 0;font-family:var(--ui);font-size:15px;color:var(--ink)}
.milestone .mi{flex:none;width:26px;height:26px;border-radius:50%;background:var(--real);color:#fff;
display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.controls{display:flex;gap:8px;margin:16px 0 10px;flex-wrap:wrap}
.search{flex:1 1 200px;font-family:var(--ui);font-size:17px;padding:12px 14px;border:2px solid var(--rule);
border-radius:8px;background:var(--card);color:var(--ink);min-height:48px}
.search::placeholder{color:var(--ink3)}
.fchip{font-family:var(--ui);font-weight:700;font-size:14px;padding:10px 14px;border-radius:99px;cursor:pointer;
border:1px solid var(--rule);background:var(--card);color:var(--ink2);min-height:44px}
.fchip.on{color:#fff}
.fchip.on.f-buy{background:var(--real);border-color:var(--real)}
.fchip.on.f-caution{background:var(--check);border-color:var(--check)}
.fchip.on.f-avoid{background:var(--skip);border-color:var(--skip)}
.fchip.on.f-all{background:var(--mark);border-color:var(--mark);color:#14212B}
.brand{background:var(--card);border:1px solid var(--rule);border-left:6px solid var(--rule);border-radius:8px;
padding:16px 16px 14px;margin:12px 0}
.brand.v-buy{border-left-color:var(--real)}
.brand.v-caution{border-left-color:var(--check)}
.brand.v-avoid{border-left-color:var(--skip)}
.bhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bname{font-family:var(--head);font-weight:800;font-size:20px;color:var(--ink);margin:0;flex:1 1 auto}
.tag{font-family:var(--anton);font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
padding:3px 12px;border-radius:3px;color:#fff}
.tag.buy{background:var(--real)}.tag.caution{background:var(--check)}.tag.avoid{background:var(--skip)}
.bhl{margin:10px 0 0;color:var(--ink2)}
.bnote{background:var(--bg2);border:1px solid var(--hair);border-radius:6px;padding:10px 12px;margin:10px 0 0;
font-family:var(--ui);font-size:15px;color:var(--ink2)}
.bnote b{color:var(--mark)}
.splits{margin:10px 0 0;padding:0;list-style:none}
.splits li{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-top:1px dashed var(--hair);
font-family:var(--ui);font-size:15px}
.splits .tag{font-size:12.5px;padding:2px 8px;flex:none}
.receipts{margin:10px 0 0;font-family:var(--ui);font-size:13px;color:var(--ink3)}
.receipts a{color:var(--ink3)}
.unest{margin:10px 0 0;font-family:var(--ui);font-size:13.5px;color:var(--ink3);font-style:italic}
.bacts{display:flex;gap:8px;margin:12px 0 0;flex-wrap:wrap}
.babtn{font-family:var(--ui);font-weight:700;font-size:14px;padding:9px 14px;border-radius:8px;cursor:pointer;
border:1px solid var(--rule);background:transparent;color:var(--ink2);min-height:42px}
.babtn.done{background:rgba(30,122,76,.15);border-color:var(--real);color:var(--realtx)}
.babtn.listed{background:rgba(217,99,30,.15);border-color:var(--markdp);color:var(--mark)}
.shortlist-box{background:var(--card);border:2px solid var(--markdp);border-radius:10px;padding:18px;margin:16px 0}
.empty{font-family:var(--ui);color:var(--ink3);font-size:15px}
.modsec{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:18px;margin:14px 0}
.ck{list-style:none;padding:0;margin:10px 0 0}
.ck li{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-top:1px dashed var(--hair);
font-family:var(--ui);font-size:16px;cursor:pointer}
.ck .box{flex:none;width:26px;height:26px;border:2px solid var(--rule);border-radius:6px;margin-top:1px;
display:flex;align-items:center;justify-content:center;color:transparent;font-weight:800}
.ck li.on .box{background:var(--real);border-color:var(--real);color:#fff}
.ck li.on{color:var(--ink3);text-decoration:line-through}
.ring{display:flex;align-items:center;gap:14px;margin:8px 0 4px;font-family:var(--ui)}
.ring svg{flex:none}
.ring .rl{font-size:15px;color:var(--ink2)}
.walkaway{background:rgba(192,58,49,.12);border:1px solid var(--skip);border-radius:8px;padding:12px 14px;
margin:12px 0;font-family:var(--ui);font-size:15px}
.walkaway b{color:#F07B72}
.srcs{font-family:var(--ui);font-size:12.5px;color:var(--ink3);margin:8px 0 0}
.printbtn{font-family:var(--ui);font-weight:700;font-size:14px;padding:10px 16px;border-radius:8px;
border:1px solid var(--rule);background:var(--card);color:var(--ink2);cursor:pointer;min-height:44px}
.foot{margin:40px 0 0;padding:16px 0;border-top:1px solid var(--hair);font-family:var(--ui);font-size:13px;color:var(--ink3)}
.hide{display:none!important}
@media print{
 body{background:#fff;color:#222;font-size:12.5px}
 .topbar,.tabs,.controls,.bacts,.printbtn,.segpick,.milestone{display:none!important}
 .brand,.modsec,.hello,.shortlist-box{border-color:#bbb;background:#fff;break-inside:avoid}
 h1,h2,h3,b,strong,.bname{color:#111}
 .bhl,.bnote,.splits li{color:#333}
 .hide{display:none!important}
 a{color:#333}
}
@media(max-width:480px){h1{font-size:26px}.segpick{grid-template-columns:1fr}}
</style>

 3.2 out of 5, with a consistent pattern of electrical failures, HVAC systems that don't work out of the box, and water system defects discovered on the first fill.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"OeNs3vD2mI4","title":"8 Brand-New RV Brands HIDING Factory Defects On The Lot (The \"Walk Away\" List)","url":"https://youtu.be/OeNs3vD2mI4"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}},{"source":{"videoId":"CVtWg2wgbUA","title":"6 More RV Brands That Were Trusted In 2018 — And Are Now Unrecognizable","url":"https://youtu.be/CVtWg2wgbUA"}}],"segments":["mixed"]},{"slug":"thor-industries","name":"Thor Industries","verdict":"avoid","headline":"Named as one of the two corporate empires (with Forest River) that dominate the industry on a volume/speed/throughput model; trailers built under piece-rate pay, where factory workers are incentivized to move fast rather than carefully.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}}],"segments":["travel-trailer"]},{"slug":"compass-telurite-austone-chaoyang-aks-yks-no-name-originals","name":"Compass / Telurite / Austone / Chaoyang / AKS / YKS (no-name originals)","verdict":"avoid","headline":"No-name original equipment tires chosen by the factory to hit a low price, not to protect your trailer. Owners report failures with full tread, low miles, no road hazard, and no warning. Replace them with a proven name brand tire before your first long trip.","note":"No-name original equipment tires chosen by the factory to hit a low price, not to protect your trailer. Owners report failures with full tread, low miles, no road hazard, and no warning. Replace them with a proven name brand tire before your first long trip.","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://tirereviewsandmore.com/taskmaster-provider-st-radial-reviews/"},{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.tire-reviews.com/Tire/Austone"}],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"castle-rock","name":"Castle Rock","verdict":"avoid","headline":"Budget special-trailer tire chosen to hit a low spec-sheet number. One owner had a catastrophic failure inside 2,000 miles on a brand new toy hauler; pulling the other three tires showed the internal cords already coming apart inside the casing while the rig sat in the driveway.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"westlake","name":"Westlake","verdict":"avoid","headline":"One owner logged three separate blowouts on the same rig, every one of them a Westlake. Other owners tow on them for years without trouble, so the failure pattern is a coin flip. The safe call is to replace them instead of betting on which side of the average you land on.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.rvtravel.com/why-did-my-travel-trailer-have-3-tire-blowouts-in-18-months-rvt-1130/"}],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"trailer-king-rst","name":"Trailer King RST","verdict":"avoid","headline":"Owners report blowouts doing thousands of dollars in damage. Documented repair bills run from about $5,300 to $7,000, and one owner said insurance covered a $7,000 repair.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.tires-easy.com/blog/trailer-king-rst-real-world-insights/"}],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"power-king-tow-max-st-rr","name":"Power King Tow Max ST RR","verdict":"avoid","headline":"Federal recall in late 2014 of roughly 17,369 tires in one size for incorrect load capacity and inflation pressure stampings on the sidewall; manufactured at a plant in Shandong, China; a certified class action lawsuit followed for owners in Florida and Colorado over tread separation.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"goodyear-marathon","name":"Goodyear Marathon","verdict":"avoid","headline":"tread separation problems led to lawsuits and a class action investigation","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.classaction.org/goodyear-marathon-tire-blowout-lawsuit"}],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"dutchmen","name":"Dutchmen","verdict":"avoid","headline":"Thor Industries subsidiary now absorbing private-label production volume shifted over from Heartland during an industry contraction. Owners report insufficient clearance between trailer floors and wheel wells, which can hurt handling at highway speeds. Some fifth wheel models shipped with the wrong hitch system installed ,  an 18,000lb-rated hitch on a unit that needs a 21,000lb one. Budget-oriented models draw consistent complaints about build quality, water leaks, and slow-to-nonexistent warranty support.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["mixed"]},{"slug":"thor-hurricane","name":"Thor Hurricane","verdict":"avoid","headline":"In late 2025 Thor recalled several 2025 and 2026 models, including the Four Winds, Chateau, Quantum, and others, because a missing clamp could let the propane generator hose touch the hot generator exhaust. Heat could damage the hose, leak gas, and start a fire. Thor's own advisory told owners not to use the generator until the recall repair was done.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[{"fact":"Verified wording, evidence pass 2026-07-17","source":"https://www.lumafield.com/recalls/thor-motor-coach---liquid-propane-hose-may-contact-generator-exhaust"}],"citations":[{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["mixed"]},{"slug":"forest-river-rockwood-and-flagstaff","name":"Forest River, Rockwood, and Flagstaff","verdict":"avoid","headline":"In 2015 the Rockwood and Flagstaff lines ran real-wood cabinetry with cam locks and correctly gauged wiring, with every unit water-tested at the Goshen, Indiana plant. After Forest River doubled the production schedule between 2019-2022, cabinetry shifted to printed melamine over particle board with staples, the roof membrane spec thinned, and forums that used to post 10,000-mile clean reports are now posting delamination photos at 6 months and slide-out failures inside the warranty period. A 2015 Rockwood Signature Ultra Lite resells at roughly 78% of original sticker versus about 52% for a 2023 unit of the same trim.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"4y3oZUhKtBg","title":"5 RV Brands That Were Bulletproof in 2015—Now Falling Apart After One Trip","url":"https://youtu.be/4y3oZUhKtBg"}}],"segments":["mixed"]},{"slug":"monaco","name":"Monaco","verdict":"avoid","headline":"Monaco Coach Corporation (founded 1968) went bankrupt in 2009, was bought by Navistar, then absorbed by REV Group. Present-era Monaco units share platforms, parts bins, and production lines with budget-tier brands in the same corporate family. Owner forums for post-2018 units report undersized HVAC for the coach footprint, cabinet faces separating from frames within the first year, slide-out mechanisms grinding and binding, and gelcoat with orange-peel inconsistency.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"3sMLu8Cnc8U","title":"5 RV Brands That Were Bulletproof In 2015 — And Are Now COMPLETE Junk (The Collapse List)","url":"https://youtu.be/3sMLu8Cnc8U"}}],"segments":["mixed"]},{"slug":"jayco","name":"Jayco","verdict":"caution","headline":"Jayco is a middle of the road pick: not the disaster some videos claim, but not a safe bet either. Its 2 year limited warranty plus 3 year structural warranty is real and beats the 1 year most brands offer, though owners say getting a dealer to actually do the work can drag on for weeks or months. If you are shopping used, be extra careful with 2020 to 2022 build years (the whole Elkhart RV industry cut corners during the COVID rush), and check every window, seam, and corner for water damage, because leaks and delamination are the most common problems owners report.","note":"The real quality dip is 2020 to 2022, and it is industry-wide Elkhart, not Jayco-specific and not Thor-specific. The whole industry cut corners during the COVID rush. Buy outside that window with more confidence. That single fact explains most of why our own videos disagreed about this brand.","confidence":"medium","unestablished":"The Thor 2016 effect is unproven in EITHER direction. No before/after recall or complaint-rate data exists. \"Thor ruined Jayco\" is a real owner belief with no data behind it, so do not print it. Also could not establish: total Jayco recall count or defect rate relative to peers (no baseline exists), and the current 2025-26 sidewall substrate for Eagle/Pinnacle (Jayco stopped publishing it).","splits":[{"scope":"Jay Feather family (Feather, Air, SL, Air SL)","verdict":"buy","why":"The only line with the genuine Azdel spec upgrade, starting model year 2023. Offset by real laminated-floor delamination complaints, so inspect the floor."},{"scope":"Jay Flight and Jay Flight SLX","verdict":"caution","why":"Entry build, decontented against the standard Jay Flight. Carries the Jayco-caused carbon monoxide recall 25V-528."},{"scope":"Eagle, Pinnacle and North Point","verdict":"caution","why":"The heaviest structural chatter online, but the widely repeated 13,100 unit frame recall does not exist. Treat the online fear as overstated."},{"scope":"Seismic and Octane (toy haulers)","verdict":"avoid","why":"The most mechanically coherent failure cluster in the brand: Lippert leveling and jacks underspecified for the weight they carry."},{"scope":"Redhawk, Alante and Greyhawk (motorized)","verdict":"caution","why":"Most complaints trace to the Ford or Ram chassis, not to Jayco build quality. Do not blame Jayco for those."}],"proof":[{"fact":"NHTSA 25V-528 (filed August 14, 2025, 173 units, 2024-25 Jay Flight SLX): the furnace exhaust vent was missing from the exterior wall, a carbon monoxide poisoning risk. This one is a Jayco-caused assembly error."},{"fact":"NHTSA 22V-571 (August 19, 2022, 11,532 units, 2022-23 Eagle, Eagle HT, Jay Flight, SLX, North Point, Pinnacle, Seismic): awning fabric weld separation. This one is supplier-caused (Lippert 22E-055), not Jayco engineering, and should not be counted against Jayco build quality."},{"fact":"NHTSA 25V-072 (February 7, 2025, 1,106 units, 2021-25 Jayco Terrain and Entegra Launch): the gray tank bracket can rub the fuel tank, a fire risk. Jayco’s own filing calls it an engineering design error."},{"fact":"NHTSA 24V-762 (October 14, 2024, 2,066 units): the tire label listed load range C instead of E. A Jayco-caused data error."},{"fact":"The warranty is confirmed current: 2 year limited plus 3 year structural, longer than the 1 year industry norm. This is a real and checkable differentiator."},{"fact":"Jayco moved TO Azdel composite, and only on the Jay Feather family, starting model year 2023. The 2022 Jay Feather lists Stronghold VBL laminated walls with no Azdel; the 2023 Jay Feather lists Azdel laminated interior and exterior walls. Azdel’s own OEM list names only the Jay Feather series, and the 2026 Eagle fifth wheel still lists Stronghold VBL walls only, with no Azdel."},{"fact":"Dominant real owner themes, in consensus order: water intrusion (widest by far), delamination, QC lottery (same model, wildly different units), and dealer warranty delays of weeks to months. Blame on the delays skews dealer-side, not Jayco refusing claims."}],"citations":[{"source":{"videoId":"tzW-wF5EWbk","title":"5 Repossessed RV Brands FLOODING Dealer Lots Right Now (The \"Fire Sale\" List)","url":"https://youtu.be/tzW-wF5EWbk"}},{"source":{"videoId":"OeNs3vD2mI4","title":"8 Brand-New RV Brands HIDING Factory Defects On The Lot (The \"Walk Away\" List)","url":"https://youtu.be/OeNs3vD2mI4"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["mixed"]},{"slug":"keystone","name":"Keystone","verdict":"caution","headline":"Keystone is a caution, not the flat avoid our videos mostly called it. The scary stories are real: federal regulators made Keystone bolt reinforcement plates onto buckling 2019 to 2021 Outback frames, and since early 2025 the company has recalled new units for miswired electrical boxes, backwards generator fuel lines, and loose suspension bolts. That points to sloppy factory work on new units, not a dead brand. If you shop Keystone, stay with the Montana or Cougar lines, skip the cheap Springdale and Hideout, run the VIN through the NHTSA recall lookup, and pay for an independent inspection before you sign.","note":"The channel said avoid 10 times and caution once, yet almost every hard fact it cited checks out. The verdict still lands at caution because Keystone is the biggest name in towables, so it throws off more raw complaint noise than small brands, every recall fix was free, and quality splits hard by product line. The one caution video (Montana as slow erosion, inspect your way out of it) was the closest to right. The real pattern buyers should care about: three factory assembly error recalls in about 14 months (miswired electrics March 2025, backwards fuel lines Nov 2025, loose shock bolts May 2026). That is a factory discipline problem on brand new units, which is why the fix is a recall check plus independent inspection, not walking away from the brand entirely.","confidence":"medium","unestablished":"Could not verify: that Keystone generates the most complaints of any Thor Industries subsidiary (no per-brand complaint data exists), the claim that the Cougar racks up NHTSA complaints at 10 times Escape's per-unit rate (no source found), the 3.1 out of 5 RV Insider score (the page would not load), the 2025 Montana roof separation anecdote, the piece-rate pay claim as Keystone specific (it is an industry-wide Elkhart practice), that Keystone was Thor's number one selling brand in 2023, and the 2 to 3 year water damage timeline as specific to Springdale and Hideout (review sites confirm water damage as the top complaint but do not isolate those lines). Also note: the miswired 7-way cord recall was reported as 873 units in March 2025 trade press but NHTSA's record lists 383.","splits":[{"scope":"Montana, Montana High Country, Alpine (flagship fifth wheels)","verdict":"caution","why":"The best build in the brand with a large loyal owner club, but 2025 to 2026 Alpine and 2026 Montana units sit in the shock bolt recall 26V313000, and the 2021 High Country had a fire risk wiring recall that owners on the Montana forum say was a known water-trapping design flaw for years before Keystone fixed it. Verify recall work, then inspect."},{"scope":"Cougar (mid-tier)","verdict":"caution","why":"The heaviest complaint chatter in the brand and 2024 units are in the 2026 shock bolt recall. Delamination and water intrusion are the top owner complaints. Buy only with a clean recall check and an independent inspection."},{"scope":"Entry lines: Springdale, Hideout, Passport, Colorado, Sunset Trail, Kodiak","verdict":"avoid","why":"The thinnest build in the lineup, and the 2025 miswired 7-way cord and 12-volt box recall (fire risk, NHTSA 25V151000) landed on Colorado, Kodiak, and Sunset Trail. Owner review themes (leaks, staple-grade cabinetry, warranty fights) cluster at this price tier."},{"scope":"Used 2019 to 2021 Outback 335CG and 340BH","verdict":"avoid","why":"These carry the frame rail buckling recall 20V715000. The official fix was bolting reinforcement plates to the existing frame, not replacing it. Do not buy one without proof the recall work was done, and even then have the frame inspected."},{"scope":"Voltage toy haulers 2024 to 2026","verdict":"caution","why":"Two fresh recalls: generator fuel lines installed backwards (25V771000, fire risk) and ramp doors that can break away while loading (26V026000). Both fixes are free, so confirm both were done before purchase."}],"proof":[{"fact":"NHTSA campaign 20V715000 (filed November 18, 2020, 1,296 units, 2019 to 2021 Outback 335CG and 340BH): a section of the frame rail may have inadequate support where the drawbar attaches, allowing the frame rail to buckle. The official remedy was dealers adding reinforcement plates to the existing frame, free of charge.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=20V715000"},{"fact":"NHTSA campaign 26V313000 (filed May 18, 2026, 926 units per the NHTSA record, 773 in first press reports; 2024 Cougar, 2025 to 2026 Alpine, 2026 Montana and Walkabout): shock bolts may have been incorrectly tightened, which can reduce stability and raise crash risk. Owner letters mailed June 1, 2026.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=26V313000"},{"fact":"NHTSA campaign 25V771000 (filed November 10, 2025, 2024 to 2026 Keystone Voltage): generator fuel lines were installed incorrectly, feeding fuel into the wrong side of the carburetor, a fire risk. Same vehicle record also shows 26V026000 (January 2026), ramp doors that can break away from the frame while loading.","source":"https://api.nhtsa.gov/recalls/recallsByVehicle?make=KEYSTONE&model=VOLTAGE&modelYear=2025"},{"fact":"NHTSA campaign 15V317000 (filed May 27, 2015, across Cougar, Montana, Outback, and other 2015 lines): screws attaching the slide room to its cable mechanism could fail, allowing the room to extend while the trailer is moving. So the slide-out-opens-while-towing recall is real but dates to 2015, not recent.","source":"https://api.nhtsa.gov/recalls/recallsByVehicle?make=KEYSTONE&model=COUGAR&modelYear=2015"},{"fact":"NHTSA campaign 25V151000 (filed March 2025; 2025 Kodiak, Colorado 260RBC/270BHC/280BHC, Sunset Trail): the 7-way cord and 12-volt distribution box were wired incorrectly, leaving wiring without surge protection, a fire risk. NHTSA's record lists 383 units; March 2025 trade press reported 873.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=25V151000"},{"fact":"Keystone RV Company holds a BBB A+ rating and has been BBB accredited since November 13, 2003, while the same profile page carries a stream of negative owner reviews about leaks, workmanship, and denied warranty claims. The A+ grades complaint handling paperwork, not product quality.","source":"https://www.bbb.org/us/in/goshen/profile/wholesale-campers/keystone-r-v-company-0352-23000532"},{"fact":"Keystone scores 1.7 out of 5 stars from 454 registered reviews on Pissed Consumer, with water damage and delamination, poor workmanship, denied warranty claims, and unresponsive customer service as the top themes. Only 33 percent of reviewers would recommend the brand.","source":"https://keystone-rv.pissedconsumer.com/review.html"},{"fact":"Thor Industries' own corporate history confirms it acquired Keystone RV in 2001, so ownership has been stable for 25 years. Any story framing Keystone's problems as a recent ownership change is wrong; the brand has been under Thor since 2001.","source":"https://www.thorindustries.com/history"},{"fact":"Montana Owners Club forum thread on the 2021 Montana High Country wiring recall (moisture collecting in 120V slide circuit connectors, fire risk): veteran owners state the water-trapping connector boxes had been a known problem for many years before Keystone recalled one version of it, supporting the slow-erosion read on the flagship line.","source":"https://www.montanaowners.com/threads/keystone-montana-safety-recall.995295/"}],"citations":[{"source":{"videoId":"tzW-wF5EWbk","title":"5 Repossessed RV Brands FLOODING Dealer Lots Right Now (The \"Fire Sale\" List)","url":"https://youtu.be/tzW-wF5EWbk"}},{"source":{"videoId":"OeNs3vD2mI4","title":"8 Brand-New RV Brands HIDING Factory Defects On The Lot (The \"Walk Away\" List)","url":"https://youtu.be/OeNs3vD2mI4"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}}],"segments":["mixed"]},{"slug":"forest-river","name":"Forest River","verdict":"caution","headline":"Forest River is a caution, not a flat avoid. The Wall Street Journal reported in June 2025 that Forest River issued more recalls than any US automaker or RV maker from 2015 to 2024, about 50 a year, most from simple assembly mistakes like a wrong fuse or a misaligned furnace vent, and it paid a 5 million dollar federal fine in 2015 for failing to report defects. The company builds over 100,000 RVs a year across more than 100 plants, so quality is a lottery by plant and by line. Run the VIN through nhtsa.gov before you buy, and walk away from Palomino Puma fifth wheels until the wiring fire lawsuit is settled.","note":"The avoid verdicts leaned on a real Wall Street Journal investigation, and that part checks out. But the channel padded it with claims that do not survive checking, and it treated a company with dozens of brands and 100 plus plants as one product. Every verified defect here has a documented recall fix, and our own guide already rates Forest River's Coachmen and Rockwood lines as caution, so a flat avoid on the parent would contradict our own entries. The honest call is caution overall, with a hard avoid only on the Puma fifth wheels at the center of the wiring fire class action. Court filings there show inspectors found wiring violations in 51 of 86 sampled models, about 60 percent, even after a 41,000 unit recall.","confidence":"medium","unestablished":"The 240 BBB complaints for Forest River versus 38 for Winnebago. Those numbers appear only in the paywalled WSJ piece and we could not open it, so we do not print them. The claim that Forest River recalled over 200,000 units in one recent year. The Rockwood and Flagstaff quality decline story, including the switch to melamine cabinets, the doubled production schedule from 2019 to 2022, and factory water testing at Goshen. The outcome of the Nelson wiring class action, which had a certification ruling pending and a trial scheduled for September 2025. Per-unit defect rates versus other brands, which no public data can support.","splits":[{"scope":"Palomino Puma fifth wheels, 2002 to 2022","verdict":"avoid","why":"The center of the Nelson wiring fire class action, which covers 2002 to 2022 models. In 2024 Forest River recalled about 41,000 Puma and Cedar Creek fifth wheels for the same 7-way wiring defect, but that recall covers 2006 to 2024 Pumas, not the full class action window. And in court filings the plaintiffs' lawyers inspected about 400 units across 86 models and found 51 of 86 sampled models, about 60 percent, wired in violation. So the recall may not cover the trailer in front of you."},{"scope":"Cedar Creek fifth wheels, 2004 to 2024","verdict":"caution","why":"Pulled into the same 2024 wiring fire recall as the Puma, about 41,000 units total. The fix is free rewiring by the dealer. Demand proof the recall work was done before you buy."},{"scope":"Riverstone fifth wheels, 2018 to 2026","verdict":"caution","why":"NHTSA recall 25V550000 covers all 2,379 units for steel brake lines that can fail and leak fluid. There is a free fix. Demand proof the recall work was done before you buy."},{"scope":"Salem, Wildwood and Ozark travel trailers, 2021 to 2022","verdict":"caution","why":"NHTSA recall 22V729000 covers 5,168 units whose fresh water tank can dislodge and fall to the road. The fix is added straps. Verify it was done."},{"scope":"Rockwood and Flagstaff","verdict":"caution","why":"Same trailer sold under two badges. See the Rockwood and Flagstaff entry. Judge them exactly as Forest River."},{"scope":"Coachmen","verdict":"caution","why":"Recalls are filed under Forest River's name and Coachmen models get pulled in the same notices. See the Coachmen entry."},{"scope":"All other Forest River lines","verdict":"caution","why":"Forest River recalls in narrow build windows, often under 100 units at a time, so the brand name tells you little. Check the specific VIN at nhtsa.gov and inspect hard before buying."}],"proof":[{"fact":"The Wall Street Journal reported in June 2025 that from 2015 to 2024 Forest River issued more recalls than any US automaker or RV manufacturer, averaging about 50 recalls a year, many from human assembly error: microwaves punctured by wrong-length screws, misaligned furnace flues found a month after the inspector quit, and a 2023 recall of 50 towables for a wrong fuse installed during a parts shortage. The same article notes Forest River paid a 5 million dollar federal fine in 2015 for failing to properly report defects, and sells more than 100,000 RVs a year.","source":"http://web.archive.org/web/20250920051326/https://www.rvtravel.com/wall-street-journal-alleges-quality-flaws-forest-river-rvs-1215b/"},{"fact":"NHTSA recall 24V395 (June 2024, 41,353 units) covers 2006 to 2024 Palomino Puma and 2004 to 2024 Cedar Creek fifth wheels for incorrectly routed overcurrent protection on the 7-way connector wiring, a fire risk. Owner letters went out July 14, 2024 and the remedy is free rewiring by dealers.","source":"https://www.rvtravel.com/forest-river-recalls-more-than-41000-rvs-bad-wiring-fire-risk/"},{"fact":"Court filings in Nelson v. Forest River (4:22-cv-00049, D. Mont.) show plaintiffs' counsel inspected about 400 units across 86 Forest River fifth wheel models and found 51 of 86 models, about 60 percent, wired in violation of overcurrent protection standards.","source":"https://www.govinfo.gov/app/details/USCOURTS-mtd-4_22-cv-00049"},{"fact":"NHTSA recall 23V660000 (received September 29, 2023, 50 units) covers 2024 Shasta Phoenix and Coachmen Brookstone, Chaparral and Chaparral Lite fifth wheels for an incorrect fuse in the power distribution center, a fire risk. This is the wrong-fuse story our videos cited, confirmed at the source.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=23V660000"},{"fact":"NHTSA recall 25V550000 (received August 26, 2025, 2,379 units) covers 2018 to 2026 Riverstone fifth wheels. Steel hydraulic brake lines may fail and leak fluid, causing loss of brakes. Owner letters went out September 19, 2025 and dealers replace the lines free.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=25V550000"},{"fact":"NHTSA recall 22V729000 (received September 30, 2022, 5,168 units) covers 2021 to 2022 Salem, Wildwood and Ozark travel trailers. The fresh water tank may dislodge and fall to the ground when full. Dealers install retention straps free.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=22V729000"},{"fact":"A class action filed May 23, 2022 in Montana federal court (plaintiff Jay Nelson, whose 2019 Puma caught fire in May 2020) alleges 2002 to 2022 Forest River fifth wheels lack overcurrent protection on the wiring between the seven-way junction box and the battery, a fire risk that violates National Fire Protection Association standards.","source":"https://www.classaction.org/news/forest-river-hit-with-class-action-over-alleged-rv-wiring-system-problems"},{"fact":"On March 23, 2023 a federal judge ruled the Nelson wiring class action could proceed. The suit primarily covers Palomino Puma fifth wheels from 2002 to 2022, and investigations suggest Salem, Rockwood, Flagstaff and Wildwood may also be affected.","source":"https://mttrials.com/blog/fire-risk-in-major-rv-brand-class-action-suit/"},{"fact":"Forest River was founded in 1996 by Peter Liegl and bought by Berkshire Hathaway in 2005 for 800 million dollars. It is headquartered in Elkhart, Indiana and runs more than 100 manufacturing plants with about 11,000 employees across dozens of RV, bus, trailer and pontoon brands.","source":"https://en.wikipedia.org/wiki/Forest_River_(company)"}],"citations":[{"source":{"videoId":"tzW-wF5EWbk","title":"5 Repossessed RV Brands FLOODING Dealer Lots Right Now (The \"Fire Sale\" List)","url":"https://youtu.be/tzW-wF5EWbk"}},{"source":{"videoId":"qQPKjAHSE24","title":"The Only 5 Travel Trailer Brands That WON'T Fail You (The \"Safe List\")","url":"https://youtu.be/qQPKjAHSE24"}},{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}}],"segments":["travel-trailer","class-a"]},{"slug":"grand-design","name":"Grand Design","verdict":"caution","headline":"Grand Design is a caution buy, and the year matters more than the badge. Federal safety regulators opened investigation PE24029 in October 2024 into frame flex on 55,887 Solitude and Momentum fifth wheels from 2017 through 2023, with reports of cargo doors popping open while towing. If you are shopping used, the 2020 and newer units carry a 5 year transferable frame warranty and the 2017 to 2019 units do not, which makes those older years the ones to walk away from.","note":"The year matters more than the badge. Federal investigation PE24029 covers 2017 through 2023 Solitude and Momentum fifth wheels. Grand Design's own 5 year transferable frame warranty only reaches back to 2020, so the 2017 to 2019 units sit inside the investigation with no frame coverage. That gap is the whole buying decision.","confidence":"medium","unestablished":"Current disposition of PE24029 after Feb 2025 (upgraded to Engineering Analysis, closed, or still open). Class action outcome or certification status. Independent resale data. Whether the Winnebago acquisition caused a measurable quality change. Imagine-specific failure patterns. Exact starting model year for the Omega frame.","splits":[{"scope":"Solitude and Momentum, 2017 to 2019","verdict":"avoid","why":"Inside the federal investigation population, and excluded from the 5 year frame warranty that only reaches back to 2020. Worst of both."},{"scope":"Solitude and Momentum, 2020 to 2023","verdict":"caution","why":"Inside the investigation population, but covered by the retroactive transferable 5 year frame warranty. Note a 2020 unit's 5 year clock is running out now."},{"scope":"Reflection and Influence, 2020 to 2023","verdict":"caution","why":"Named in the April 2025 class action, but not in the NHTSA probe. Lower documented risk than Solitude and Momentum."},{"scope":"2026 and newer Omega frame units","verdict":"caution","why":"A real engineering response, announced November 2025, but no independent testing exists yet. Too new to call a buy."},{"scope":"Imagine","verdict":"caution","why":"No documented frame flex involvement. It is a travel trailer and the defect is a fifth wheel upper deck issue. We do not extend the warning here."}],"proof":[{"fact":"NHTSA opened Preliminary Evaluation PE24029 on October 9, 2024, covering 55,887 model year 2017 to 2023 Momentum and Solitude fifth wheels. 23 complaints, 22 involving a door opening in transit, 1 injury."},{"fact":"Grand Design officially concedes that a small number of larger Solitude and Momentum fifth wheels may have experienced excessive frame flex. Its TSB 24-001 defines excessive flex as vertical movement greater than 3/8 inch."},{"fact":"Lippert, the frame supplier, told NHTSA that among the multiple trailer manufacturers using its frames, the majority of complaints are for these Grand Design products. Grand Design says the flex is cosmetic and limited to the upper deck; Lippert says effects may extend back to the front axle."},{"fact":"A class action was filed in April 2025 against Grand Design and Winnebago covering Reflection, Influence, Solitude and Momentum sold 2020 to 2023, alleging NDAs and buybacks were used to silence owners."},{"fact":"The redesigned Omega frame was announced November 18, 2025, with a 5 year retroactive transferable frame warranty covering 2020 and later. Model years 2017 to 2019 are excluded."},{"fact":"As of July 2026 no recall has been issued for frame flex. The matter remains a Preliminary Evaluation."}],"citations":[{"source":{"videoId":"OeNs3vD2mI4","title":"8 Brand-New RV Brands HIDING Factory Defects On The Lot (The \"Walk Away\" List)","url":"https://youtu.be/OeNs3vD2mI4"}},{"source":{"videoId":"4y3oZUhKtBg","title":"5 RV Brands That Were Bulletproof in 2015—Now Falling Apart After One Trip","url":"https://youtu.be/4y3oZUhKtBg"}},{"source":{"videoId":"h3G2uMC4aLc","title":"5 RV Brands That Finally Fixed Their WORST Problems (And 3 That Still Haven't)","url":"https://youtu.be/h3G2uMC4aLc"}}],"segments":["mixed"]},{"slug":"coachmen","name":"Coachmen","verdict":"caution","headline":"Coachmen is a Forest River brand, and the safety record shows they are the same operation. Recalls are filed under Forest River’s name, and Coachmen models get recalled in the same notice as Forest River models for the same defect. In one 2024 recall the Coachmen Catalina and the Forest River Aurora were pulled together for the identical problem in what is plainly the same floorplan. So judge Coachmen exactly as you judge Forest River. The Catalina and Apex trailers are entry level and they act like it: buy with your eyes open, and check the weight rating sticker (a 2025 recall covering 1,833 trailers found it was printed wrong) and the removable steps (a 2025 recall covering 4,179 units found the bracket bolts work loose). The Class B vans are the ones to walk away from. The Galleria had a recall for wiring damage that can cost you power steering (572 units), and the Galleria, Beyond and Nova shared a generator fuel leak recall (1,027 units). That is not what you should be buying at that price.","note":"Coachmen is not a distinct build-quality entity. It is Forest River. Whatever we say about Forest River we must say about Coachmen, or an expert reader will catch the inconsistency.","confidence":"medium","unestablished":"Per-unit defect rates are unknowable from public data. Coachmen has 44 campaigns to Airstream’s 24, but Coachmen builds far more units across a far wider range, and production volumes by line are not public. The raw campaign count is NOT a fair comparison and must never be presented as one. Also could not establish that Coachmen plants run different QC than Forest River plants.","splits":[{"scope":"Catalina and Apex (towables)","verdict":"caution","why":"Entry-level price, entry-level build, and it behaves exactly like that. Check the GVWR placard and the clip-on steps."},{"scope":"Freelander, Leprechaun and Prism (Class C)","verdict":"caution","why":"Avoid model year 2019 specifically, for the rear differential U-bolt recall."},{"scope":"Galleria, Beyond and Nova (Class B)","verdict":"avoid","why":"The density and severity of the record at a 150,000 dollar plus price point. Power steering loss and generator fuel leak recalls."}],"proof":[{"fact":"Coachmen is not a distinct build entity. All 44 campaigns are filed under \"Forest River, Inc.\" The clincher: recall 24V280000 (April 19, 2024) recalls the Coachmen Catalina BCAT154RDX and the Forest River Aurora BART15RDX for the same cooktop isolation panel defect. Same floorplan, same defect, two badges."},{"fact":"Class B, why it earns avoid: 24V005000 (January 8, 2024, 572 units, 2020-2024 Galleria) battery boost wiring damage causes a short circuit and loss of power steering. 23V286000 (April 21, 2023, 1,027 units, Galleria, Beyond and Nova) Cummins Onan generator fuel leak, fire risk. 24V040000 (January 25, 2024, 2,519 units) awning extends unintentionally during transit."},{"fact":"Class C, the 2019 flag: 18V357000 (June 1, 2018, 471 units, 2019 Leprechaun and Freelander plus Forest River Forester and Sunseeker) U-bolts securing the rear differential, loose rear axle, loss of control. The most severe Class C defect in the record."},{"fact":"Towables, what to actually check: 25V111000 (February 21, 2025, 1,833 units, 2017-2025 Catalina) the GVWR on the federal placard is wrong and owners may unknowingly overload. 25V245000 (April 14, 2025, 4,179 units, 2024-2025 Catalina plus a dozen Forest River brands) clip-on step bracket bolts loosen, steps detach."},{"fact":"Forum evidence on build quality is real but genuinely mixed: documented reports of 86 assembly defects over two years and cabinet hinges pulling out of walls, alongside satisfied multi-year owners."}],"citations":[{"source":{"videoId":"OeNs3vD2mI4","title":"8 Brand-New RV Brands HIDING Factory Defects On The Lot (The \"Walk Away\" List)","url":"https://youtu.be/OeNs3vD2mI4"}},{"source":{"videoId":"5B5z4qaSu64","title":"7 RV Brands Flooding Auction Lots Right Now — And The Only 3 Worth Bidding On","url":"https://youtu.be/5B5z4qaSu64"}},{"source":{"videoId":"iMrSSlvJkno","title":"5 RV Brands That Break Down In 2 Years And 3 That Actually Last","url":"https://youtu.be/iMrSSlvJkno"}}],"segments":["mixed"]},{"slug":"thor-motor-coach","name":"Thor Motor Coach","verdict":"caution","headline":"Thor Motor Coach is a caution, not a hard avoid. It is the biggest motorhome builder in America, and the low price shows: owners score it 3.4 out of 5 overall, with build quality at 2.9 and warranty service at 2.6. If you shop one, run the VIN through NHTSA's free recall lookup first, because 2023 to 2026 units carry real fire and slide-out recalls that the dealer must fix for free before you take delivery.","note":"The channel flip-flopped because the truth splits by product line. The recall pile and the worst owner scores sit on the entry gas Class A and entry Class C lines, while the diesel Palazzo tier rates noticeably better. The warranty story is also two-sided: on paper Thor's 1 year limited plus 6 year lamination plus 12 year structural coverage (model year 2021 and newer) beats the industry, but owners rate the actual warranty experience 2.6 out of 5, the brand's worst score. So both a soft caution and a hard avoid were defensible depending on which line and which year the video was looking at.","confidence":"medium","unestablished":"Could not verify: the claimed 31 percent warranty claim rate (no public claim-rate data exists for any RV maker), the claim that higher-end units use structural bolts and marine-grade wiring (no spec sheet or teardown confirms it), the story of salvaged parts found in brand-new builds (single anecdote, no record), any recall for undersized propane heat shields (nothing in NHTSA), and the 2026 Vegas owner who never got the unit running (unverifiable anecdote). None of these should be printed as fact.","splits":[{"scope":"Entry gas Class A (Hurricane, Windsport, Axis, Vegas)","verdict":"avoid","why":"This is where the rough ride, electrical, and battery complaints cluster in owner reviews, and Axis and Vegas sit inside the 2025 slide-out recall. Cheapest tier of the brand, built to a price."},{"scope":"Entry Class C (Four Winds, Chateau, Quantum, Freedom Elite, Geneva, Coleman)","verdict":"caution","why":"The 2025 fire-risk propane recall (25V-709) and the slide-out recall (25V-171) center on these lines. Both have free dealer fixes, so a unit with documented recall completion is buyable at the right price."},{"scope":"Class B camper vans (Sequence, Tellaro, Rize, Scope, Dazzle, Twist)","verdict":"caution","why":"This family has its own separate recall cluster (25V-791 and 25V-792 in late 2025, 23V-285 in 2023). Same brand-wide QC lottery, different failure points."},{"scope":"Higher-end diesel (Palazzo, Aria)","verdict":"caution","why":"The best of the brand. Owner reviews rate the luxury Class A lines well above the entry tiers, though the Palazzo carried a 2023 front cap bracket recall (23V-113). Closest thing Thor has to a buy, still not a blind one."},{"scope":"Used units, pre-2021 model year","verdict":"caution","why":"The 1-6-12 warranty only started with model year 2021. Older units had a 12 month limited warranty, long expired, so you are buying entirely on inspection."}],"proof":[{"fact":"NHTSA recall 25V-171 (filed March 20, 2025, 4,251 units): 2023-2026 Axis, Chateau, Four Winds, plus Coleman, Echelon, Freedom Elite, Geneva, Outlaw, Quantum, Vegas, Eddie Bauer, Freedom Traveler, Pasadena, and Magnitude. The slide-out room can deploy without the parking brake engaged, so it can extend while driving. Remedy is a free park brake harness replacement.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=25V171000"},{"fact":"NHTSA recall 25V-709 (filed October 17, 2025, 527 units): 2026 Geneva and Coleman, and 2025-2026 Quantum, Four Winds, Pasadena, Eddie Bauer, Chateau, and Freedom Elite. A missing P-clamp lets the LP generator hose contact the exhaust, a fire risk. Free dealer fix, letters mailed December 15, 2025.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=25V709000"},{"fact":"NHTSA recall 25V-653 (filed September 30, 2025, 23 units): 2024-2025 Luminate and Indigo. The LP tank support tube may be too short with an insufficient weld that can fracture and let the propane tank detach on the road. Free dealer fix.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=25V653000"},{"fact":"NHTSA's recall database shows 11 distinct recall campaigns for the Hurricane under the Thor Motor Coach make, spanning model years through 2023 (11V459, 13V265, 15V745, 17V544, 17V634, 17V692, 17V758, 20V339, 20V498, 22V076, 23V121). Third-party trackers that include pre-Thor-Motor-Coach branding (the Four Winds era) count roughly 15 Hurricane recalls since 2006. Either way, nowhere near 50.","source":"https://api.nhtsa.gov/recalls/recallsByVehicle?make=THOR%20MOTOR%20COACH&model=HURRICANE (queried per model year)"},{"fact":"RV Insider aggregates 1,225 owner reviews of Thor Motor Coach: 3.4 out of 5 overall, with overall quality at 2.9 and factory warranty at 2.6, the brand's worst category. Recurring themes are water leaks, peeling fake leather, electrical and battery failures, and denied or delayed warranty work.","source":"https://www.rvinsider.com/Thor-Motor-Coach-RV-Reviews?make=Thor+Motor+Coach"},{"fact":"Thor Motor Coach announced its 1-6-12 warranty on June 4, 2020, effective for 2021 Class A and Class C motorhomes: 1 year limited, 6 year lamination, 12 year structural. This is longer paper coverage than most competitors offer.","source":"https://www.thormotorcoach.com/blog/new-industry-leading-warranty"},{"fact":"Law firm Migliaccio & Rathod opened an investigation (announced June 24, 2026) into Thor Motor Coach LP tank mounting systems, citing insufficient welds and detachment risk. It is an investigation seeking owners, not a filed lawsuit. No Thor Motor Coach class action was found.","source":"https://classlawdc.com/2026/06/24/thor-motor-coach-propane-tank-investigation/"},{"fact":"The rear axle differential fluid recall is real but it is NHTSA 20V-178, reported to NHTSA March 25, 2020 with the recall beginning May 22, 2020, covering 2020 Chateau, Quantum, Vegas, Axis and 2020-2021 Four Winds built on Ford chassis. The defect and the remedy belong to Ford, not to Thor's own build, and it does not touch 2026 models.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=20V178000"},{"fact":"Wrong-amperage circuit breaker recalls are also real: a 2020 Freedom Elite recall, and RC000305 covering 11 units of the 2025 Tranquility and Sanctuary where a 50-amp breaker was installed where a 20-amp was required, with owner letters mailed August 6, 2024.","source":"https://www.rvtravel.com/thor-motorhomes-recall/"}],"citations":[{"source":{"videoId":"tzW-wF5EWbk","title":"5 Repossessed RV Brands FLOODING Dealer Lots Right Now (The \"Fire Sale\" List)","url":"https://youtu.be/tzW-wF5EWbk"}},{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}},{"source":{"videoId":"OeNs3vD2mI4","title":"8 Brand-New RV Brands HIDING Factory Defects On The Lot (The \"Walk Away\" List)","url":"https://youtu.be/OeNs3vD2mI4"}}],"segments":["class-a"]},{"slug":"gulf-stream","name":"Gulf Stream","verdict":"caution","headline":"Gulf Stream is a family owned budget brand, not a scam brand, and its federal recall record is one of the smallest and mildest of any big RV maker. The catch is that the badge covers two very different products: the cheap lines (Ameri-Lite, Conquest trailer, Kingsport, Innsbruck, Trailmaster) are built with wood studs and bargain materials, while the laminated lines (Vintage Cruiser, Vista Cruiser, Envision, and friends) use welded aluminum frames plus Azdel composite that cannot rot. Buy the laminated lines with confidence, treat the wood framed cheap lines as strictly get what you pay for, and read the warranty fine print before you sign because it is strict about deadlines and excludes water damage.","note":"The channel said avoid four times and caution once, but the truth splits by product line, not by brand. Gulf Stream sells wood framed bargain trailers and aluminum framed Azdel laminated trailers under the same name, so both the horror stories and the happy owners are right, about different units. Two of the channel's harshest claims fell apart on checking: Gulf Stream builds no Class A motorhomes at all today, and its Class C motorhomes use Azdel composite, not wood.","confidence":"medium","unestablished":"The \"31 percent warranty claim rate\" number the channel used twice could not be checked in either direction. No public source publishes brand level warranty claim rates, so do not print it. Also unestablished: the ConsumerAffairs \"lowest ratings\" claim (the page blocks automated access, so the current score is unverified), how BT Cruiser electrical and battery complaint rates compare to other Class C brands, and the claim of near zero resale recognition. Owner forum complaints about leaks and cheap fixtures on the budget lines are real but anecdotal, with no defect rate data behind them.","splits":[{"scope":"Laminated travel trailer lines (Vintage Cruiser, Vista Cruiser, Envision, GEO, Gulf Breeze, Streamlite, Matrix, Northern Express)","verdict":"buy","why":"Welded aluminum frames, vacuum bonded walls, and Azdel composite substrate that cannot absorb water or rot. The only recalls on these lines in recent years were a handful of small certification label corrections (all under about 275 units each), never structural."},{"scope":"Conventional wood framed trailer lines (Ameri-Lite, Conquest travel trailer, Kingsport, Innsbruck, Trailmaster)","verdict":"caution","why":"Gulf Stream's own construction page confirms wood studs and aluminum siding on these lines. They are among the cheapest trailers on any lot, and owner forums report cheap fixtures, loose trim, and factory misses. These lines also carry the brand's only recent hardware safety recalls, both small: a 2019 gas refrigerator sealing recall (205 units, CO and LP gas risk) and a 2026 reversed turn signal wiring recall (172 units). Fine at the price if you inspect hard and stay ahead of seal maintenance, since the warranty excludes water damage."},{"scope":"BT Cruiser and Conquest Class C motorhomes","verdict":"caution","why":"Construction is better than the channel claimed (Azdel substrate, not wood), but there is a real 2023 entry door latch recall on 557 units and a 2018 unfused solar circuit recall on 605 units, plus owner reports of fit and finish misses. The chassis is Ford or Chevrolet, so drivetrain complaints are not Gulf Stream's build."},{"scope":"Used pre 2010 units and any former disaster housing unit","verdict":"avoid","why":"Gulf Stream built tens of thousands of FEMA trailers after Katrina that tested high for formaldehyde and ended in a class action settlement. Those were emergency housing units, not retail RVs, but some leaked into the used market. Never buy a used Gulf Stream without confirming it was a retail unit."}],"proof":[{"fact":"NHTSA recall 23V231 (March 31, 2023, 557 units): 2023 to 2024 Conquest and BT Cruiser Class C motorhomes, entry door latch may fail and block entry or exit. Fixed free by dealers. This is the biggest recent Gulf Stream recall and it is small by industry standards.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=23V231"},{"fact":"NHTSA recall 18V714 (October 11, 2018, 605 units): 2018 to 2019 Conquest and B Touring Cruiser motorhomes had an unfused auxiliary solar charging circuit, a fire risk. This is the most serious wiring defect in the recent federal record; the other is the January 2026 reversed turn signal wiring recall (26V010, 172 units) on Trail Boss and Ameri-Lite trailers.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=18V714"},{"fact":"NHTSA recalls 21V343 (May 2021, 246 units) and 17V344 (May 2017, 272 units) were both label errors, wrong tire size or pressure info on the certification sticker. Gulf Stream's recent recall history is a majority of label corrections, plus a handful of small sub 650 unit hardware fixes, with no frame, structural, or water intrusion recalls.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=21V343"},{"fact":"NHTSA recall 19V783 (October 31, 2019, 205 units): 2020 Amerilite, Conquest, Innsbruck, Grand River, Kingsport, and Trail Master trailers had a gas refrigerator compartment that was not properly sealed, risking carbon monoxide or flammable LP gas release into the living area. This is the one CO and fire risk recall on the budget lines.","source":"https://api.nhtsa.gov/recalls/campaignNumber?campaignNumber=19V783"},{"fact":"Gulf Stream was one of the makers of post Katrina FEMA trailers with elevated formaldehyde. A $42.6 million class settlement got final approval in September 2012; Gulf Stream was in a group with Forest River, Vanguard, and Monaco that paid $20 million of the manufacturer share. Notably, in the three cases that went to trial, juries sided with the manufacturers and awarded nothing.","source":"https://www.cbsnews.com/news/katrina-rita-victims-get-426m-in-toxic-fema-trailer-suit/"},{"fact":"Gulf Stream Coach is the largest family owned RV manufacturer in North America, founded March 17, 1983 in Nappanee, Indiana by the Shea family, which still runs it. It was never bought by Thor or Forest River, so 'the brand died' stories are wrong; it is an independent that shrank its lineup.","source":"https://rv-pro.com/features/gulf-stream-coach-40-years-in-the-making/"},{"fact":"Gulf Stream's current motorhome lineup is two Class C models only, the BT Cruiser and the Conquest Class C. There is no Class A motorhome in the current lineup at all.","source":"https://www.gulfstreamcoach.com/products/motorhomes"},{"fact":"Gulf Stream's own construction page splits the lineup: Ameri-Lite, Conquest, Innsbruck, Kingsport, and Trailmaster use conventional construction with wood studs and aluminum siding, while Envision, GEO, Gulf Breeze, Streamlite, Matrix, Vintage Cruiser, and Vista Cruiser use laminated vacuum bonded walls with welded aluminum frames and Azdel. The BT Cruiser and Conquest Class C motorhomes use Azdel substrate instead of wood.","source":"https://www.gulfstreamcoach.com/construction"},{"fact":"The written warranty on model year 2018 and later travel trailers is 1 year general plus a 3 year structural warranty on walls, floor, and roof. The fine print is strict: you must notify Gulf Stream within 10 days of finding a defect, water leaks, condensation, and mold damage are excluded, the warranty is void if the RV is titled in a business name, and a fee shifting clause lets Gulf Stream recover attorney fees from owners who sue and lose.","source":"https://www.gulfstreamcoach.com/media/uploads/1/16180_3yearwarrantyjun2018email.pdf"},{"fact":"Owner forum threads on Gulf Stream trailers report budget materials, cheap fixtures, loose trim, and factory misses, but also praise the roof warranty and say the factory backs its product better than most. The complaint pattern matches a cheap but supported brand, not a defective one.","source":"https://forum.rvusa.com/threads/gulf-stream-travel-trailers-are-they-any-good.7297/"}],"citations":[{"source":{"videoId":"tzW-wF5EWbk","title":"5 Repossessed RV Brands FLOODING Dealer Lots Right Now (The \"Fire Sale\" List)","url":"https://youtu.be/tzW-wF5EWbk"}},{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}},{"source":{"videoId":"OeNs3vD2mI4","title":"8 Brand-New RV Brands HIDING Factory Defects On The Lot (The \"Walk Away\" List)","url":"https://youtu.be/OeNs3vD2mI4"}}],"segments":["class-a"]},{"slug":"fleetwood","name":"Fleetwood","verdict":"caution","headline":"The Fleetwood that earned the good reputation went bankrupt in 2009 and its motorhome plants have changed hands four times since, most recently to crane maker Terex in February 2026. Today’s Fleetwood builds Class A gas motorhomes only, and a February 2025 recall (NHTSA 25V121000) covered 2,666 of them for an exhaust tip that can detach and let carbon monoxide into the cabin. If a seller tells you Fleetwood is bulletproof, ask which Fleetwood they mean.","note":"The era split IS the answer. The Fleetwood that earned the bulletproof reputation went bankrupt in 2009, and its plants have changed hands four times since. \"Bulletproof\" and \"junk\" are both defensible if you never say which company you mean. That is why our own two videos disagreed.","confidence":"high on corporate history and recalls, LOW on the quality-decline claim itself","unestablished":"No rigorous longitudinal quality dataset exists. The \"REV ruined Fleetwood\" consensus is owner-forum sentiment, not measurement. Do not dress it up as more.","splits":[{"scope":"Pre-2009 (Fleetwood Enterprises)","verdict":"caution","why":"Only because the coaches are now 17 years old or more. The bulletproof reputation attaches to a company that no longer exists."},{"scope":"Gas Class A, 2022 to 2025","verdict":"avoid","why":"Covered by the February 2025 carbon monoxide recall, on top of four ownership changes in 17 years."},{"scope":"2009 to today (Fleetwood RV), everything else","verdict":"caution","why":"A different company wearing the old badge. Judge the unit, not the name."}],"proof":[{"fact":"Fleetwood Enterprises filed Chapter 11 on March 10, 2009. On July 17, 2009 American Industrial Partners bought the motorized RV assets. The travel trailer division was closed."},{"fact":"Four corporate structures in 17 years: American Industrial Partners (2009), Allied Specialty Vehicles (2010), renamed REV Group (November 2015), IPO (January 2017), Terex merger completed February 2, 2026."},{"fact":"NHTSA recall 25V121000 (REV Recreation Group, received February 27, 2025, 2,666 units) covers 2022-2025 Bounder, Flair and Fortis, 2023-2025 Flex, and 2022-2023 Southwind. The engine exhaust tip may detach, letting fumes into the cabin. NHTSA states a risk of injury or death from carbon monoxide poisoning."},{"fact":"Fleetwood today builds Class A motorhomes only. Any Fleetwood travel trailer is a pre-2009 used unit from a division that no longer exists."}],"citations":[{"source":{"videoId":"tzW-wF5EWbk","title":"5 Repossessed RV Brands FLOODING Dealer Lots Right Now (The \"Fire Sale\" List)","url":"https://youtu.be/tzW-wF5EWbk"}},{"source":{"videoId":"ueQq1EqSQL8","title":"5 RV Brands That Lose 60% Value In Year 1 (The 'Money Pit List')","url":"https://youtu.be/ueQq1EqSQL8"}},{"source":{"videoId":"gUvnwIbwMRo","title":"8 RV Brands That Were Premium In 2021 -- Are JUNK Now (The 2026 Quality Collapse)","url":"https://youtu.be/gUvnwIbwMRo"}}],"segments":["mixed"]},{"slug":"winnebago","name":"Winnebago","verdict":"caution","headline":"\"Winnebago\" means three different things. Winnebago Industries is a parent company that also owns Grand Design and Newmar, so a good Grand Design says nothing about a Winnebago coach. The motorhomes are built in Iowa, and the Winnebago travel trailers are built in a separate Indiana plant the company bought in 2010. Judge the exact unit in front of you, not the badge on it.","note":"The badge and the parent are two different questions, and conflating them is what broke our scripts. Winnebago Industries is a holding company that also owns Grand Design and Newmar. A good Grand Design says nothing about a Winnebago coach.","confidence":"medium","unestablished":"Could not establish that Winnebago towables are measurably better or worse than the motorhomes. The only direct comparison found was a single forum owner, which is an anecdote, not evidence.","splits":[{"scope":"Winnebago-badged motorhomes (Iowa built)","verdict":"caution","why":"Built in Forest City, Charles City and Lake Mills, Iowa. This is the historic Winnebago."},{"scope":"Winnebago-badged towables (Indiana built)","verdict":"caution","why":"A different operation in all but name. Winnebago exited towables in 1983 and re-entered by buying SunnyBrook Manufacturing in 2010. Different plant, different workforce, different heritage."}],"proof":[{"fact":"Winnebago Industries is a holding company, not a single builder. It acquired Grand Design on November 8, 2016 (about 500 million dollars) and completed the Newmar acquisition on November 8, 2019."},{"fact":"Winnebago exited towables in 1983 and re-entered by buying SunnyBrook Manufacturing in 2010. Towables are built in Middlebury, Indiana. Motorhomes are built in Forest City, Charles City and Lake Mills, Iowa."},{"fact":"NHTSA recall 24V826000 (Winnebago Industries, 11,982 units) covers model years 2014-2025 across Sightseer, Adventurer, Forza, Vista, Sunstar and Itasca. Hood bracket adhesive incorrectly applied, bracket can detach. Large count, low severity."},{"fact":"Winnebago-branded towables continue in production for 2026 (Micro Minnie, Minnie, Voyage, Access, HIKE, M-Series). Only the Hike 100 is discontinued."}],"citations":[{"source":{"videoId":"h3G2uMC4aLc","title":"5 RV Brands That Finally Fixed Their WORST Problems (And 3 That Still Haven't)","url":"https://youtu.be/h3G2uMC4aLc"}},{"source":{"videoId":"o9KXlF26Vwg","title":"6 CHEAP RV Brands EVERYONE IGNORES — But They Outlast $80K Premium Units (Side-By-Side Proof)","url":"https://youtu.be/o9KXlF26Vwg"}},{"source":{"videoId":"gUvnwIbwMRo","title":"8 RV Brands That Were Premium In 2021 -- Are JUNK Now (The 2026 Quality Collapse)","url":"https://youtu.be/gUvnwIbwMRo"}}],"segments":["mixed"]},{"slug":"tiffin","name":"Tiffin","verdict":"caution","headline":"Thor bought Tiffin in December 2020, but for five years Thor left the family in charge and the Red Bay service center kept its reputation. That changed in February 2026, when president Leigh Tiffin resigned and Thor folded Tiffin into a group run by Jayco’s president. Bob and Van Tiffin are still involved, and Red Bay still has 48 service bays, but the 2026 and newer coaches are the first ones built without a Tiffin running the company. Ask the dealer who the current president of Tiffin is, and check the Allegro Bay subframe recall (NHTSA 24V669000) on any 2022 to 2025 unit.","note":"This is the most decision-relevant brand in the guide, because the answer changed five months ago. Thor bought Tiffin in December 2020 but left the family running it. That protection ended in February 2026, when Leigh Tiffin resigned and Thor folded Tiffin into a group led by Jayco’s president. The 2026 coaches are the first built without a Tiffin running the company.","confidence":"high on the corporate and leadership timeline and the recalls, LOW on whether quality measurably changed after the acquisition","unestablished":"No credible longitudinal quality dataset. The two ratings found point opposite directions and both are weak: a 2023 RVT study ranked Tiffin highest of 10 manufacturers at 4.3 out of 5, while PissedConsumer shows 2.4 out of 5 from 22 self-selected reviews. Anyone claiming to know that Thor degraded Tiffin quality is guessing.","splits":[{"scope":"Pre-2020 (family owned)","verdict":"buy","why":"The era the reputation was built in. Family owned, service legendary."},{"scope":"2021 to 2025 (Thor owned, Tiffin run)","verdict":"caution","why":"Ownership changed, day-to-day control did not. Check the Allegro Bay subframe recall on 2022 to 2025 units."},{"scope":"2026 and newer","verdict":"caution","why":"Unproven. The first coaches built without a Tiffin running the company. Too new to call either way."}],"proof":[{"fact":"Thor acquired Tiffin for 300 million dollars, effective at close of business December 18, 2020."},{"fact":"On February 12, 2026 president Leigh Tiffin resigned effective immediately to join NIRVC."},{"fact":"On February 23, 2026 Thor scrapped its independent-OEM model and folded Tiffin into a group led by Ken Walters, president of Jayco. Airstream and KZ kept their independence. Tiffin did not."},{"fact":"NHTSA recall 24V669000 (received November 9, 2024, 400 units) covers 2022-2025 Allegro Bay. The subframe truss may collapse and pinch wiring, causing an arc and fire risk. The affected build window (September 14, 2021 to June 18, 2024) is entirely after the acquisition."},{"fact":"The service moat survived. The Red Bay, Alabama facility still operates as the Bob Tiffin Service Center with 48 bays, and Bob, Van and Trent Tiffin remain involved. Separately, two 2024-2025 recalls involved missing or misplaced secondary emergency exits (recall TIF-144)."}],"citations":[{"source":{"videoId":"vyyL9Q4V29s","title":"Only 5 Class A Motorhome Brands That Still Last","url":"https://youtu.be/vyyL9Q4V29s"}},{"source":{"videoId":"o9KXlF26Vwg","title":"6 CHEAP RV Brands EVERYONE IGNORES — But They Outlast $80K Premium Units (Side-By-Side Proof)","url":"https://youtu.be/o9KXlF26Vwg"}},{"source":{"videoId":"CVtWg2wgbUA","title":"6 More RV Brands That Were Trusted In 2018 — And Are Now Unrecognizable","url":"https://youtu.be/CVtWg2wgbUA"}}],"segments":["class-a"]},{"slug":"carlisle","name":"Carlisle","verdict":"caution","headline":"Older/legacy Carlisle radials have documented failures - one owner ran four brand-new 10-ply Carlisles under the trailer's weight rating and three of the four blew before 5,000 miles. Newer radial lines have reportedly cleaned up the reputation, so the verdict is conditional: match the exact current model number and you may be fine, inherit an older set and you're gambling.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"aLOGC4JpZ28","title":"7 RV Tire Brands That Will Blow Out At Highway","url":"https://youtu.be/aLOGC4JpZ28"}}],"segments":["tires"]},{"slug":"arctic-fox","name":"Arctic Fox","verdict":"caution","headline":"Named as Nash's premium sibling on the same Northwood assembly line, sharing the same structural standard -- the video's point is that the price gap over Nash buys trim, cabinetry, and badging, not extra durability.","note":"","confidence":null,"unestablished":"","splits":[],"proof":[],"citations":[{"source":{"videoId":"pdFil5gHc5s","title":"6 CHEAP RV Brands That Outlast Premium $80K Trailers (Side-By-Side Proof)","url":"https://youtu.be/pdFil5gHc5s"}}],"segments":["mixed"]},{"slug":"lance","name":"Lance","verdict":"buy","headline":"Lance is a buy, but the build year matters more than the badge. The bones are real: aluminum framing, Azdel composite walls instead of cheap plywood, and a small recall record. Quality slipped on fit and finish while REV Group owned the company from January 2018 to June 2025, and the new owner admits it, so inspect those years hard for front window leaks and slide seal problems, and know the factory warranty only runs one year and does not cover the appliances.","note":"The split is ownership era, and that is why our own videos disagreed. Lance was sold twice: REV Group, a public company, bought it in January 2018, then sold it to Vision Kore, led by RV veteran Bill Rex, effective June 26, 2025. The new CEO says the structure stayed solid the whole time but the small stuff, trim, curtains, sealant, assembly details, got sloppy under REV. So the channel's one caution video pointed at roughly the right years but backed it with a leaked warranty stat we could not find anywhere. Buy pre 2018 used with confidence, inspect 2018 to 2025 units carefully, and treat the new ownership era as promising but unproven.","confidence":"medium","unestablished":"Could not verify: the claim that teardowns of 15 year old Lance units show zero frame rot; the 78 percent resale retention anecdote for a 2019 truck camper; the auction price ranges quoted; the story that Lance lost its refrigerator, slide, and water heater suppliers in 2021 to 2022 and substituted unqualified ones (the direction of a REV era quality dip is confirmed by the CEO himself, but this specific supplier story has no public trace); the exact year Lance standardized Azdel across the lineup; the Lance 650 dry weight figure; and the superlative that Lance has won the DSI dealer award more than any other manufacturer in its segment (14 wins are reported in trade coverage, the \"more than anyone\" part is not established).","splits":[{"scope":"Used units built before 2018 (original ownership era)","verdict":"buy","why":"The legacy reputation is earned: aluminum frame, Azdel walls, repeat DSI dealer satisfaction awards, and a small recall record. The current CEO says even during the rough years the structural integrity held. Standard water damage inspection still applies to any used RV."},{"scope":"Units built 2018 to mid 2025 (REV Group ownership)","verdict":"caution","why":"The new CEO, Bill Rex, admits this era had a lot of problems: crooked trim, sloppy assembly, sticky shades, missing molding. Owner reports cluster on first year water leaks at front windows and slide seals, plus slow warranty service. The shell is fine; the details need a hard pre purchase inspection."},{"scope":"Units built after the June 2025 sale to Vision Kore (Bill Rex era)","verdict":"caution","why":"Real turnaround signals: new leadership publicly owning the problems, dealers reporting the best campers in years. But it is too new for independent proof, and the base warranty is still only one year with appliances excluded."},{"scope":"Travel trailers versus truck campers, any year","verdict":"caution","why":"Truck campers are the core product and outsell the trailers more than two to one at the factory. The trailer line carries more of the front window leak and slide complaints. If you want the safest Lance, it is a truck camper."}],"proof":[{"fact":"REV Group, a public specialty vehicle maker, closed its acquisition of Lance Camper Manufacturing Corp. of Lancaster, California on January 12, 2018. Lance was not independent or family run after that date.","source":"https://www.truckcamperadventure.com/rev-group-acquires-lance-campers/"},{"fact":"REV Group sold its non-motorized Lance Camper business to Vision Kore Inc., effective June 26, 2025, returning it to private ownership with longtime RV industry veteran Bill Rex as president. REV Group's own press release names Vision Kore as the buyer.","source":"https://revgroup.com/rev-group-sells-non-motorized-lance-camper-business-to-vision-kore-as-part-of-strategic-focus-on-motorized-rv-business/"},{"fact":"The June 2025 sale of Lance Camper to Vision Kore Inc. was independently reported in business and trade press, corroborating the buyer name and the timing.","source":"https://biztimes.com/rev-group-sells-lance-camper-business-to-vision-kore-inc/"},{"fact":"Trade coverage of the sale confirms REV Group exited the non-motorized segment by selling Lance Camper, with Bill Rex leading the new ownership group.","source":"https://rv-pro.com/news/rev-group-sells-lance-camper-exits-non-motorized-segment/"},{"fact":"New CEO Bill Rex acknowledges the REV era quality dip on the record: the safety and structural integrity held, but fit and finish deteriorated (crooked curtains, misaligned trim, missing molding). A dealer told the new team these are the best campers since founders era leaders Jack and Jeff left. Truck campers outsell Lance travel trailers more than two to one.","source":"https://www.truckcamperadventure.com/quality-first-how-new-leadership-is-rebuilding-trust-at-lance-camper/"},{"fact":"Rex stated plainly, we have had a lot of problems, a lot of issues, while saying things are now the best they have been in years.
