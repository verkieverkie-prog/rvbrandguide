ers/","https://crowsurvival.com/repossessed-rvs-for-sale/"]},{"heading":"What a first-timer should avoid, and the path we actually recommend","body":"Not every discount channel deserves your money. Here is the straight ranking for a first-time auction buyer spending $40,000 to $150,000 of retirement money.\n\nAvoid entirely as a first-timer:\n\n1. Salvage auctions (Copart, IAA) for anything you plan to live or travel in. These units were totaled by an insurance company for a reason. Between broker requirements in about 28 states, no-financing titles, liability-only insurance, and flood risk, this channel is for rebuilders with shops, not buyers with retirement dates.\n2. Any flood-branded or flood-suspect unit, at any price, from anyone. Wiring corrosion and hidden mold do not negotiate.\n3. Sight-unseen online bidding with no third-party inspection. Photos hide delamination, smell, and soft floors, which are exactly the three things that total an RV.\n4. Dealer-auction 'access' middlemen. If you cannot bid at Manheim yourself, do not pay a stranger to bid blind for you.\n5. Any sale where the title is not in hand or the VIN is unavailable before bidding. No exceptions.\n\nThe recommended path, in order:\n\n1. Bank and credit union direct repos. Start with RepoFinder's free state-by-state lender listings and calls to local credit unions. You get repo pricing with normal-sale conditions: time to inspect, room to negotiate, a lien-free title from the lender. The best documented buyer outcomes we found (50 percent below low retail on a near-new unit; $98,900 listed, $52,000 paid) both came through this channel, not a bidding floor.\n2. Repo consignments at dealers and liquidators. Banks place repos with dealers and firms like National Liquidators to sell. You lose a little discount and gain a full walkthrough. For most 55+ buyers this is the sweet spot of price versus protection.\n3. Live public auctions, only after you have attended one without bidding, done the 20-minute inspection, run the VIN, and set a written walk-away number.\n\nAnd hold on to the honest bottom line from the people who buy these for a living, posted plainly on iRV2: without real knowledge and real inspection time, an auction is a dice roll, and many buyers do just as well negotiating hard on a bank repo or a motivated private sale. The loophole is not the auction itself. The loophole is that lenders are not emotional sellers. They hold no memories of family trips and they want the asset gone. Buy from motivated institutions, verify everything with your own eyes and your own VIN checks, price the repairs before you bid, and the 30 to 50 percent discount is real. Skip any one of those steps and you are the exit strategy for someone else's problem.","checklist":["First move this week: search your state on RepoFinder.com and call two local credit unions to ask about repossessed RV inventory.","Before any bid anywhere: VIN through NICB VINCheck plus an NMVTIS report, and the 20-minute inspection completed in person.","Before any purchase over $60,000: NRVIA-certified inspection ($500 to $1,200) as a condition of your offer wherever the format allows it.","Never bid on: flood brands, visible delamination, soft floors, missing titles, or any unit you have only seen in photos.","Always know before the hammer: buyer's premium, payment deadline, transport plan, insurance plan, and your written maximum number."],"sources":["https://www.repofinder.com/blog/repo-rvs-sale/","https://www.irv2.com/threads/website-with-bank-repos-rvs.1537289/","https://carproxy.com/regulations","https://www.irv2.com/threads/manheim-auctions.1867367/","https://www.motorhomeauctions.com/"]}]},{"key":"inspection","title":"The Pre-Purchase Inspection Checklist","intro":"Print this and take it to the lot. It is 60 numbered checkpoints you can run in about 90 minutes with a flashlight, a marble, and your phone. You do not need to be a mechanic. You need to be slow, stubborn, and willing to walk away. Water is the killer in RVs. A soft floor or a bubbled sidewall can mean $10,000 to $30,000 in hidden repair costs, and most of it never shows on a sunny lot unless you go looking. Every number in this checklist comes from a real source, and where costs vary, I give you the range and what moves it. One ground rule before you start: tell the seller you need the rig plugged into power, hooked to city water, with propane in the tank, and slides out. If they will not set that up, that is your first warning sign. A seller with nothing to hide will let you test everything.","sections":[{"heading":"Before you touch the RV: what to bring and the ground rules","body":"You are about to spend $40,000 to $150,000. Treat this like a job. Wear clothes you can kneel in. Go on a dry day if you can, and go in daylight. Plan on 90 minutes minimum for a trailer and 2 hours or more for a motorhome. Do not let the salesperson rush you or fill the silence with talk. If you hear 'we already checked all that,' smile and keep checking.\n\nThe two cheap tools in the module title do real work. The flashlight is for dark cabinets, storage bays, and seams, because water stains and corrosion hide in the dark. The marble is a simple sag detector: set it on the floor in the kitchen, bath, and near each slide. On a level rig, it should sit still or drift slowly. If it rolls off briskly toward one wall or a slide opening, the floor is sagging there, and sag near water sources usually means rot underneath. Pros confirm the same thing by pressing with their hands, so do both. Note that the marble only works if the RV itself is parked level, so check that first.","checklist":["1. Bring: this checklist, a bright flashlight, a marble, a phone with camera, a small screwdriver or awl for gently probing suspect wood, paper towels, and a pen. A $30 pin-type moisture meter is optional but powerful.","2. Confirm before arrival: rig plugged into 30/50-amp shore power, connected to city water, propane bottle filled and on, batteries charged, slides out, and keys to every compartment.","3. Write down the full 17-character VIN from the title or the federal certification label (usually on the driver's side exterior or inside a cabinet). You need it for the paperwork checks in Section 8.","4. Take photos of everything you find, good and bad. Photos are your negotiating file and your memory.","5. Rule for the whole inspection: your nose is a tool. A musty or moldy smell anywhere means trapped moisture somewhere. Air freshener plugged in everywhere is a cover-up until proven otherwise."],"sources":["https://blog.campersinn.com/blog/used-rv-inspection-list","https://rvhelp.com/blog/rv-inspection-checklist","https://www.recnationstorage.com/blog/rv-inspection-checklist/"]},{"heading":"Checkpoints 6 to 14: the roof and every seam on it","body":"Almost every expensive RV problem starts on the roof. The factory sealant around vents, skylights, antennas, and the front and rear caps shrinks and cracks with sun and vibration. That is why RV manufacturers tell owners to inspect roof seals about every 90 days. A seller who actually maintained the rig can show you resealing receipts or fresh, clean sealant lines. A roof that has never been touched in five years has leaked, whether the damage shows yet or not.\n\nGet on the roof if there is a ladder and you are steady on your feet. If not, use a step ladder at each corner and your phone camera on a selfie stick. Do not skip this because it is awkward. This is where the money hides.","checklist":["6. Look at every sealant line: around vents, skylights, the AC shroud, antennas, and where the roof meets the front and rear caps. You want smooth, intact sealant. Cracked, lifted, peeling, or missing sealant means water has had a path in.","7. On a rubber (EPDM or TPO) roof, look for tears, punctures, bubbles, and spots worn thin, especially under tree-branch scratch marks.","8. Press gently on the roof decking as you move (stay on the marked walkable areas). Spongy or soft spots underfoot mean the plywood under the membrane is rotting. That is structural water damage, not a patch job.","9. Check the roof-to-wall seam down both sides of the rig (the drip rail or termination bar). Lifted trim or globs of amateur caulk over caulk is a sign of a chased leak.","10. Look at the caulk quality itself. One clean, even, professional bead is maintenance. Five layers of different colored goop is someone fighting a leak they never fixed.","11. Inside, open every overhead cabinet and shine the flashlight at the ceiling corners and around every vent and skylight ring. Brown rings, swollen paneling, or rusty screw heads mean the roof has already leaked.","12. Check the ceiling around the AC unit inside. A loose or stained ceiling assembly there is a common leak point.","13. Ask directly: 'When was the roof last resealed, and do you have the receipt?' Write the answer down with a date.","14. If the roof was recently coated or painted, ask why. A fresh full coating on a rig for sale can be honest maintenance or can be hiding damage. Weight it with everything else you find inside."],"sources":["https://www.rvtravel.com/tonys-travels-seal-approval-1245/","https://blog.campingworld.com/learn-to-rv/everything-you-need-to-know-about-rv-seams-sealants/","https://calrvspecialists.com/what-should-i-look-for-when-inspecting-my-rv-roof/","https://rvlife.com/rv-water-damage-signs/"]},{"heading":"Checkpoints 15 to 24: water intrusion, the deal killer","body":"Water damage is the single most expensive common problem in used RVs. Once water gets past the skin, it rots the wood framing and floor from the inside, and by the time you can feel it, the damage is deep. Repair bills for serious water damage commonly run $10,000 to $30,000. Delamination, where the fiberglass outer skin lets go of the wall underneath and bubbles, runs about $800 for one small spot, $1,500 to $4,000 per panel, and $5,000 to $15,000 or more for a full sidewall. Insurance and extended warranties usually do not cover delamination at all. What moves the number: how long the leak ran, whether framing wood is rotted (labor explodes), and whether the wall is bonded fiberglass (worse) or corrugated aluminum (cheaper to open up).\n\nHere is the daylight trick from the title: climb into the biggest pass-through storage bay, have someone close the door behind you, and let your eyes adjust for a minute. Then look along every seam and corner. Any pinpoint of daylight is a hole that lets water in every time it rains. It works because light and water follow the same paths.","checklist":["15. Stand at each end of the RV and sight down the sidewalls in raking light. Look for bubbles, ripples, or waviness in the fiberglass. Press any bubble gently. That is delamination, and it is a walk-away on a bonded-wall rig (see Section 9).","16. Walk the entire interior floor slowly, heel first, paying extra attention around the entry door, toilet, shower, kitchen sink, and along every slide opening. Any softness, crunch, or flex is subfloor rot.","17. Run the marble test in the kitchen, bathroom, and beside each slide (rig must be parked level). A marble that rolls hard toward one spot marks your sag.","18. Open every cabinet, closet, and drawer with the flashlight. Look for water stains, swollen particle board, rippled wall panels, rusty screws or staples, and mildew spots, especially in cabinets that share a wall with the shower or sit under a window.","19. Pull back a corner of mattress and cushions. Check the plywood under the bed and dinette for stains and mold.","20. Look at the ceiling and walls for discoloration, bubbling wallpaper, or trim that has been recently replaced in one small area. Fresh trim on an old rig usually marks a repaired (or hidden) leak.","21. Press around the inside frame of every window. Soft wall board under a window means the window seal failed.","22. Do the storage-bay daylight check described above in every bay big enough to see into with the door shut.","23. Smell each enclosed space fresh when you open it. Musty means moisture. If the rig is full of air fresheners, say so out loud and ask why.","24. If you brought a moisture meter, probe the floor near the toilet, the wall under each window, and the wall corners at each slide. Compare readings to a known dry interior wall; a clearly elevated reading in a suspect spot confirms what your hands told you."],"sources":["https://www.doityourselfrv.com/delamination-rvs/","https://www.doityourselfrv.com/average-rv-delamination-repair-cost/","https://rvlife.com/rv-delamination/","https://rvrealtalk.com/how-to-find-water-damage-rv/","https://rvlife.com/rv-water-damage-signs/"]},{"heading":"Checkpoints 25 to 32: frame, underbelly, and tires (read the date codes)","body":"Now get low. Bring the flashlight and, if you have them, knee pads. You are looking for rust that flakes, welds that cracked, and a sagging underbelly holding water like a diaper.\n\nTires deserve special attention because RV tires die of age, not miles. Every tire has a DOT code on the sidewall; the last four digits are the week and year it was made. '3522' means the 35th week of 2022. The standard industry guidance is to inspect closely from 5 years old and replace by 7 years regardless of tread. Michelin says have tires professionally inspected annually starting at 5 years, and never run any tire past 10 years, spare included. A rig with 8-year-old tires needs a full set before it is safe to tow or drive home, and on a big rig that is real money you should deduct from the price. Note: the date code may be on the inner sidewall, so check both sides and use your phone camera if you cannot crawl.","checklist":["25. Crawl or duck-walk the full frame length with the flashlight. Surface rust is normal. Flaking, scaling rust you can peel with a fingernail, bent members, or cracked welds (especially at spring hangers on trailers) are structural problems.","26. Look at the corrugated plastic underbelly (if fitted). Sagging, bulging sections often hold water from an internal plumbing leak. Ask for it to be dropped or press up on it; sloshing is a failed test.","27. On a trailer or fifth wheel, inspect spring shackles, equalizers, and axle tubes for rust-through, missing bolts, and a bent axle (uneven tire wear across one axle is the tell).","28. Read the DOT date code on every tire including the spare. Write each one down. 5 years or older: budget for replacement soon. 7 years or older: budget for replacement now, before the drive home.","29. Check tire sidewalls for weather-checking (fine cracks), bulges, and flat spots from sitting. Check tread for uneven wear, which points to alignment or axle problems, not just tires.","30. Confirm the tires match the load rating on the federal certification label. Undersized replacement tires on a heavy rig are a blowout waiting to happen.","31. On a motorhome, look under the engine and transmission for fresh drips, check fluid levels and color, and note the chassis mileage against service records. If you are not comfortable judging a drivetrain, this is where the paid inspection in Section 10 earns its fee.","32. Check the breakaway switch and cable (trailers), the 7-pin connector for corrosion, and that all running lights, brake lights, and turn signals work when connected to a tow vehicle."],"sources":["https://fifthwheelst.com/tire-age-code.html","https://www.liferv.com/public/How-old-is-too-old-for-RV-tires.cfm","https://blackseries.net/blogs/news/read-dot-date-on-rv-tires-age-safety-guide","https://engineerfix.com/when-to-replace-rv-tires-age-wear-and-damage/"]},{"heading":"Checkpoints 33 to 38: slide-outs and their seals","body":"Slides are the most failure-prone moving part on a modern RV, and a bad slide is both a mechanical problem and a water problem at the same time. Each slide has two sets of rubber seals, inner and outer, plus wiper seals that sweep the slide walls as it moves. When those seals stiffen, crack, or fold the wrong way, rain runs straight down into the slide floor, and slide floors rot quietly under the carpet.\n\nYou must see every slide run in and out at least twice, with the rig level. Extending slides on an unlevel rig is itself a cause of misalignment, so a seller who shrugs about leveling is telling you how the rig was treated.","checklist":["33. Run every slide fully out and fully in twice. Listen for grinding, binding, or motor strain. Watch both ends: if one side lags or drags behind the other, the slide is out of alignment, which strains the mechanism and chews the seals.","34. With the slide out, inspect the rubber seals all the way around, inside and outside. They should be soft and pliable. Stiff, cracked, torn, or flattened seals need replacement and have probably already let water in.","35. Watch the wiper seals as the slide moves. They should flip and stay in contact with the slide wall and roof, not fold under or hang loose.","36. Press along the slide floor edge inside (through the carpet if fitted), and press the main floor just inside the slide opening. Soft equals rot from seal leaks.","37. Look at the slide roof from outside (step ladder). Debris, standing-water stains, or cracked sealant on top of the slide is a leak feeding directly into the wall.","38. Check the slide mechanism underneath (rack and pinion, cable, or hydraulic ram) for rust, frayed cables, or hydraulic fluid weeping. Ask when it was last lubricated; a blank stare is an answer too."],"sources":["https://rvhelp.com/blog/RV-slideout-maintenance","https://www.rvproseal.ca/rv-slide-out-mistakes-and-how-to-avoid-them/","https://www.keystonerv.com/owners/rv-slide-out-care-maintenance-tips","https://www.rvmapper.com/blog/rv-slideout-maintenance-guide"]},{"heading":"Checkpoints 39 to 48: live-fire test of water, electric, propane, and every appliance","body":"This is why you demanded hookups. An RV is a rolling house with three fuel and utility systems, and every one of them must be tested live. 'It all worked last season' is not a test. If the seller cannot or will not connect power, water, and propane, assume the systems do not work and price accordingly, or walk.\n\nOne safety note on propane: it is roughly one and a half times heavier than air, so leaking gas pools at the floor, not the ceiling. That is why the detector is mounted low (typically 6 to 18 inches off the floor) and why you sniff low, near the floor and in the outside bottle compartment, not at nose height. The classic leak test is soapy water sprayed on fittings; growing bubbles mean a leak.","checklist":["39. Water: connect city water, then open every faucet, the shower, and the outside shower. Check flow and check under every sink with the flashlight while water runs. Flush the toilet and watch the base and floor around it.","40. Water pump: disconnect city water, put water in the fresh tank, and run the pump. It should build pressure and shut off. A pump that cycles on and off every few seconds with all faucets closed means a leak or a bad check valve somewhere in the lines.","41. Water heater: run it on electric AND on propane. Confirm actual hot water at a faucet within 20 to 30 minutes. Look in the outside water heater compartment for rust streaks or a corroded tank.","42. Electrical, 120V: with shore power connected, test every outlet (a $10 outlet tester is ideal), both AC units on full cold (feel the air at the vents), the microwave, and the fridge on electric.","43. Electrical, 12V: unplug from shore power and confirm lights, fans, water pump, and slide/jack controls still work off the batteries. Check battery date stickers and terminals for corrosion; batteries older than about 4 to 5 years are a near-term expense.","44. Open the breaker panel and 12V fuse panel. Look for scorch marks, melted insulation, household wire nuts, or a rat's nest of added wiring. Amateur electrical work is a fire risk and a sign of how everything else was maintained.","45. Propane: with the bottle on, sniff at floor level inside and around the regulator and bottle connections outside. Spray soapy water on the regulator and every fitting you can reach; growing bubbles are a leak. A regulator that hisses, or a rotten-egg smell anywhere, stops the test.","46. Light every propane appliance: stove burners (steady blue flame, not lazy yellow), oven, furnace (let it run until you feel real heat at the floor vents), fridge on gas, and water heater on gas.","47. Fridge: it should be cold at the start of your visit because you asked for hookups in advance. Look at the outside fridge access panel for yellow powder stains or an ammonia smell, both signs of a failed cooling unit, which is a $1,000-plus class repair.","48. Safety devices: press the test button on the smoke alarm, CO alarm, and propane detector. Check the manufacture date on each (they expire, typically 5 to 10 years, printed on the back). Confirm there is a fire extinguisher with a green gauge."],"sources":["https://www.truckcamperadventure.com/is-your-rv-propane-system-leak-free/","https://www.ferrellgas.com/tank-talk/blog-articles/what-makes-propane-gas-heavier-than-air/","https://papropane.com/aboutpropane/for-consumers/important-propane-safety-information/","https://camperfront.com/how-to-test-rv-propane-regulator/","https://campersmarts.com/rv-inspection-checklist"]},{"heading":"Checkpoints 49 to 52: winter damage, the cheap rig's dirty secret","body":"A lot of bargain-priced used RVs got that way because someone skipped winterizing. Water left in the lines freezes, expands, and cracks fittings, faucets, the pump head, and the water heater tank. The cruel part is the damage is invisible until the system is pressurized and warm, which is exactly why sellers of freeze-damaged rigs avoid live water tests. The most vulnerable parts are the water heater tank, the pump, low-point fittings, and the fresh, gray, and black tanks. If you are shopping in spring in a northern state, treat every rig as freeze-damaged until the live test in Section 6 proves otherwise.","checklist":["49. Ask: 'Who winterized this rig each year, and with what?' A confident answer names a shop or describes pink antifreeze and blown-out lines. Hesitation is information.","50. During the pressurized water test, walk the whole rig again and listen. Hissing, dripping, or the pump refusing to shut off means a cracked line or fitting somewhere, very often freeze damage.","51. Shine the flashlight on every plumbing fitting you can reach: under sinks, behind the toilet, at the pump, and at the low-point drains underneath. Look for white mineral crust, water tracks, or split plastic fittings.","52. Look for pink antifreeze residue in the toilet bowl, P-traps, and low-point drains in spring. Its presence is good (the rig was winterized). A northern rig with no trace of it and no winterizing story deserves extra suspicion at every fitting."],"sources":["https://rvliving.com/rv-winterizing-mistakes/","https://www.rv.com/servicing-care/diy-how-to/how-to-winterize-your-rv/","https://www.rvfixin.com/post/rv-winterization-how-to-protect-your-camper-from-costly-freeze-damage"]},{"heading":"Checkpoints 53 to 57: paperwork, title, recalls, and warranty","body":"Do this part at the kitchen table, not the lot, and do not sign anything until every box is checked. Two free-or-cheap lookups protect you here. First, federal recalls: go to nhtsa.gov/recalls and enter the 17-character VIN. If the vehicle is clean you will see '0 unrepaired recalls associated with this VIN.' Any open recall gets repaired free at a dealer, but you want to know before you buy, because some recalls (like certain propane or brake issues) matter for safety on the drive home. On a motorhome, check both the chassis VIN and the coach; on a towable, check the trailer VIN.\n\nSecond, title history: NMVTIS is the federal title database that all insurers, salvage yards, and junk yards are required by law to report into. An NMVTIS report (a few dollars from an approved provider listed at vehiclehistory.bja.ojp.gov) shows title brands like salvage, junk, or flood. A flood-branded RV is a hard no at any price.\n\nOn warranties: standard RV manufacturer warranties are usually NOT transferable to a second owner; most fine print limits coverage to the original purchaser. There are exceptions (Grand Design, for example, makes its towable base, structural, and frame warranties transferable to later owners within the term), and paid extended warranties often transfer for a fee with a form. Never let 'it's still under warranty' add a dollar to the price until you have read the transfer language yourself.","checklist":["53. See the physical title (or lender payoff letter) and confirm the VIN on the title matches the VIN on the rig's federal label. Confirm the seller's name matches their ID. No title in hand from a private seller means no deal today.","54. Run the VIN at nhtsa.gov/recalls. Print or screenshot the result. Any open recall: get it scheduled or documented before money changes hands.","55. Buy an NMVTIS history report from an approved provider (find them via vehiclehistory.bja.ojp.gov). Salvage, junk, or flood brand: walk away.","56. If any warranty is claimed, ask for the actual warranty document and read the transferability clause. For extended warranties, call the administrator and confirm the transfer fee and process before you value it at anything.","57. Ask for maintenance records: roof resealing, bearing repacks (trailers, roughly annually or every 10,000 to 12,000 miles per most axle makers, but verify against the manual in the rig), winterizing, and appliance service. A folder of receipts is worth real money; its absence is a discount conversation."],"sources":["https://www.nhtsa.gov/recalls","https://vehiclehistory.bja.ojp.gov/nmvtis_consumers","https://vehiclehistory.bja.ojp.gov/nmvtis_understandingvhr","https://wholesalewarranties.com/blog/are-rv-warranties-transferable/","https://www.granddesignrv.com/1-3-5-warranty"]},{"heading":"Walk-away triggers: findings that end the deal on the spot","body":"You will be tempted to rationalize, especially after driving two hours to see the rig and especially if you like the floor plan. Do not. There are always more RVs. The items below are not negotiating points. They are structural or title problems where the true repair cost is unknowable until the walls come open, and it almost always comes open worse than quoted. If you hit any one of these, thank the seller, and leave.","checklist":["WALK AWAY: soft or spongy floor in more than one small spot, or any soft floor plus a musty smell. That combination means widespread subfloor rot, a $10,000 to $30,000 class repair.","WALK AWAY: sidewall delamination (bubbled or wavy fiberglass) on a bonded-wall rig. Per-panel repairs run $1,500 to $4,000 and full-wall jobs $5,000 to $15,000+, insurance rarely covers it, and it keeps spreading.","WALK AWAY: soft roof decking underfoot, or ceiling panels stained and soft around vents. The roof structure itself is rotting, not just the membrane.","WALK AWAY: flaking structural rust, cracked frame welds, or a bent frame or axle. This is a safety issue, not a fixer-upper.","WALK AWAY: a flood, salvage, or junk title brand on the NMVTIS report, a VIN that does not match the title, or a seller who cannot produce the title.","WALK AWAY: a propane leak the seller shrugs at, scorched or melted wiring in the panel, or a disabled propane/CO detector. Someone chose to hide a danger rather than fix it.","WALK AWAY: the seller refuses hookups for a live systems test, refuses to run the slides, or refuses a professional inspection. Every one of those is a person telling you what the test would have shown.","NEGOTIATE, don't walk: tires past 5 to 7 years (get a quote, deduct it), dead batteries, one failed appliance on an otherwise dry rig, worn slide seals with a dry slide floor, cracked but maintained roof sealant. These are known, priceable costs."],"sources":["https://www.doityourselfrv.com/average-rv-delamination-repair-cost/","https://rvrealtalk.com/how-to-find-water-damage-rv/","https://www.liferv.com/public/How-old-is-too-old-for-RV-tires.cfm","https://vehiclehistory.bja.ojp.gov/nmvtis_consumers"]},{"heading":"The last checkpoint: when to bring in a certified inspector","body":"This checklist will catch the majority of deal-killers, and it costs you a flashlight and a marble. But on a big-ticket rig, especially any motorhome where an engine, transmission, and generator are in play, checkpoint 58 through 60 is simple: hire a certified independent inspector before closing.\n\nNRVIA-certified inspectors (the National RV Inspectors Association, nrvia.org) are independent, not dealer employees, and they will spend 4 to 8 hours with moisture meters, fluid analysis, and system load tests. Published cost ranges run roughly $150 to $1,200 depending on level and size; travel trailer inspections commonly land around $350 to $600, and comprehensive inspections on large Class A or diesel rigs typically run $700 to $1,500, with some full-service jobs higher. What moves the price: rig size, engine or no engine, number of slides, your location, and inspector travel distance. Against a $100,000 purchase where a missed roof or frame problem costs $5,000 to $20,000+, this is the cheapest insurance you will ever buy.\n\nOne last thing. Your checklist result is also your negotiating sheet. Every dated tire, worn seal, and stained cabinet you photographed has a price. Total them, show the seller the photos, and let the rig's real condition set the number, not the ask.","checklist":["58. On any motorhome, or any rig over about $60,000, make your offer contingent on a professional inspection and put that contingency in writing.","59. Find an inspector through nrvia.org, confirm they are independent of the selling dealer, and ask for a sample report before booking.","60. Attend the inspection if you can. Two hours watching a pro work your own rig is the best RV education money buys, and you will use it every season you own it."],"sources":["https://nrvia.org/","https://rvshare.com/blog/how-much-does-an-rv-inspection-cost/","https://rvhelp.com/blog/how-much-does-an-rv-inspection-cost"]}]}]}</script>
<script>
(function(){
var D = JSON.parse(document.getElementById('pdata').textContent);
var KEY = 'rvg_' + D.tier;
function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; } }
function save(s){ try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e){} }
var S = load();
S.reviewed = S.reviewed || {}; S.shortlist = S.shortlist || {}; S.checks = S.checks || {};
var app = document.getElementById('app');
var esc = function(s){ return String(s==null?'':s).replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; }); };

// ---- which segments does this copy cover ----
// The five buyer-facing rig segments sold on the site. Multi-segment makers are
// tagged "mixed" in the data and belong in EVERY segment view.
var PICK = ['travel-trailer','fifth-wheel','class-a','class-b','molded-fiberglass'];
function grantedSegs(){
  if (!D.oneSegment) return Object.keys(D.segments);
  return S.seg ? [S.seg, 'mixed'] : [];
}
function brandsFor(segs){
  var slugs = {};
  segs.forEach(function(s){ (D.bySegment[s]||[]).forEach(function(x){ slugs[x]=1; }); });
  return D.brands.filter(function(b){ return slugs[b.slug]; });
}

// ---- progress = reviewed brands + checklist items done ----
function progress(){
  var bs = brandsFor(grantedSegs());
  var rev = bs.filter(function(b){ return S.reviewed[b.slug]; }).length;
  var ckTotal = 0, ckDone = 0;
  D.modules.forEach(function(m){ m.sections.forEach(function(sec, si){ (sec.checklist||[]).forEach(function(_, ii){
    ckTotal++; if (S.checks[m.key+'.'+si+'.'+ii]) ckDone++; }); }); });
  var total = bs.length + ckTotal, done = rev + ckDone;
  return { done: done, total: total, rev: rev, brands: bs.length };
}
function paintProgress(){
  var p = progress();
  var pct = p.total ? Math.round(100 * p.done / p.total) : 0;
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('pnum').textContent = pct + '%';
}

// ---- views ----
var VIEW = 'guide';
function tabs(){
  var t = [ ['guide', 'The verdicts'], ['shortlist', 'My shortlist'] ];
  D.modules.forEach(function(m){ t.push(['m_'+m.key, m.title.replace('The ','')]); });
  return '<div class="tabs">' + t.map(function(x){
    return '<button class="tab' + (VIEW===x[0]?' on':'') + '" data-v="' + x[0] + '">' + esc(x[1]) + '</button>';
  }).join('') + '</div>';
}

function milestone(){
  var p = progress();
  if (!p.brands) return '';
  if (p.rev === p.brands) return '<div class="milestone"><span class="mi">\u2713</span>You have reviewed every brand in your guide. You know this market better than the salesman now.</div>';
  if (p.rev >= 10) return '<div class="milestone"><span class="mi">' + p.rev + '</span>' + p.rev + ' brands reviewed. Keep going, ' + (p.brands - p.rev) + ' left in your segments.</div>';
  if (p.rev >= 3) return '<div class="milestone"><span class="mi">' + p.rev + '</span>Good start: ' + p.rev + ' brands down. Mark each brand reviewed as you read it, the bar up top tracks your homework.</div>';
  return '';
}

var Q = '', F = 'all';
function guideView(){
  var segs = grantedSegs();
  var html = '';
  if (D.oneSegment && !S.seg) {
    html += '<div class="hello"><p class="kick">Step 1 of 1</p><h1>Which rig are you shopping for?</h1>' +
      '<p>Your guide covers one segment, every brand in it. Pick yours. This sets your copy; choose carefully.</p><div class="segpick">' +
      PICK.map(function(k){ return '<button class="segbtn" data-seg="' + k + '">' + esc(D.segments[k] || k) + '</button>'; }).join('') +
      '</div></div>';
    return html;
  }
  html += '<div class="hello"><p class="kick">How to use this guide</p>' +
    '<h1>Every brand, one verdict, and the receipt.</h1>' +
    '<p>Read your segment before you set foot on a lot. Tap <b>Mark reviewed</b> on each brand as you go, and add the ones worth your money to <b>My shortlist</b>. The shortlist prints clean, take it with you.</p></div>';
  html += milestone();
  html += '<div class="controls"><input class="search" id="q" placeholder="Search a brand name" value="' + esc(Q) + '">' +
    ['all','buy','caution','avoid'].map(function(f){
      return '<button class="fchip f-' + f + (F===f?' on':'') + '" data-f="' + f + '">' + f.toUpperCase() + '</button>';
    }).join('') + '</div>';
  var list = brandsFor(segs).filter(function(b){
    if (F !== 'all' && b.verdict !== F) return false;
    if (Q && b.name.toLowerCase().indexOf(Q.toLowerCase()) < 0) return false;
    return true;
  });
  if (!list.length) html += '<p class="empty">No brands match. Clear the search or filter.</p>';
  list.forEach(function(b){ html += brandCard(b); });
  html += '<p style="margin-top:20px"><button class="printbtn" onclick="window.print()">Print this view</button></p>';
  return html;
}

function brandCard(b){
  var h = '<div class="brand v-' + b.verdict + '" id="b-' + b.slug + '">';
  h += '<div class="bhead"><p class="bname">' + esc(b.name) + '</p><span class="tag ' + b.verdict + '">' + b.verdict + '</span></div>';
  h += '<p class="bhl">' + esc(b.headline) + '</p>';
  if (b.note) h += '<div class="bnote"><b>The nuance:</b> ' + esc(b.note) + '</div>';
  if (b.splits.length) h += '<ul class="splits">' + b.splits.map(function(s){
    return '<li><span class="tag ' + s.verdict + '">' + s.verdict + '</span><span><b>' + esc(s.scope) + '.</b> ' + esc(s.why) + '</span></li>';
  }).join('') + '</ul>';
  if (b.proof.length) h += '<p class="receipts"><b>Receipts:</b> ' + b.proof.map(function(p){
    return esc(p.fact) + (p.source ? ' (<a href="' + esc(p.source) + '" target="_blank" rel="noopener">source</a>)' : '');
  }).join(' \u00b7 ') + '</p>';
  else if (b.citations.length) h += '<p class="receipts"><b>From our published investigations:</b> ' + b.citations.map(function(c){
    return '<a href="https://www.youtube.com/watch?v=' + esc(c.source) + '" target="_blank" rel="noopener">watch</a>';
  }).join(' \u00b7 ') + '</p>';
  if (b.unestablished) h += '<p class="unest">What we could not confirm: ' + esc(b.unestablished) + '</p>';
  var rev = S.reviewed[b.slug], sl = S.shortlist[b.slug];
  h += '<div class="bacts">' +
    '<button class="babtn' + (rev?' done':'') + '" data-rev="' + b.slug + '">' + (rev ? '\u2713 Reviewed' : 'Mark reviewed') + '</button>' +
    '<button class="babtn' + (sl?' listed':'') + '" data-sl="' + b.slug + '">' + (sl ? '\u2605 On my shortlist' : '+ My shortlist') + '</button>' +
    '</div></div>';
  return h;
}

function shortlistView(){
  var picks = D.brands.filter(function(b){ return S.shortlist[b.slug]; });
  var h = '<div class="shortlist-box"><p class="kick" style="font-family:var(--anton);font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--mark);margin:0 0 6px">My shortlist</p>';
  h += '<h1>The brands worth your money.</h1>';
  if (!picks.length) h += '<p class="empty">Nothing here yet. Go to The verdicts and tap "+ My shortlist" on the brands you would actually buy. Then print this page and take it to the lot.</p>';
  else h += '<p>' + picks.length + ' brand' + (picks.length>1?'s':'') + ' made your cut. Print this page, it is your lot-day cheat sheet.</p>';
  h += '</div>';
  picks.forEach(function(b){ h += brandCard(b); });
  if (picks.length) h += '<p><button class="printbtn" onclick="window.print()">Print my shortlist</button></p>';
  return h;
}

function ring(pct){
  var r = 26, c = 2 * Math.PI * r;
  return '<svg width="64" height="64" viewBox="0 0 64 64">' +
    '<circle cx="32" cy="32" r="' + r + '" fill="none" stroke="#263844" stroke-width="7"/>' +
    '<circle cx="32" cy="32" r="' + r + '" fill="none" stroke="#F5913B" stroke-width="7" stroke-linecap="round" ' +
    'stroke-dasharray="' + c + '" stroke-dashoffset="' + (c * (1 - pct/100)) + '" transform="rotate(-90 32 32)"/>' +
    '<text x="32" y="37" text-anchor="middle" fill="#F0F3F5" font-family="Barlow,Arial" font-weight="800" font-size="15">' + pct + '%</text></svg>';
}

function moduleView(key){
  var m = D.modules.filter(function(x){ return x.key === key; })[0];
  if (!m) return '';
  var total = 0, done = 0;
  m.sections.forEach(function(sec, si){ (sec.checklist||[]).forEach(function(_, ii){ total++; if (S.checks[m.key+'.'+si+'.'+ii]) done++; }); });
  var h = '<div class="hello"><h1>' + esc(m.title) + '</h1><p>' + esc(m.intro) + '</p>';
  if (total) h += '<div class="ring">' + ring(total ? Math.round(100*done/total) : 0) + '<span class="rl"><b>' + done + ' of ' + total + '</b> checks done. Work through every box before you sign anything.</span></div>';
  h += '</div>';
  m.sections.forEach(function(sec, si){
    h += '<div class="modsec"><h2 style="margin-top:0">' + esc(sec.heading) + '</h2>';
    h += sec.body.split('\n\n').map(function(p){
      if (/^WALK AWAY:/i.test(p)) return '<div class="walkaway"><b>WALK AWAY:</b> ' + esc(p.replace(/^WALK AWAY:\s*/i,'')) + '</div>';
      return '<p>' + esc(p) + '</p>';
    }).join('');
    if ((sec.checklist||[]).length) h += '<ul class="ck">' + sec.checklist.map(function(item, ii){
      var k = m.key + '.' + si + '.' + ii;
      return '<li class="' + (S.checks[k]?'on':'') + '" data-ck="' + k + '"><span class="box">\u2713</span><span>' + esc(item) + '</span></li>';
    }).join('') + '</ul>';
    if ((sec.sources||[]).length) h += '<p class="srcs">Sources: ' + sec.sources.map(function(s){
      return '<a href="' + esc(s) + '" target="_blank" rel="noopener">' + esc(s.replace(/^https?:\/\/(www\.)?/,'').split('/')[0]) + '</a>';
    }).join(' \u00b7 ') + '</p>';
    h += '</div>';
  });
  h += '<p><button class="printbtn" onclick="window.print()">Print this module</button></p>';
  return h;
}

function render(){
  var h = tabs();
  if (VIEW === 'guide') h += guideView();
  else if (VIEW === 'shortlist') h += shortlistView();
  else h += moduleView(VIEW.slice(2));
  app.innerHTML = h;
  paintProgress();
  var q = document.getElementById('q');
  if (q) q.addEventListener('input', function(){ Q = q.value;
    var keep = q.selectionStart; render(); var q2 = document.getElementById('q'); q2.focus(); q2.setSelectionRange(keep, keep); });
}

app.addEventListener('click', function(e){
  var t = e.target.closest('[data-v],[data-f],[data-rev],[data-sl],[data-seg],[data-ck]');
  if (!t) return;
  if (t.dataset.v) { VIEW = t.dataset.v; window.scrollTo(0,0); render(); }
  else if (t.dataset.f) { F = t.dataset.f; render(); }
  else if (t.dataset.seg) { S.seg = t.dataset.seg; save(S); render(); }
  else if (t.dataset.rev) { S.reviewed[t.dataset.rev] = !S.reviewed[t.dataset.rev]; save(S); render(); }
  else if (t.dataset.sl) { S.shortlist[t.dataset.sl] = !S.shortlist[t.dataset.sl]; save(S); render(); }
  else if (t.dataset.ck) { S.checks[t.dataset.ck] = !S.checks[t.dataset.ck]; save(S); render(); }
});

render();
})();
</script>
</body></html>
